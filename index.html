        // 払い出し・入庫の履歴を shizai_logs に書き込む共通関数
        async function insertShizaiLog(item, type, quantity) {
            const { error } = await db
                .from('shizai_logs')
                .insert([{
                    shizai_id: item.id,
                    drug_name: item.drug_name,
                    shizai_name: item.shizai_name,
                    type: type,         // '払い出し' または '入庫'
                    quantity: quantity   // 数量
                }]);
        
            if (error) {
                console.error("履歴の保存に失敗しました:", error.message);
            }
        }
        
        // ページ読み込み時に初期データを取得し、同時にリアルタイム監視を開始
        document.addEventListener("DOMContentLoaded", () => {
            fetchStocks(); // 初期読み込み
            
            // 🔄 同時編集コンフリクト防止：リアルタイム同期リスナーの登録
            db.channel('public:shizai_stocks')
                .on(
                    'postgres_changes', 
                    { 
                        event: '*', // INSERT, UPDATE, DELETE すべての変更を監視
                        schema: 'public', 
                        table: 'shizai_stocks' 
                    }, 
                    (payload) => {
                        console.log('データベースに変更を検知しました:', payload);
                        fetchStocks(); // 誰かが更新したら画面を自動で再描画

                .subscribe();
        });

                clearBtn.classList.remove("hidden");

                clearBtn.classList.add("hidden");

        // 💡 変更：アラートに「薬剤名：資材名」をセットで表示するように改良
        function resetToAllDrugs() {
            const addForm = document.getElementById("add-form-section");
            
            // パターンA: 【新規登録フォーム】が開いている場合
            if (addForm && !addForm.classList.contains("hidden")) {
                const drugInput = document.getElementById("add-drug-name")?.value || "";
                const nameInput = document.getElementById("add-shizai-name")?.value || "";
                const memoInput = document.getElementById("add-memo")?.value || "";
                
                // 何かしら入力されている場合のみアラートを出す
                if (drugInput.trim() !== "" || nameInput.trim() !== "" || memoInput.trim() !== "") {
                    let displayName = "新規資材";
                    // 薬品名か資材名が入力されていれば、セットの形式を作成
                    if (drugInput.trim() || nameInput.trim()) {
                        const d = drugInput.trim() || "（未入力）";
                        const s = nameInput.trim() || "（未入力）";
                        displayName = `「${d} ： ${s}」`;
                    }
                    
                    if (!confirm(`${displayName}の入力中の内容が破棄されます。新規登録を中止してよろしいですか？`)) {
                        return;
                    }
                }
                addForm.classList.add("hidden");
            }
            
            // パターンB: 【資材の編集窓】が開いている場合（実際のID群と比較）
            if (typeof editingId !== 'undefined' && editingId !== null && editInitialState) {
                const currentDrug = document.getElementById(`edit-drug-${editingId}`)?.value.trim() || "";
                const currentShizai = document.getElementById(`edit-shizai-${editingId}`)?.value.trim() || "";
                const currentCurrent = parseInt(document.getElementById(`edit-current-${editingId}`)?.value, 10) || 0;
                const currentMin = parseInt(document.getElementById(`edit-min-${editingId}`)?.value, 10) || 0;
                const currentContents = document.getElementById(`edit-contents-${editingId}`)?.value.trim() || "";
                const currentImageUrl = document.getElementById(`edit-image-url-${editingId}`)?.value.trim() || "";
                const currentOrderUrl = document.getElementById(`edit-order-url-${editingId}`)?.value.trim() || "";
                const currentPhoneName = document.getElementById(`edit-phone-name-${editingId}`)?.value.trim() || "";
                const currentPhoneNumber = document.getElementById(`edit-phone-number-${editingId}`)?.value.trim() || "";

                // 初期データと現在の入力値を比較
                const isChanged = 
                    currentDrug !== editInitialState.drug_name ||
                    currentShizai !== editInitialState.shizai_name ||
                    currentCurrent !== editInitialState.current_stock ||
                    currentMin !== editInitialState.min_stock ||
                    currentContents !== editInitialState.contents ||
                    currentImageUrl !== editInitialState.image_url ||
                    currentOrderUrl !== editInitialState.order_url ||
                    currentPhoneName !== editInitialState.phone_name ||
                    currentPhoneNumber !== editInitialState.phone_number;

                // 💡 変更があった場合のみ確認ダイアログ（アラート）を出す
                if (isChanged) {
                    // 記憶している初期状態から「薬剤名」と「資材名」をセットにして取得
                    const drugName = editInitialState.drug_name || "不明な薬剤";
                    const shizaiName = editInitialState.shizai_name || "この資材";
                    
                    if (!confirm(`「${drugName} ： ${shizaiName}」の編集中の内容が変更されています。破棄して中止してよろしいですか？`)) {
                        return; // キャンセルされたらトップに戻らない
                    }
                }

                // 編集状態をクリア
                editingId = null;
                editInitialState = null;
            }

            // 開いているアコーディオン詳細エリア（コントロールパネル）をすべて閉じる
            const panels = document.querySelectorAll('[id^="control-panel-"]');
            panels.forEach(panel => {
                panel.classList.add("hidden");
            });

            // すべてのカードの矢印（▼）を元の向きに戻す
            const arrows = document.querySelectorAll('[id^="arrow-"]');
            arrows.forEach(arrow => {
                arrow.innerText = "▼";
            });

            openedCardId = null;

            selectedDrugFilter = "ALL";
            if (typeof updateDrugFilterOptions === "function") {
                updateDrugFilterOptions(); // 💡 50音アコーディオンの選択状態をリセット
            }
            
            clearSearchInput();
            
            if (typeof renderStockList === "function") {
                renderStockList();
            }
        }
        
        function normalizeString(str) {
            if (!str) return "";
            return str.toLowerCase()
                .normalize("NFKC")
                .replace(/[\u30a1-\u30f6]/g, function(match) {
                    return String.fromCharCode(match.charCodeAt(0) - 0x60);
                });
        }

        function toggleDetails(id) {
            const panel = document.getElementById(`control-panel-${id}`);
            const arrow = document.getElementById(`arrow-${id}`);
            if (!panel) return;

            if (openedCardId === id) {
                panel.classList.add("hidden");
                if (arrow) arrow.innerText = "▼";
                openedCardId = null;
            } else {
                if (openedCardId !== null) {
                    const oldPanel = document.getElementById(`control-panel-${openedCardId}`);
                    const oldArrow = document.getElementById(`arrow-${openedCardId}`);
                    if (oldPanel) oldPanel.classList.add("hidden");
                    if (oldArrow) oldArrow.innerText = "▼";
                }
                panel.classList.remove("hidden");
                if (arrow) arrow.innerText = "▲";
                openedCardId = id;
            }
        }

        function extractStoragePath(url) {
            if (!url || !url.includes('/storage/v1/object/public/shizai-images/')) return null;
            return url.split('/storage/v1/object/public/shizai-images/')[1];
        }

        // 🌟 【新規追加】画像をブラウザ側で軽量化（縮小・リサイズ・圧縮）する関数
        function compressImage(file, maxWidth = 800, quality = 0.75) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        // 縮小後のサイズ計算（アスペクト比維持）
                        let width = img.width;
                        let height = img.height;
                        if (width > maxWidth) {
                            height = Math.round((height * maxWidth) / width);
                            width = maxWidth;
                        }

                        // Canvasを使って再描画
                        const canvas = document.createElement('canvas');
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        // 指定した画質(quality)のJPEG形式のBlob（バイナリ）に変換
                        canvas.toBlob((blob) => {
                            if (blob) {
                                // Supabaseがファイルとして認識できるよう、Fileオブジェクトを再生成して返す
                                const compressedFile = new File([blob], file.name, {
                                    type: 'image/jpeg',
                                    lastModified: Date.now()
                                });
                                resolve(compressedFile);
                            } else {
                                reject(new Error("Canvas to Blob 変換に失敗しました"));
                            }
                        }, 'image/jpeg', quality);
                    };
                    img.onerror = (err) => reject(err);
                };
                reader.onerror = (err) => reject(err);
            });
        }

        async function uploadImageHandler(mode, id = null) {
            const fileInput = mode === 'add' ? document.getElementById('input-image-file') : document.getElementById(`edit-image-file-${id}`);
            const statusLabel = mode === 'add' ? document.getElementById('add-upload-status') : document.getElementById(`edit-upload-status-${id}`);
            const urlHiddenInput = mode === 'add' ? document.getElementById('input-image-url') : document.getElementById(`edit-image-url-${id}`);

            if (!fileInput || !fileInput.files || fileInput.files.length === 0) return;
            
            let file = fileInput.files[0];
            statusLabel.innerText = "⏳ 画像を圧縮・最適化中...";
            statusLabel.className = "text-xxs text-blue-600 font-bold animate-pulse";

            try {
                // 🌟 【変更点】アップロード前に compressImage 関数を呼び出して軽量化
                // 横幅最大800px、画質75%のコンパクトなJPEG形式に変換します。
                file = await compressImage(file, 800, 0.75);

                statusLabel.innerText = "⏳ アップロード中...";

                if (mode === 'edit' && id) {
                    const targetItem = currentStocksData.find(item => item.id === id);
                    if (targetItem && targetItem.image_url) {
                        const oldStoragePath = extractStoragePath(targetItem.image_url);
                        if (oldStoragePath) {
                            await db.storage.from('shizai-images').remove([oldStoragePath]);
                        }
                    }
                }

                // 拡張子を強制的に .jpg に合わせてファイル名を生成
                const fileName = `${Date.now()}_${Math.random().toString(36).substring(2, 7)}.jpg`;
                const filePath = `shizai_pics/${fileName}`;

                const { data, error } = await db.storage
                    .from('shizai-images')
                    .upload(filePath, file);

                if (error) throw error;

                const { data: urlData } = db.storage
                    .from('shizai-images')
                    .getPublicUrl(filePath);

                urlHiddenInput.value = urlData.publicUrl;
                statusLabel.innerText = "✅ 最適化・アップロード完了";
                statusLabel.className = "text-xs text-green-600 font-bold";

                const deleteBtn = document.getElementById(`btn-delete-image-${id}`);
                if (deleteBtn) deleteBtn.classList.remove("hidden");

            } catch (err) {
                console.error(err);
                statusLabel.innerText = "❌ エラーが発生しました";
                statusLabel.className = "text-xs text-red-500 font-bold";
                alert("画像の処理に失敗しました: " + err.message);
            }
        }

        async function deleteImageOnly(id) {
            const urlHiddenInput = document.getElementById(`edit-image-url-${id}`);
            const statusLabel = document.getElementById(`edit-upload-status-${id}`);
            const deleteBtn = document.getElementById(`btn-delete-image-${id}`);

        async function fetchStocks() {
            const errorArea = document.getElementById("error-message");
            const errorText = document.getElementById("error-text");
            errorArea.classList.add("hidden");
        
            // スマホがオンラインかどうかを判定
            if (navigator.onLine) {
                try {
                    const { data: stocks, error } = await db
                        .from('shizai_stocks')
                        .select('*')
                        .order('id', { ascending: true });
        
                    if (error) throw error;
        
                    // 💡 【重要】取得に成功したら、ブラウザのキャッシュ(LocalStorage)に保存する
                    localStorage.setItem('cached_shizai_stocks', JSON.stringify(stocks || []));
        
                    currentStocksData = stocks || [];
                    updateDrugFilterOptions();
                    updateAddFormDrugOptions();
                    renderStockList();
        
                } catch (e) {
                    console.warn("Supabaseからのデータ取得に失敗したため、キャッシュを読み込みます:", e.message);
                    loadCachedData(e.message);
                }
            } else {
                // 💡 オフラインの場合は即座にキャッシュを読み込む
                loadCachedData("ネットワークがオフラインです。");
            }
        }
        
        // 💡 オフライン時用のデータ読み込み補助関数
        function loadCachedData(reasonMessage) {
            const errorArea = document.getElementById("error-message");
            const errorText = document.getElementById("error-text");
            
            // 画面に「オフライン動作中」である警告を表示
            errorText.innerText = reasonMessage + "（保存されている過去のデータを表示しています）";
            errorArea.classList.remove("hidden");
        
            // LocalStorageから過去のデータを引き出す
            const localData = localStorage.getItem('cached_shizai_stocks');
            if (localData) {
                currentStocksData = JSON.parse(localData);
                updateDrugFilterOptions();
                updateAddFormDrugOptions();
                renderStockList();
            } else {
                // キャッシュすら全くない初回起動時の場合
                document.getElementById("stock-list").innerHTML = 
                    `<p class="text-center text-gray-500 py-8">オフラインのためデータを読み込めません。一度オンラインで起動してください。</p>`;
            }
        }

        // モーダル内で選択されている50音行を保持する変数
        if (typeof window.selectedModalKanaRow === 'undefined') {
            window.selectedModalKanaRow = 'ア'; // 初期はア行を開いておく

        // 3. モーダル内の表示データを動的に生成するコアロジック
        function updateDrugFilterModalOptions() {
            const indexContainer = document.getElementById("modal-kana-indices");
            const chipsContainer = document.getElementById("modal-drug-chips");
            const countLabel = document.getElementById("modal-total-drugs-count");
            const btnAll = document.getElementById("modal-drug-btn-all");
            
            if (!indexContainer || !chipsContainer || !countLabel || !btnAll) return;

            // 重複のない薬品名を取得してソート
            const drugNames = [...new Set(currentStocksData.map(item => item.drug_name))]
                .filter(Boolean)
                .sort((a, b) => a.localeCompare(b, 'ja'));

            countLabel.textContent = `${drugNames.length}件`;

            // 「すべての薬品」ボタンの装飾
            if (selectedDrugFilter === "ALL") {
                btnAll.className = "w-full py-2.5 px-4 rounded-xl font-bold border text-center bg-blue-600 text-white border-blue-600 shadow-md";
            } else {
                btnAll.className = "w-full py-2.5 px-4 rounded-xl font-bold border text-center bg-white text-gray-700 border-gray-200 hover:bg-gray-50 active:bg-gray-100 shadow-sm";
            }

            const rows = ['ア', 'カ', 'サ', 'タ', 'ナ', 'ハ', 'マ', 'ヤ', 'ラ', 'ワ', '他'];
            const groupedDrugs = {};
            rows.forEach(r => groupedDrugs[r] = []);
            
            drugNames.forEach(name => {
                let row = '他';
                const firstChar = normalizeString(name).charAt(0);
                if ('あいうえおぁぃぅぇぉゔ'.includes(firstChar)) row = 'ア';
                else if ('かきくけこがぎぐげご'.includes(firstChar)) row = 'カ';
                else if ('さしすせそざじずぜぞ'.includes(firstChar)) row = 'サ';
                else if ('たちつてとだぢづでどっ'.includes(firstChar)) row = 'タ';
                else if ('なにぬねの'.includes(firstChar)) row = 'ナ';
                else if ('はひふへほばびぶべぼぱぴぷぺぽ'.includes(firstChar)) row = 'ハ';
                else if ('まみむめも'.includes(firstChar)) row = 'マ';
                else if ('やゆよゃゅょ'.includes(firstChar)) row = 'ヤ';
                else if ('らりるれろ'.includes(firstChar)) row = 'ラ';
                else if ('わをんゎ'.includes(firstChar)) row = 'ワ';
                
                if (groupedDrugs[row]) groupedDrugs[row].push(name);
                else groupedDrugs['他'].push(name);
            });

            // 現在選ばれている50音行に薬品が1つも無ければ、存在する別の行を自動選択
            if (groupedDrugs[window.selectedModalKanaRow].length === 0) {
                const availableRow = rows.find(r => groupedDrugs[r].length > 0);
                window.selectedModalKanaRow = availableRow || 'ア';
            }

            // ① 50音インデックスボタンの描画（💡 数字を無くしてスッキリ化）
            indexContainer.innerHTML = "";
            rows.forEach(row => {
                const count = groupedDrugs[row].length;
                const btn = document.createElement('button');
                const isRowActive = (window.selectedModalKanaRow === row);
                
                // 数字がなくなるため、上下パディングを py-2 に調整して正方形に近い綺麗な形にします
                btn.className = `py-2 text-xs font-bold border rounded-lg transition leading-none ${
                    count === 0 ? 'opacity-25 pointer-events-none bg-gray-50 text-gray-300 border-gray-100' :
                    isRowActive ? 'bg-gray-800 text-white border-gray-800 shadow-sm' :
                    'bg-white text-gray-700 border-gray-200 active:bg-gray-100'
                }`;
                
                // 💡 薬品数の数字表示（spanタグ）を完全に無くし、50音の文字だけにしました
                btn.textContent = row; 
                
                btn.onclick = (e) => {
                    e.preventDefault();
                    window.selectedModalKanaRow = row;
                    updateDrugFilterModalOptions();
                };
                indexContainer.appendChild(btn);
            });

            // ② 薬品名チップの描画
            chipsContainer.innerHTML = "";
            document.getElementById("modal-sub-label").textContent = `「${window.selectedModalKanaRow}行」の薬品 (${groupedDrugs[window.selectedModalKanaRow].length}件)`;

            if (groupedDrugs[window.selectedModalKanaRow].length === 0) {
                chipsContainer.innerHTML = `<p class="text-xs text-gray-400 m-auto py-4">この行の薬品はありません</p>`;
            } else {
                groupedDrugs[window.selectedModalKanaRow].forEach(drug => {
                    const btn = document.createElement('button');
                    const isSelected = (selectedDrugFilter === drug);
                    
                    btn.className = `px-3 py-1.5 rounded-lg text-xs font-bold border transition ${
                        isSelected 
                        ? 'bg-blue-600 text-white border-blue-600 shadow-md scale-95' 
                        : 'bg-white text-gray-700 border-gray-200 active:bg-gray-100'
                    }`;
                    btn.textContent = drug;
                    btn.onclick = (e) => {
                        e.preventDefault();
                        selectDrugFromModal(drug);
                    };
                    chipsContainer.appendChild(btn);
                });
            }
        }

        function renderStockList() {
            const stockListElement = document.getElementById("stock-list");
            const alertSection = document.getElementById("alert-section");
            const alertListElement = document.getElementById("alert-list");
            const listTitleElement = document.getElementById("list-title");
            const paginationPanel = document.getElementById("pagination-panel");

            stockListElement.innerHTML = "";
            alertListElement.innerHTML = "";
            let hasAlert = false;

            if (currentStocksData.length === 0) {
                stockListElement.innerHTML = `<p class="text-center text-gray-500 py-8">資材が登録されていません。</p>`;
                alertSection.classList.add("hidden");
                paginationPanel.classList.add("hidden");
                return;
            }

            if (selectedDrugFilter === "ALL") {
                listTitleElement.innerText = searchQuery ? `検索結果一覧` : "全資材一覧";
            } else {
                listTitleElement.innerText = `「${selectedDrugFilter}」の資材一覧`;
            }

            currentStocksData.forEach(item => {
                const isShortage = item.current_stock < item.min_stock;
                if (isShortage && !item.is_ordering) {
                    hasAlert = true;
                    alertListElement.innerHTML += `
                        <div class="bg-red-100 border-l-4 border-red-500 text-red-700 p-2 text-sm rounded shadow-sm">
                            <strong>${item.drug_name}</strong>: ${item.shizai_name} (残り ${item.current_stock}個 / 最低 ${item.min_stock}個)
                        </div>
                    `;
                }
            });

            let filteredItems = currentStocksData.filter(item => {
                // 💡 変更：入力途中の文字（部分一致）でもヒットするように修正
                if (selectedDrugFilter !== "ALL") {
                    const normalizedFilter = normalizeString(selectedDrugFilter);
                    const normalizedDrugName = normalizeString(item.drug_name);
                    if (!normalizedDrugName.includes(normalizedFilter)) {
                        return false;
                    }
                }
                if (searchQuery) {
                    const normalizedQuery = normalizeString(searchQuery);
                    const matchShizai = normalizeString(item.shizai_name).includes(normalizedQuery);
                    const matchDrug = normalizeString(item.drug_name).includes(normalizedQuery);
                    if (!matchShizai && !matchDrug) {
                        return false;
                    }
                }
                return true;
            });

            const sortMethod = document.getElementById("sort-selector").value;
            filteredItems.sort((a, b) => {
                const aIsUrgent = (a.is_ordering || (a.current_stock < a.min_stock)) ? 1 : 0;
                const bIsUrgent = (b.is_ordering || (b.current_stock < b.min_stock)) ? 1 : 0;

                if (aIsUrgent !== bIsUrgent) { return bIsUrgent - aIsUrgent; }

                if (sortMethod === "shizai_asc") {
                    return (a.shizai_name || "").localeCompare((b.shizai_name || ""), 'ja');
                } else if (sortMethod === "stock_asc") {
                    return (a.current_stock || 0) - (b.current_stock || 0);
                } else if (sortMethod === "stock_desc") {
                    return (b.current_stock || 0) - (a.current_stock || 0);
                }
                
                const aTime = a.updated_at ? new Date(a.updated_at).getTime() : 0;
                const bTime = b.updated_at ? new Date(b.updated_at).getTime() : 0;
                return bTime - aTime;
            });

            const totalItems = filteredItems.length;
            const totalPages = Math.ceil(totalItems / ITEMS_PER_PAGE) || 1;
            
            if (currentPage > totalPages) currentPage = totalPages;
            if (currentPage < 1) currentPage = 1;

            const startIndex = (currentPage - 1) * ITEMS_PER_PAGE;
            const endIndex = startIndex + ITEMS_PER_PAGE;
            const pageItems = filteredItems.slice(startIndex, endIndex);

            if (totalItems > 0) {
                document.getElementById("page-info").innerText = `${currentPage} / ${totalPages} ページ (${totalItems}件中 ${startIndex + 1}〜${Math.min(endIndex, totalItems)}件)`;
                paginationPanel.classList.remove("hidden");
                document.getElementById("prev-page-btn").disabled = (currentPage === 1);
                document.getElementById("next-page-btn").disabled = (currentPage === totalPages);
            } else {
                stockListElement.innerHTML = `<p class="text-center text-gray-500 py-8">該当する資材が見つかりません。</p>`;
                paginationPanel.classList.add("hidden");
                if (hasAlert) { alertSection.classList.remove("hidden"); } else { alertSection.classList.add("hidden"); }
                return;
            }

            pageItems.forEach(item => {
                const isShortage = item.current_stock < item.min_stock;

                if (editingId === item.id) {
                    const hasPhoto = item.image_url && item.image_url.trim() !== "";

                    const editCardHtml = `
                        <div class="bg-blue-50 p-4 rounded-xl shadow-sm border border-blue-400 text-sm space-y-2">

                            <div>
                                <label class="block text-xs text-gray-500 mb-0.5">薬品名</label>
                                <input type="text" id="edit-drug-${item.id}" value="${item.drug_name}" class="w-full p-1.5 border rounded">
                            </div>
                            <div>
                                <label class="block text-xs text-gray-500 mb-0.5">資材名</label>
                                <input type="text" id="edit-shizai-${item.id}" value="${item.shizai_name}" class="w-full p-1.5 border rounded">
                            </div>
                            <div class="grid grid-cols-2 gap-2">
                                <div>
                                    <label class="block text-xs text-gray-500 mb-0.5">現在在庫</label>
                                    <input type="number" id="edit-current-${item.id}" value="${item.current_stock}" min="0" class="w-full p-1.5 border rounded">
                                </div>
                                <div>
                                    <label class="block text-xs text-gray-500 mb-0.5">最低在庫</label>

        async function updateStock(id, newStock) {
            if (newStock < 0) return;
            const { error } = await db.from('shizai_stocks').update({ current_stock: newStock }).eq('id', id);
            if (error) alert("更新エラー: " + error.message);
            else fetchStocks();
        }

        async function toggleOrderStatus(id, currentOrderingStatus) {
            const { error } = await db.from('shizai_stocks').update({ is_ordering: !currentOrderingStatus }).eq('id', id);
            if (error) alert("更新エラー: " + error.message);
            else fetchStocks();
        }

        // 💡 変更：ボタンを押した時に直接モーダルを開き、個数を選択させる
        function executePayout(id, currentStock) {
            const modal = document.getElementById('payout-confirm-modal');
            const messageEl = document.getElementById('payout-modal-message');
            const confirmBtn = document.getElementById('payout-modal-confirm-btn');
            const selectEl = document.getElementById('payout-count-select');
            
            if (!modal || !selectEl) return;
            
            // モーダルを開いたときは、必ずデフォルトの「1」を選択状態にする
            selectEl.value = "1";
            
            // currentStocksData（または元のデータ配列）から対象の資材名を取得
            const item = currentStocksData ? currentStocksData.find(i => i.id === id) : null;
            const nameStr = item ? item.shizai_name : "この資材";
            
            // モーダルの案内文を設定
            messageEl.innerHTML = `<span class="font-bold text-gray-700">${nameStr}</span>を<br>払い出します。個数を選択してください。`;
            
            // ─── ★ここを修正（drugName と shizaiName を追加して引き継ぐ） ───
            currentPayoutInfo = { 
                id, 
                currentStock,
                drugName: item ? item.drug_name : '不明',
                shizaiName: item ? item.shizai_name : '不明'
            };
            // ──────────────────────────────────────────────────────
            
            // OKボタンに実際のDB更新処理を結びつける
            confirmBtn.onclick = confirmPayoutModal;
            
            // モーダルを表示
            modal.classList.remove('hidden');
        }
        
        // 払い出し一時保持用の変数
        let currentPayoutInfo = null;

        // 💡 変更：モーダルで「OK」が押されたときに、選択された数を元にSupabaseを更新する
        async function confirmPayoutModal() {
            if (!currentPayoutInfo) return;
            
            const { id, currentStock, drugName, shizaiName } = currentPayoutInfo;
            const selectEl = document.getElementById('payout-count-select');
            const payoutCount = parseInt(selectEl.value, 10) || 1;
            
            // 在庫数チェック
            if (payoutCount > currentStock) {
                alert(`在庫数（${currentStock}個）を超える払い出しはできません。`);
                cancelPayoutModal();
                return;
            }
            
            const newStock = currentStock - payoutCount;
            
            try {
                const { error } = await db
                    .from('shizai_stocks')
                    .update({ current_stock: newStock })
                    .eq('id', id);
                    
                if (error) throw error;
                
                // 正常に在庫が減らせたら、履歴に「払い出し」を記録する
                await insertShizaiLog({
                    id: id,
                    drug_name: drugName || '不明',
                    shizai_name: shizaiName || '不明'
                }, '払い出し', payoutCount);
                // ─────────────────────
                
                // トースト通知を表示（関数が存在する場合）
                if (typeof showToast === "function") {
                    showToast(`${payoutCount} 個 払い出しました`);
                }
            } catch (err) {
                console.error(err);
                alert("払い出し処理に失敗しました: " + err.message);
            } finally {
                cancelPayoutModal();
            }
        }

        // モーダルを閉じる処理
        function cancelPayoutModal() {
            const modal = document.getElementById('payout-confirm-modal');
            if (modal) modal.classList.add('hidden');
            currentPayoutInfo = null;
        }
        
        // 💡 変更：ドラムロール（select要素）から値を取得するように修正
        async function executeArrival(id, currentStock) {
            // HTML側で設定したセレクトボックスのID（inbound-count-${id}）に合わせて取得
            const selectElement = document.getElementById(`inbound-count-${id}`);
            
            if (!selectElement) {
                alert("入力要素が見つかりません。");
                return;
            }

            // セレクトボックスから確実に10進数の数値として取得
            const arrivalCount = parseInt(selectElement.value, 10) || 0;
            
            if (arrivalCount <= 0) { 
                alert("1以上の数字を入力してください。"); 
                return; 
            }
            
            // 既存のエラーハンドリングをそのまま維持してSupabaseを更新
            const { error } = await db.from('shizai_stocks')
                .update({ 
                    current_stock: currentStock + arrivalCount, 
                    is_ordering: false 
                })
                .eq('id', id);
                
            if (error) {
                alert("入荷処理エラー: " + error.message);
            } else {
                // 1. 対象の資材データを取得
                const item = currentStocksData ? currentStocksData.find(i => i.id === id) : null;
                
                // 2. 正常に入荷できたら、履歴に「入庫」を記録
                await insertShizaiLog({
                    id: id,
                    drug_name: item ? item.drug_name : '不明',
                    shizai_name: item ? item.shizai_name : '不明'
                }, '入庫', arrivalCount);
                // ─────────────────────
                
                // トースト通知を表示（関数が存在する場合）
                if (typeof showToast === "function") {
                    showToast(`${arrivalCount} 個 入荷しました`);
                }
                fetchStocks(); // 成功したら一覧を再読み込み
            }
        }

        async function deleteShizai(id) {
            const targetItem = currentStocksData.find(item => item.id === id);
            const nameForConfirm = targetItem ? `${targetItem.drug_name}の${targetItem.shizai_name}` : "この資材";
            if (!confirm(`【確認】\n「${nameForConfirm}」の登録を完全に削除しますか？`)) return;

            try {
                if (targetItem && targetItem.image_url) {
                    const storagePath = extractStoragePath(targetItem.image_url);
                    if (storagePath) {
                        await db.storage.from('shizai-images').remove([storagePath]);
                    }
                }
                const { error } = await db.from('shizai_stocks').delete().eq('id', id);
                if (error) throw error;
                fetchStocks();
            } catch (err) {
                alert("削除エラー: " + err.message);
            }
        }

        // 💡 変更：編集開始時のデータを完全に記憶する
        function enterEditMode(id) {
            editingId = id;
            
            // currentStocksDataから、編集を開始した資材のデータを特定して記憶する
            const originalItem = currentStocksData ? currentStocksData.find(item => item.id === id) : null;
            if (originalItem) {
                editInitialState = {
                    drug_name: originalItem.drug_name || "",
                    shizai_name: originalItem.shizai_name || "",
                    current_stock: originalItem.current_stock || 0,
                    min_stock: originalItem.min_stock || 0,
                    contents: originalItem.contents || "",
                    image_url: originalItem.image_url || "",
                    order_url: originalItem.order_url || "",
                    phone_name: originalItem.phone_name || "",
                    phone_number: originalItem.phone_number || ""
                };
            }
            
            renderStockList();
        }

        // 💡 変更：キャンセル時に記憶も消す
        function cancelEdit() {
            editingId = null;
            editInitialState = null; // 記憶をリセット
            renderStockList();
        }

        async function saveEdit(id) {
            const nextDrug = document.getElementById(`edit-drug-${id}`).value.trim();
            const nextShizai = document.getElementById(`edit-shizai-${id}`).value.trim();
            const nextCurrent = parseInt(document.getElementById(`edit-current-${id}`).value) || 0;
            const nextMin = parseInt(document.getElementById(`edit-min-${id}`).value) || 0;
            const nextContents = document.getElementById(`edit-contents-${id}`).value.trim();
            const nextImageUrl = document.getElementById(`edit-image-url-${id}`).value.trim();
            const nextOrderUrl = document.getElementById(`edit-order-url-${id}`).value.trim();
            const nextPhoneName = document.getElementById(`edit-phone-name-${id}`).value.trim();
            const nextPhoneNumber = document.getElementById(`edit-phone-number-${id}`).value.trim();

            if (!nextDrug || !nextShizai) { alert("薬品名と資材名称は空欄にできません。"); return; }

            const { error } = await db.from('shizai_stocks')
                .update({ 
                    drug_name: nextDrug, 
                    shizai_name: nextShizai, 
                    current_stock: nextCurrent, 
                    min_stock: nextMin,
                    contents: nextContents, 
                    image_url: nextImageUrl,
                    order_type: 'hybrid',
                    order_url: nextOrderUrl,
                    phone_name: nextPhoneName,
                    phone_number: nextPhoneNumber
                })
                .eq('id', id);

            if (error) {
                alert("修正保存エラー: " + error.message);
            } else {
                editingId = null;
                editInitialState = null; // 💡 ここを追加（保存成功時に記憶をクリア）
                fetchStocks(); 
            }
        }

            document.getElementById("popup-shizai-name").innerText = shizaiName;
            document.getElementById("popup-drug-name").innerText = `対象薬品: ${drugName}`;
            const contentsElement = document.getElementById("popup-contents");
            contentsElement.innerText = contents;
            contentsElement.classList.remove("hidden");
            document.getElementById("popup-image-container").classList.add("hidden");
            document.getElementById("info-popup").classList.remove("hidden");

        function openImagePopup(event, shizaiName, drugName, imageUrl) {
            event.stopPropagation();

            document.getElementById("popup-shizai-name").innerText = shizaiName;
            document.getElementById("popup-drug-name").innerText = `対象薬品: ${drugName}`;
            document.getElementById("popup-contents").classList.add("hidden");
            const imgContainer = document.getElementById("popup-image-container");
            document.getElementById("popup-image").src = imageUrl;
            imgContainer.classList.remove("hidden");
            document.getElementById("info-popup").classList.remove("hidden");
        }

            document.getElementById("info-popup").classList.add("hidden");

        // トースト通知を制御する本体関数
        function showToast(message) {
            const toast = document.getElementById("custom-toast");
            const toastMsg = document.getElementById("toast-message");
            if (!toast || !toastMsg) return;

            toastMsg.innerText = message;
            
            // 画面にふわっと表示
            toast.classList.remove("opacity-0", "pointer-events-none");
            toast.classList.add("opacity-100");

            // 2.5秒後に自動でふわっと消去
            setTimeout(() => {
                toast.classList.remove("opacity-100");
                toast.classList.add("opacity-0", "pointer-events-none");
            }, 2500);
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker 登録成功完了', reg))
                    .catch(err => console.error('Service Worker 登録失敗', err));
            });
        }

        // 💡 画面表示モードとフッタータブの選択状態を切り替える関数
        function switchView(mode) {
            const stocksListSection = document.getElementById('stocks-list-section');
            const historySection = document.getElementById('history-section');
            
            // タブボタンの要素を取得
            const tabListBtn = document.getElementById('tab-list-btn');
            const tabHistoryBtn = document.getElementById('tab-history-btn');
            
            if (mode === 'history') {
                // 1. 資材一覧・検索・タブをすべて非表示にし、履歴エリアだけを表示
                if (stocksListSection) stocksListSection.classList.add('hidden');
                if (historySection) historySection.classList.remove('hidden');
                
                // 2. フッタータブの色を切り替える（履歴を青に、一覧をグレーに）
                tabListBtn.classList.replace('text-blue-600', 'text-gray-400');
                tabHistoryBtn.classList.replace('text-gray-400', 'text-blue-600');
                
                // 3. カレンダーの初期値（今月1日〜今日）をセットしてデータを取得
                const now = new Date();
                const firstDay = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0];
                const today = now.toISOString().split('T')[0];
                
                if (document.getElementById('history-start-date')) {
                    document.getElementById('history-start-date').value = firstDay;
                    document.getElementById('history-end-date').value = today;
                }
                
                // 履歴と集計を呼び出す
                fetchAndAnalyzeLogs();
            } else {
                // 1. 履歴エリアを非表示にし、資材一覧エリアを再表示
                if (stocksListSection) stocksListSection.classList.remove('hidden');
                if (historySection) historySection.classList.add('hidden');
                
                // 2. フッタータブの色を切り替える（一覧を青に、履歴をグレーに）
                tabListBtn.classList.replace('text-gray-400', 'text-blue-600');
                tabHistoryBtn.classList.replace('text-blue-600', 'text-gray-400');
                
                // 資材一覧を最新の状態にする
                fetchStocks();
            }
        }

        // 履歴の取得と特定期間のランキング集計
        async function fetchAndAnalyzeLogs() {
            const startDate = document.getElementById('history-start-date').value;
            const endDate = document.getElementById('history-end-date').value;
            
            if (!startDate || !endDate) return;
        
            // 終了日はその日の 23:59:59 まで含めるように調整
            const startISO = `${startDate}T00:00:00.000Z`;
            const endISO = `${endDate}T23:59:59.999Z`;
        
            // 1. Supabaseから期間内のログを全件取得（降順）
            const { data: logs, error } = await db
                .from('shizai_logs')
                .select('*')
                .gte('created_at', startISO)
                .lte('created_at', endISO)
                .order('created_at', { ascending: false });
        
            if (error) {
                console.error("履歴の取得に失敗しました:", error.message);
                return;
            }
        
            // 2. 履歴タイムラインの描画
            const timelineEl = document.getElementById('logs-timeline');
            if (logs.length === 0) {
                timelineEl.innerHTML = `<p class="text-xs text-gray-400 text-center py-4">指定期間内に履歴はありません</p>`;
            } else {
                timelineEl.innerHTML = logs.map(log => {
                    const date = new Date(log.created_at).toLocaleString('ja-JP', {month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit'});
                    const isPayout = log.type === '払い出し';
                    const badgeColor = isPayout ? 'bg-red-50 text-red-600' : 'bg-green-50 text-green-600';
                    return `
                        <div class="flex items-center justify-between p-2.5 border-b border-gray-50 text-xs">
                            <div class="flex-1 min-w-0 pr-2">
                                <div class="text-[10px] text-gray-400">${date} [${log.drug_name}]</div>
                                <div class="font-medium text-gray-700 truncate">${log.shizai_name}</div>
                            </div>
                            <div class="flex items-center gap-2">
                                <span class="px-2 py-0.5 rounded-full text-[10px] font-bold ${badgeColor}">${log.type}</span>
                                <span class="font-bold text-gray-800 w-8 text-right">${log.quantity}個</span>
                            </div>
                        </div>
                    `;
                }).join('');
            }

            // 3. ランキング集計ロジック (品目ごとに数量を合計)
            const payoutMap = {};
            const arrivalMap = {};
        
            logs.forEach(log => {
                const key = `${log.drug_name} - ${log.shizai_name}`;
                if (log.type === '払い出し') {
                    payoutMap[key] = (payoutMap[key] || 0) + log.quantity;
                } else if (log.type === '入庫') {
                    arrivalMap[key] = (arrivalMap[key] || 0) + log.quantity;
                }
            });
        
            // オブジェクトを配列に変換して数量順にソート (上位5件)
            const sortedPayouts = Object.entries(payoutMap).sort((a, b) => b[1] - a[1]).slice(0, 5);
            const sortedArrivals = Object.entries(arrivalMap).sort((a, b) => b[1] - a[1]).slice(0, 5);
        
            // 4. ランキング表示の反映
            const renderRanking = (elementId, data) => {
            const el = document.getElementById(elementId);
            if (data.length === 0) {
                el.innerHTML = `<li class="text-gray-400 list-none text-xs">データなし</li>`;
            } else {
                // 💡 履歴タイムラインと同じ text-xs に統一し、中の薬品名は text-[10px] で一段小さくメリハリをつけます
                el.innerHTML = data.map(([name, qty]) => {
                    const parts = name.split(' - ');
                    const drugPart = parts[0] ? parts[0] : '';
                    const shizaiPart = parts[1] ? parts[1] : name;
                    
                    return `
                        <li class="text-xs text-gray-700">
                            <div class="text-[10px] text-gray-400 font-normal leading-none mb-0.5">${drugPart}</div>
                            <div class="font-medium">
                                ${shizaiPart}
                                <span class="font-bold text-gray-900 whitespace-nowrap ml-0.5">(${qty}個)</span>
                            </div>
                        </li>
                    `;
                }).join('');
            }
        };
    
        renderRanking('payout-ranking', sortedPayouts);
        renderRanking('arrival-ranking', sortedArrivals);
        }
    </script>
