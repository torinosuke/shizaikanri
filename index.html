<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>患者用資材管理ページ</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .cursor-pointer, .header-title-btn, .page-btn { -webkit-tap-highlight-color: transparent; }

<body class="bg-gray-100 min-h-screen text-gray-800 font-sans pb-12">

    <header class="bg-blue-600 text-white p-4 sticky top-0 z-50 shadow-md">
        <div class="container mx-auto flex justify-between items-center max-w-md">
            <h1 onclick="resetToAllDrugs()" class="text-xl font-bold cursor-pointer active:opacity-80 transition header-title-btn select-none" title="全資材一覧を表示">

        </div>

                <span>新しく資材を登録する</span>

            </h2>
            <div class="space-y-3 text-sm">

                    <label class="block text-gray-600 font-medium mb-1">対象薬品名</label>
                    <select id="input-drug-select" onchange="toggleDrugInputMethod()" class="w-full p-2 border rounded-lg bg-gray-50 font-bold text-gray-700 outline-none">
                    </select>
                    <input type="text" id="input-drug-text" placeholder="例：〇〇皮下注（新しい薬品名を入力）" class="w-full p-2 border rounded-lg outline-none mt-2 hidden">
                </div>
                <div>
                    <label class="block text-gray-600 font-medium mb-1">資材名称</label>
                    <input type="text" id="input-shizai" placeholder="例：患者用説明資材、保冷バッグ" class="w-full p-2 border rounded-lg outline-none">
                </div>
                
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-gray-600 font-medium mb-1">初期在庫数</label>
                        <input type="number" id="input-current" value="0" min="0" class="w-full p-2 border rounded-lg outline-none">
                    </div>
                    <div>
                        <label class="block text-gray-600 font-medium mb-1">最低在庫数</label>

                    <button id="search-clear-btn" onclick="clearSearchInput()" class="absolute inset-y-0 right-0 px-3 flex items-center text-gray-400 hover:text-gray-600 hidden">✕</button>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-2">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1.5">対象薬品フィルター</label>
                    <div class="relative">
                        <select id="drug-filter" onchange="filterSelectorChanged()" class="w-full p-2.5 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-400 outline-none text-xs font-bold text-gray-700 appearance-none">

                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2.5 text-gray-500 text-xs">▼</div>
                    </div>
                </div>

                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1.5">並び替え</label>
                    <div class="relative">

                            <option value="shizai_asc">名称（五十音順）</option>
                            <option value="stock_asc">在庫（少ない順）</option>
                            <option value="stock_desc">在庫（多い順）</option>

        <hr class="border-gray-300 my-4">

        <h2 id="list-title" class="font-bold text-lg mb-3 text-gray-700">資材一覧</h2>

            <button id="prev-page-btn" onclick="changePage(-1)" class="bg-gray-100 hover:bg-gray-200 active:bg-gray-300 text-gray-700 font-bold py-1.5 px-3 rounded-lg transition disabled:opacity-40 page-btn">
                ◀ 前へ
            </button>
            <span id="page-info" class="font-bold text-gray-600 select-none">
                1 / 1 ページ

            <button id="next-page-btn" onclick="changePage(1)" class="bg-gray-100 hover:bg-gray-200 active:bg-gray-300 text-gray-700 font-bold py-1.5 px-3 rounded-lg transition disabled:opacity-40 page-btn">
                次へ ▶
            </button>
        </div>

    <script>
        const SUPABASE_URL = "https://kkxpqxaxthrcxdvrmbty.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtreHBxeGF4dGhyY3hkdnJtYnR5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3NzMzODgsImV4cCI6MjA5NjM0OTM4OH0.Ptcn2lYMqbn4L5g1sV7r6E372cxfIyhsxgAkH7a65aU";
        
        let db;
        try { db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY); } catch (e) { console.error(e); }

        let currentStocksData = [];
        let editingId = null;
        let selectedDrugFilter = "ALL";
        let openedCardId = null;

        let searchQuery = "";
        let currentPage = 1;
        const ITEMS_PER_PAGE = 10;

        // ページ読み込み時に初期データを取得し、同時にリアルタイム監視を開始
        document.addEventListener("DOMContentLoaded", () => {
            fetchStocks(); // 初期読み込み
            
            // 🔄 同時編集コンフリクト防止：リアルタイム同期リスナーの登録
            db.channel('public:shizai_stocks')
                .on(
                    'postgres_changes',

                        schema: 'public',

                    (payload) => {

                        fetchStocks(); // 誰かが更新したら画面を自動で再描画
                    }

        });
        
        function toggleAddForm() {
            const form = document.getElementById("add-form-section");
            form.classList.toggle("hidden");
        }

        function handleSearchInput() {
            const input = document.getElementById("search-input");
            searchQuery = input.value.trim();
            
            const clearBtn = document.getElementById("search-clear-btn");
            if (searchQuery.length > 0) {
                clearBtn.classList.remove("hidden");
            } else {
                clearBtn.classList.add("hidden");
            }
            
            currentPage = 1;
            renderStockList();
        }

        function clearSearchInput() {
            document.getElementById("search-input").value = "";
            searchQuery = "";
            document.getElementById("search-clear-btn").classList.add("hidden");
            currentPage = 1;
            renderStockList();
        }

        function changePage(direction) {
            currentPage += direction;
            openedCardId = null;
            renderStockList();
            document.getElementById("list-title").scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function filterSelectorChanged() {
            selectedDrugFilter = document.getElementById("drug-filter").value;
            currentPage = 1;
            renderStockList();
        }

        function handleSortChanged() {
            currentPage = 1;
            renderStockList();
        }

        function resetToAllDrugs() {
            selectedDrugFilter = "ALL";
            const filterElement = document.getElementById("drug-filter");
            if (filterElement) filterElement.value = "ALL";
            
            clearSearchInput();
            
            const form = document.getElementById("add-form-section");
            if (form && !form.classList.contains("hidden")) {
                form.classList.add("hidden");
            }
        }

        function normalizeString(str) {
            if (!str) return "";
            return str.toLowerCase()
                .normalize("NFKC")
                .replace(/[\u30a1-\u30f6]/g, function(match) {
                    return String.fromCharCode(match.charCodeAt(0) - 0x60);
                });
        }

        function toggleDetails(id) {
            const panel = document.getElementById(`control-panel-${id}`);
            const arrow = document.getElementById(`arrow-${id}`);
            if (!panel) return;

            if (openedCardId === id) {
                panel.classList.add("hidden");
                if (arrow) arrow.innerText = "▼";
                openedCardId = null;
            } else {
                if (openedCardId !== null) {
                    const oldPanel = document.getElementById(`control-panel-${openedCardId}`);
                    const oldArrow = document.getElementById(`arrow-${openedCardId}`);
                    if (oldPanel) oldPanel.classList.add("hidden");
                    if (oldArrow) oldArrow.innerText = "▼";
                }
                panel.classList.remove("hidden");
                if (arrow) arrow.innerText = "▲";
                openedCardId = id;
            }
        }

        function toggleDrugInputMethod() {
            const selectElement = document.getElementById("input-drug-select");
            const textInputElement = document.getElementById("input-drug-text");
            if (selectElement.value === "__NEW__") {
                textInputElement.classList.remove("hidden");
                textInputElement.focus();
            } else {
                textInputElement.classList.add("hidden");
                textInputElement.value = "";
            }
        }

        function extractStoragePath(url) {
            if (!url || !url.includes('/storage/v1/object/public/shizai-images/')) return null;
            return url.split('/storage/v1/object/public/shizai-images/')[1];
        }

        // 🌟 【新規追加】画像をブラウザ側で軽量化（縮小・リサイズ・圧縮）する関数
        function compressImage(file, maxWidth = 800, quality = 0.75) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        // 縮小後のサイズ計算（アスペクト比維持）
                        let width = img.width;
                        let height = img.height;
                        if (width > maxWidth) {
                            height = Math.round((height * maxWidth) / width);
                            width = maxWidth;
                        }

                        // Canvasを使って再描画
                        const canvas = document.createElement('canvas');
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        // 指定した画質(quality)のJPEG形式のBlob（バイナリ）に変換
                        canvas.toBlob((blob) => {
                            if (blob) {
                                // Supabaseがファイルとして認識できるよう、Fileオブジェクトを再生成して返す
                                const compressedFile = new File([blob], file.name, {
                                    type: 'image/jpeg',
                                    lastModified: Date.now()
                                });
                                resolve(compressedFile);
                            } else {
                                reject(new Error("Canvas to Blob 変換に失敗しました"));
                            }
                        }, 'image/jpeg', quality);
                    };
                    img.onerror = (err) => reject(err);
                };
                reader.onerror = (err) => reject(err);
            });
        }

        async function uploadImageHandler(mode, id = null) {
            const fileInput = mode === 'add' ? document.getElementById('input-image-file') : document.getElementById(`edit-image-file-${id}`);
            const statusLabel = mode === 'add' ? document.getElementById('add-upload-status') : document.getElementById(`edit-upload-status-${id}`);
            const urlHiddenInput = mode === 'add' ? document.getElementById('input-image-url') : document.getElementById(`edit-image-url-${id}`);

            if (!fileInput || !fileInput.files || fileInput.files.length === 0) return;
            
            let file = fileInput.files[0];
            statusLabel.innerText = "⏳ 画像を圧縮・最適化中...";
            statusLabel.className = "text-xxs text-blue-600 font-bold animate-pulse";

            try {
                // 🌟 【変更点】アップロード前に compressImage 関数を呼び出して軽量化
                // 横幅最大800px、画質75%のコンパクトなJPEG形式に変換します。
                file = await compressImage(file, 800, 0.75);

                statusLabel.innerText = "⏳ アップロード中...";

                if (mode === 'edit' && id) {
                    const targetItem = currentStocksData.find(item => item.id === id);
                    if (targetItem && targetItem.image_url) {
                        const oldStoragePath = extractStoragePath(targetItem.image_url);
                        if (oldStoragePath) {
                            await db.storage.from('shizai-images').remove([oldStoragePath]);
                        }
                    }
                }

                // 拡張子を強制的に .jpg に合わせてファイル名を生成
                const fileName = `${Date.now()}_${Math.random().toString(36).substring(2, 7)}.jpg`;
                const filePath = `shizai_pics/${fileName}`;

                const { data, error } = await db.storage
                    .from('shizai-images')
                    .upload(filePath, file);

                if (error) throw error;

                const { data: urlData } = db.storage
                    .from('shizai-images')
                    .getPublicUrl(filePath);

                urlHiddenInput.value = urlData.publicUrl;
                statusLabel.innerText = "✅ 最適化・アップロード完了";
                statusLabel.className = "text-xxs text-green-600 font-bold";

                const deleteBtn = document.getElementById(`btn-delete-image-${id}`);
                if (deleteBtn) deleteBtn.classList.remove("hidden");

            } catch (err) {
                console.error(err);
                statusLabel.innerText = "❌ エラーが発生しました";
                statusLabel.className = "text-xxs text-red-500 font-bold";
                alert("画像の処理に失敗しました: " + err.message);
            }
        }

        async function deleteImageOnly(id) {
            const urlHiddenInput = document.getElementById(`edit-image-url-${id}`);
            const statusLabel = document.getElementById(`edit-upload-status-${id}`);
            const deleteBtn = document.getElementById(`btn-delete-image-${id}`);
            
            if (!urlHiddenInput || !urlHiddenInput.value) return;

            if (!confirm("【確認】この資材の写真データを完全に消去し、「写真なし」の状態に戻しますか？")) return;

            const currentUrl = urlHiddenInput.value;
            statusLabel.innerText = "⏳ 写真を消去中...";
            statusLabel.className = "text-xxs text-orange-600 font-bold";

            try {
                const storagePath = extractStoragePath(currentUrl);
                if (storagePath) {
                    const { error: storageError } = await db.storage
                        .from('shizai-images')
                        .remove([storagePath]);
                    if (storageError) console.warn("Storageからの削除に失敗しました:", storageError.message);
                }

                urlHiddenInput.value = "";
                statusLabel.innerText = "🗑️ 写真を削除しました（未保存）";
                statusLabel.className = "text-xxs text-red-500 font-bold";
                
                if (deleteBtn) deleteBtn.classList.add("hidden");

            } catch (err) {
                console.error(err);
                alert("写真の消去中にエラーが発生しました: " + err.message);
            }
        }

        async function addNewShizai() {
            const selectElement = document.getElementById("input-drug-select");
            const textInputElement = document.getElementById("input-drug-text");
            
            let drug = (selectElement.value === "__NEW__") ? textInputElement.value.trim() : selectElement.value;

            }

            }

                document.getElementById("input-current").value = "0";
                document.getElementById("input-contents").value = "";
                document.getElementById("input-image-url").value = "";
                document.getElementById("input-image-file").value = "";
                document.getElementById("add-upload-status").innerText = "未選択";
                document.getElementById("add-upload-status").className = "text-xxs text-gray-400 truncate max-w-[180px]";
                document.getElementById("input-order-url").value = "";
                document.getElementById("input-phone-name").value = "";
                document.getElementById("input-phone-number").value = "";
                toggleAddForm();
                
                selectedDrugFilter = drug;

        }

        async function fetchStocks() {
            const errorArea = document.getElementById("error-message");
            const errorText = document.getElementById("error-text");
            errorArea.classList.add("hidden");

            try {
                const { data: stocks, error } = await db
                    .from('shizai_stocks')
                    .select('*')
                    .order('id', { ascending: true });

                if (error) {
                    errorText.innerText = error.message;
                    errorArea.classList.remove("hidden");
                    return;
                }

                currentStocksData = stocks || [];
                updateDrugFilterOptions();
                updateAddFormDrugOptions();
                renderStockList();

            } catch (e) {
                errorText.innerText = "通信エラー: " + e.message;
                errorArea.classList.remove("hidden");
            }
        }

        function updateDrugFilterOptions() {
            const filterElement = document.getElementById("drug-filter");
            const drugNames = [...new Set(currentStocksData.map(item => item.drug_name))]
                .sort((a, b) => a.localeCompare(b, 'ja'));

            filterElement.innerHTML = `<option value="ALL">全ての薬品</option>`;
            drugNames.forEach(name => {
                const selectedAttr = (name === selectedDrugFilter) ? "selected" : "";
                filterElement.innerHTML += `<option value="${name}" ${selectedAttr}>${name}</option>`;
            });
            if (selectedDrugFilter !== "ALL" && !drugNames.includes(selectedDrugFilter)) {
                selectedDrugFilter = "ALL";
                filterElement.value = "ALL";
            }
        }

        function updateAddFormDrugOptions() {
            const selectElement = document.getElementById("input-drug-select");
            if (!selectElement) return;
            const drugNames = [...new Set(currentStocksData.map(item => item.drug_name))]
                .sort((a, b) => a.localeCompare(b, 'ja'));

            let html = `<option value="">ーー 選択してください ーー</option>`;
            drugNames.forEach(name => { html += `<option value="${name}">${name}</option>`; });
            html += `<option value="__NEW__">➕ 新しい薬品を追加（直接入力）...</option>`;
            selectElement.innerHTML = html;
        }

        function renderStockList() {
            const stockListElement = document.getElementById("stock-list");
            const alertSection = document.getElementById("alert-section");
            const alertListElement = document.getElementById("alert-list");
            const listTitleElement = document.getElementById("list-title");
            const paginationPanel = document.getElementById("pagination-panel");

            stockListElement.innerHTML = "";
            alertListElement.innerHTML = "";
            let hasAlert = false;

            if (currentStocksData.length === 0) {
                stockListElement.innerHTML = `<p class="text-center text-gray-500 py-8">資材が登録されていません。</p>`;
                alertSection.classList.add("hidden");
                paginationPanel.classList.add("hidden");
                return;
            }

            if (selectedDrugFilter === "ALL") {
                listTitleElement.innerText = searchQuery ? `検索結果一覧` : "全資材一覧";
            } else {
                listTitleElement.innerText = `「${selectedDrugFilter}」の資材一覧`;
            }

            currentStocksData.forEach(item => {
                const isShortage = item.current_stock < item.min_stock;
                if (isShortage && !item.is_ordering) {
                    hasAlert = true;
                    alertListElement.innerHTML += `
                        <div class="bg-red-100 border-l-4 border-red-500 text-red-700 p-2 text-sm rounded shadow-sm">
                            <strong>${item.drug_name}</strong>: ${item.shizai_name} (残り ${item.current_stock}個 / 最低 ${item.min_stock}個)
                        </div>
                    `;
                }
            });

            let filteredItems = currentStocksData.filter(item => {
                if (selectedDrugFilter !== "ALL" && item.drug_name !== selectedDrugFilter) {
                    return false;
                }
                if (searchQuery) {
                    const normalizedQuery = normalizeString(searchQuery);
                    const matchShizai = normalizeString(item.shizai_name).includes(normalizedQuery);
                    const matchDrug = normalizeString(item.drug_name).includes(normalizedQuery);
                    if (!matchShizai && !matchDrug) {
                        return false;
                    }
                }
                return true;
            });

            const sortMethod = document.getElementById("sort-selector").value;
            filteredItems.sort((a, b) => {
                const aIsUrgent = (a.is_ordering || (a.current_stock < a.min_stock)) ? 1 : 0;
                const bIsUrgent = (b.is_ordering || (b.current_stock < b.min_stock)) ? 1 : 0;

                if (aIsUrgent !== bIsUrgent) { return bIsUrgent - aIsUrgent; }

                if (sortMethod === "shizai_asc") {
                    return (a.shizai_name || "").localeCompare((b.shizai_name || ""), 'ja');
                } else if (sortMethod === "stock_asc") {
                    return (a.current_stock || 0) - (b.current_stock || 0);
                } else if (sortMethod === "stock_desc") {
                    return (b.current_stock || 0) - (a.current_stock || 0);
                }
                
                const aTime = a.updated_at ? new Date(a.updated_at).getTime() : 0;
                const bTime = b.updated_at ? new Date(b.updated_at).getTime() : 0;
                return bTime - aTime;
            });

            const totalItems = filteredItems.length;
            const totalPages = Math.ceil(totalItems / ITEMS_PER_PAGE) || 1;
            
            if (currentPage > totalPages) currentPage = totalPages;
            if (currentPage < 1) currentPage = 1;

            const startIndex = (currentPage - 1) * ITEMS_PER_PAGE;
            const endIndex = startIndex + ITEMS_PER_PAGE;
            const pageItems = filteredItems.slice(startIndex, endIndex);

            if (totalItems > 0) {
                document.getElementById("page-info").innerText = `${currentPage} / ${totalPages} ページ (${totalItems}件中 ${startIndex + 1}〜${Math.min(endIndex, totalItems)}件)`;

        async function updateStock(id, newStock) {
            if (newStock < 0) return;
            const { error } = await db.from('shizai_stocks').update({ current_stock: newStock }).eq('id', id);
            if (error) alert("更新エラー: " + error.message);
            else fetchStocks();
        }

        async function toggleOrderStatus(id, currentOrderingStatus) {
            const { error } = await db.from('shizai_stocks').update({ is_ordering: !currentOrderingStatus }).eq('id', id);
            if (error) alert("更新エラー: " + error.message);
            else fetchStocks();
        }

        // 誤タップ防止＆複数対応の払い出し処理（カスタムモーダル版）
        async function executePayout(id, currentStock) {
            const inputElement = document.getElementById(`payout-count-${id}`);
            const payoutCount = parseInt(inputElement.value, 10) || 0;
            
            if (payoutCount <= 0) {
                alert("1以上の数字を入力してください。");
                return;
            }
            if (payoutCount > currentStock) {
                alert(`在庫数（${currentStock}個）を超える払い出しはできません。`);
                return;
            }
            
            // 情報を一時的に記憶
            currentPayoutInfo = { id, currentStock, payoutCount };
            
            // モーダルの文言を書き換えて表示
            document.getElementById('payout-modal-message').innerText = `この資材を ${payoutCount} 個 払い出してよろしいですか？`;
            
            // OKボタンに処理を結びつける
            document.getElementById('payout-modal-confirm-btn').onclick = confirmPayoutModal;
            
            // モーダルを表示
            document.getElementById('payout-confirm-modal').classList.remove('hidden');
        }
        
        // 払い出し一時保持用の変数
        let currentPayoutInfo = null;

        // モーダルを閉じる処理
        function cancelPayoutModal() {
            document.getElementById('payout-confirm-modal').classList.add('hidden');
            currentPayoutInfo = null;
        }

        // モーダルでOKが押された時の実際の処理
        async function confirmPayoutModal() {
            if (!currentPayoutInfo) return;
            const { id, currentStock, payoutCount } = currentPayoutInfo;
            
            // モーダルを即座に閉じる
            document.getElementById('payout-confirm-modal').classList.add('hidden');
            
            const newStock = currentStock - payoutCount;
            
            // Supabaseを更新
            const { error } = await db.from('shizai_stocks')
                .update({ current_stock: newStock })
                .eq('id', id);
                
            if (error) {
                alert("払い出し処理エラー: " + error.message);
            } else {
                if (typeof showToast === "function") {
                    showToast(`払い出しが完了しました（-${payoutCount}個）`);
                }
                fetchStocks(); // 一覧を再読み込み
            }
            
            currentPayoutInfo = null; // 変数をクリア
        }
        
        async function executeArrival(id, currentStock) {
            const inputElement = document.getElementById(`arrival-count-${id}`);
            // input[type="number"] から確実に10進数の数値として取得（予期せぬ挙動防止）
            const arrivalCount = parseInt(inputElement.value, 10) || 0;
            
            if (arrivalCount <= 0) { 
                alert("1以上の数字を入力してください。"); 
                return; 
            }
            
            // 既存のエラーハンドリングをそのまま維持してSupabaseを更新
            const { error } = await db.from('shizai_stocks')
                .update({ 
                    current_stock: currentStock + arrivalCount, 
                    is_ordering: false 
                })
                .eq('id', id);
                
            if (error) {
                alert("入荷処理エラー: " + error.message);
            } else {
                fetchStocks(); // 成功したら一覧を再読み込み
            }
        }

        async function deleteShizai(id) {
            const targetItem = currentStocksData.find(item => item.id === id);
            const nameForConfirm = targetItem ? `${targetItem.drug_name}の${targetItem.shizai_name}` : "この資材";
            if (!confirm(`【確認】\n「${nameForConfirm}」の登録を完全に削除しますか？`)) return;

            try {
                if (targetItem && targetItem.image_url) {
                    const storagePath = extractStoragePath(targetItem.image_url);
                    if (storagePath) {
                        await db.storage.from('shizai-images').remove([storagePath]);
                    }
                }
                const { error } = await db.from('shizai_stocks').delete().eq('id', id);
                if (error) throw error;
                fetchStocks();
            } catch (err) {
                alert("削除エラー: " + err.message);
            }
        }

        function enterEditMode(id) { editingId = id; renderStockList(); }
        function cancelEdit() { editingId = null; renderStockList(); }

        async function saveEdit(id) {
            const nextDrug = document.getElementById(`edit-drug-${id}`).value.trim();
            const nextShizai = document.getElementById(`edit-shizai-${id}`).value.trim();
            const nextCurrent = parseInt(document.getElementById(`edit-current-${id}`).value) || 0;
            const nextMin = parseInt(document.getElementById(`edit-min-${id}`).value) || 0;
            const nextContents = document.getElementById(`edit-contents-${id}`).value.trim();
            const nextImageUrl = document.getElementById(`edit-image-url-${id}`).value.trim();
            const nextOrderUrl = document.getElementById(`edit-order-url-${id}`).value.trim();
            const nextPhoneName = document.getElementById(`edit-phone-name-${id}`).value.trim();
            const nextPhoneNumber = document.getElementById(`edit-phone-number-${id}`).value.trim();

            if (!nextDrug || !nextShizai) { alert("薬品名と資材名称は空欄にできません。"); return; }

            const { error } = await db.from('shizai_stocks')
                .update({ 
                    drug_name: nextDrug, 
                    shizai_name: nextShizai, 
                    current_stock: nextCurrent, 
                    min_stock: nextMin,
                    contents: nextContents, 
                    image_url: nextImageUrl,
                    order_type: 'hybrid',
                    order_url: nextOrderUrl,
                    phone_name: nextPhoneName,
                    phone_number: nextPhoneNumber
                })
                .eq('id', id);

            if (error) {
                alert("修正保存エラー: " + error.message);
            } else {
                editingId = null;
                fetchStocks(); 
            }
        }

        function openInfoPopup(event, shizaiName, drugName, contents) {
            event.stopPropagation();
            document.getElementById("popup-title").innerText = "⚠️ 資材の備考・内訳";
            document.getElementById("popup-shizai-name").innerText = shizaiName;
            document.getElementById("popup-drug-name").innerText = `対象薬品: ${drugName}`;
            const contentsElement = document.getElementById("popup-contents");
            contentsElement.innerText = contents;
            contentsElement.classList.remove("hidden");
            document.getElementById("popup-image-container").classList.add("hidden");
            document.getElementById("info-popup").classList.remove("hidden");
        }

        function openImagePopup(event, shizaiName, drugName, imageUrl) {
            event.stopPropagation();
            document.getElementById("popup-title").innerText = "📷 資材写真の拡大";
            document.getElementById("popup-shizai-name").innerText = shizaiName;
            document.getElementById("popup-drug-name").innerText = `対象薬品: ${drugName}`;
            document.getElementById("popup-contents").classList.add("hidden");
            const imgContainer = document.getElementById("popup-image-container");
            document.getElementById("popup-image").src = imageUrl;
            imgContainer.classList.remove("hidden");
            document.getElementById("info-popup").classList.remove("hidden");
        }

        function closeInfoPopup() {
            document.getElementById("info-popup").classList.add("hidden");
        }
    </script>
    
    <div id="info-popup" class="fixed inset-0 bg-black bg-opacity-60 z-50 flex items-center justify-center p-4 hidden" onclick="closeInfoPopup()">
        <div class="bg-white rounded-2xl max-w-sm w-full p-5 shadow-2xl space-y-2.5" onclick="event.stopPropagation();">
            <div class="flex justify-between items-center border-b pb-1.5">
                <span id="popup-title" class="text-xs font-bold text-gray-400 bg-gray-100 px-2 py-0.5 rounded">ポップアップ</span>
                <button onclick="closeInfoPopup()" class="text-gray-400 hover:text-gray-600 text-xl font-bold px-1">✕</button>
            </div>
            <div class="pt-1">
                <h4 id="popup-shizai-name" class="font-bold text-gray-800 text-base leading-tight">資材名</h4>
                <p class="text-xxs text-gray-400 font-medium mt-0.5" id="popup-drug-name">薬品名</p>
            </div>
            <div id="popup-image-container" class="mt-2 text-center hidden">
                <img id="popup-image" src="" class="w-full h-auto max-h-64 object-contain rounded-xl border bg-gray-50 shadow-inner">
            </div>
            <div class="bg-orange-50 border border-orange-100 rounded-xl p-3 text-sm text-gray-700 whitespace-pre-wrap leading-relaxed hidden shadow-inner" id="popup-contents"></div>
            <button onclick="closeInfoPopup()" class="w-full bg-gray-800 hover:bg-gray-900 text-white font-bold py-2.5 rounded-xl text-sm shadow-sm transition mt-2">閉じる</button>
        </div>
    </div>
    <div id="payout-confirm-modal" class="fixed inset-0 bg-black bg-opacity-60 z-50 flex items-center justify-center p-4 hidden" onclick="cancelPayoutModal()">
        <div class="bg-white rounded-2xl p-4 shadow-2xl space-y-3.5 mx-auto" style="width: 270px;" onclick="event.stopPropagation();">
            <div class="text-center">
                <h4 class="font-bold text-gray-800 text-sm leading-tight">払い出しの確認</h4>
                <p id="payout-modal-message" class="text-xs text-gray-500 mt-2 font-medium leading-relaxed">
                    この資材を 1 個<br>払い出してよろしいですか？
                </p>
            </div>
            <div class="grid grid-cols-2 gap-2.5 pt-2 border-t border-gray-100">
                <button onclick="cancelPayoutModal()" class="w-full bg-gray-100 hover:bg-gray-200 text-gray-600 font-bold py-2 rounded-xl text-xs transition">
                    キャンセル
                </button>
                <button id="payout-modal-confirm-btn" class="w-full bg-gray-800 hover:bg-gray-900 text-white font-bold py-2 rounded-xl text-xs shadow-sm transition">
                    OK
                </button>
            </div>
        </div>
    </div>
</body>
</html>
