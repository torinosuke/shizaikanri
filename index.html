<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>患者用資材管理ページ</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .cursor-pointer, .header-title-btn, .page-btn { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800 font-sans pb-12">

    <header class="bg-blue-600 text-white p-4 sticky top-0 z-50 shadow-md">
        <div class="container mx-auto flex justify-between items-center max-w-md">
            <h1 onclick="resetToAllDrugs()" class="text-xl font-bold cursor-pointer active:opacity-80 transition header-title-btn select-none" title="全資材一覧を表示">
                患者用資材管理
            </h1>
            <div class="flex space-x-2">
                <button onclick="toggleAddForm()" class="bg-blue-500 hover:bg-blue-400 px-3 py-1 rounded text-sm font-bold transition">
                    ➕ 資材追加
                </button>
                <button id="refresh-btn" onclick="fetchStocks()" class="bg-blue-700 hover:bg-blue-800 px-3 py-1 rounded text-sm transition min-w-[60px]">
                    🔄 更新
                </button>
            </div>
        </div>
    </header>

    <main class="container mx-auto p-4 max-w-md">
        
        <div id="error-message" class="mb-4 bg-orange-100 border-l-4 border-orange-500 text-orange-700 p-3 rounded text-sm hidden">
            <strong>⚠️ 接続エラー:</strong> <p id="error-text" class="mt-1"></p>
        </div>

        <div id="add-form-section" class="mb-6 bg-white p-4 rounded-xl shadow-md border border-blue-200 hidden">
            <h2 class="text-blue-700 font-bold text-base mb-3 flex justify-between items-center">
                <span>新しく資材を登録する</span>
                <button onclick="toggleAddForm()" class="text-gray-400 text-sm font-normal">閉じる</button>
            </h2>
            
            <div class="space-y-3 text-sm">
                <div>
                    <label class="block text-gray-600 font-medium mb-1">対象薬品名</label>
                    <select id="input-drug-select" onchange="toggleDrugInputMethod()" class="w-full p-2 border rounded-lg bg-gray-50 font-bold text-gray-700 outline-none">
                    </select>
                    <input type="text" id="input-drug-text" placeholder="例：〇〇皮下注（新しい薬品名を入力）" class="w-full p-2 border rounded-lg outline-none mt-2 hidden">
                </div>
                <div>
                    <label class="block text-gray-600 font-medium mb-1">資材名称</label>
                    <input type="text" id="input-shizai" placeholder="例：患者用説明資材、保冷バッグ" class="w-full p-2 border rounded-lg outline-none">
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-gray-600 font-medium mb-1">初期在庫数</label>
                        <input type="number" id="input-current" value="0" min="0" class="w-full p-2 border rounded-lg outline-none">
                    </div>
                    <div>
                        <label class="block text-gray-600 font-medium mb-1">最低在庫数</label>
                        <input type="number" id="input-min" value="2" min="0" class="w-full p-2 border rounded-lg outline-none">
                    </div>
                </div>
                <div class="mt-3">
                    <label class="block text-gray-600 font-medium mb-1">内訳・備考（※改行して箇条書きOK）</label>
                    <textarea id="input-contents" rows="3" placeholder="例：&#13;・保冷バッグ・廃棄袋同梱" class="w-full p-3 border rounded-lg outline-none text-sm bg-white resize-none"></textarea>
                </div>
                <div class="mt-3 bg-gray-50 p-2.5 rounded-lg border border-dashed border-gray-300">
                    <label class="block text-gray-600 font-bold text-xs mb-1">📸 資材の写真を追加（※任意）</label>
                    <div class="flex items-center space-x-2">
                        <input type="file" id="input-image-file" accept="image/*" capture="environment" onchange="uploadImageHandler('add')" class="hidden">
                        <button type="button" onclick="document.getElementById('input-image-file').click()" class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-1.5 px-3 rounded text-xs transition">
                            📷 写真を撮影・選択

                        <span id="add-upload-status" class="text-xxs text-gray-400 truncate max-w-[180px]">未選択</span>
                    </div>

                <div class="border-t pt-2 mt-2 space-y-2 bg-gray-50 p-2 rounded-lg">
                    <label class="block text-gray-700 font-bold text-xs">📦 発注先の設定</label>
                    <div id="add-field-online" class="border-b pb-2 mb-2">
                        <label class="block text-green-700 text-xs font-bold mb-0.5">💻 オンライン発注URL</label>
                        <input type="url" id="input-order-url" placeholder="https://..." class="w-full p-1.5 border rounded bg-white">
                    </div>

                            <input type="text" id="input-phone-name" placeholder="〇〇卸 担当など" class="w-full p-1.5 border rounded bg-white">

                            <label class="block text-blue-700 text-xs font-bold mb-0.5">📞 電話番号</label>
                            <input type="tel" id="input-phone-number" placeholder="03-XXXX-XXXX" class="w-full p-1.5 border rounded bg-white">
                        </div>
                    </div>
                </div>
                <button onclick="addNewShizai()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-lg transition mt-2">
                    データベースに登録

            <h2 class="text-red-600 font-bold text-sm mb-2">⚠️ 発注が必要な資材（院内全体）</h2>
            <div id="alert-list" class="space-y-2"></div>
        </div>

        <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 mb-4 space-y-3">
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1.5">キーワード検索（資材名・薬品名）</label>
                <div class="relative">
                    <input type="text" id="search-input" oninput="handleSearchInput()" placeholder="検索したいキーワードを入力..." class="w-full p-3 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-400 outline-none text-sm font-medium text-gray-700">
                    <button id="search-clear-btn" onclick="clearSearchInput()" class="absolute inset-y-0 right-0 px-3 flex items-center text-gray-400 hover:text-gray-600 hidden">✕</button>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-2">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1.5">対象薬品フィルター</label>
                    <div class="relative">
                        <select id="drug-filter" onchange="filterSelectorChanged()" class="w-full p-2.5 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-400 outline-none text-xs font-bold text-gray-700 appearance-none">
                            <option value="ALL">全ての薬品</option>
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2.5 text-gray-500 text-xs">▼</div>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1.5">並び替え</label>
                    <div class="relative">
                        <select id="sort-selector" onchange="handleSortChanged()" class="w-full p-2.5 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-400 outline-none text-xs font-medium text-gray-700 appearance-none">
                            <option value="default">標準（更新順）</option>
                            <option value="shizai_asc">名称（五十音順）</option>
                            <option value="stock_asc">在庫（少ない順）</option>
                            <option value="stock_desc">在庫（多い順）</option>
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2.5 text-gray-500 text-xs">▼</div>
                    </div>
                </div>
            </div>
        </div>

        <hr class="border-gray-300 my-4">

        <h2 id="list-title" class="font-bold text-lg mb-3 text-gray-700">資材一覧</h2>
        
        <div id="stock-list" class="space-y-2">
            <p class="text-center text-gray-500 py-8">データを読み込み中...</p>
        </div>

        <div id="pagination-panel" class="mt-5 flex justify-between items-center bg-white p-2.5 rounded-xl border shadow-sm text-sm hidden">
            <button id="prev-page-btn" onclick="changePage(-1)" class="bg-gray-100 hover:bg-gray-200 active:bg-gray-300 text-gray-700 font-bold py-1.5 px-3 rounded-lg transition disabled:opacity-40 page-btn">
                ◀ 前へ
            </button>
            <span id="page-info" class="font-bold text-gray-600 select-none">
                1 / 1 ページ
            </span>
            <button id="next-page-btn" onclick="changePage(1)" class="bg-gray-100 hover:bg-gray-200 active:bg-gray-300 text-gray-700 font-bold py-1.5 px-3 rounded-lg transition disabled:opacity-40 page-btn">
                次へ ▶
            </button>
        </div>

    <script>
        const SUPABASE_URL = "https://kkxpqxaxthrcxdvrmbty.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtreHBxeGF4dGhyY3hkdnJtYnR5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3NzMzODgsImV4cCI6MjA5NjM0OTM4OH0.Ptcn2lYMqbn4L5g1sV7r6E372cxfIyhsxgAkH7a65aU";
        
        let db;
        try { db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY); } catch (e) { console.error(e); }

        let currentStocksData = [];
        let editingId = null;
        let selectedDrugFilter = "ALL";
        let openedCardId = null;

        let searchQuery = "";
        let currentPage = 1;
        const ITEMS_PER_PAGE = 10;

        document.addEventListener("DOMContentLoaded", fetchStocks);

        function toggleAddForm() {
            const form = document.getElementById("add-form-section");
            form.classList.toggle("hidden");
        }

        function handleSearchInput() {
            const input = document.getElementById("search-input");
            searchQuery = input.value.trim();
            const clearBtn = document.getElementById("search-clear-btn");
            if (searchQuery.length > 0) clearBtn.classList.remove("hidden");
            else clearBtn.classList.add("hidden");
            currentPage = 1;
            renderStockList();
        }

        function clearSearchInput() {
            document.getElementById("search-input").value = "";
            searchQuery = "";
            document.getElementById("search-clear-btn").classList.add("hidden");
            currentPage = 1;
            renderStockList();
        }

        function changePage(direction) {
            currentPage += direction;
            openedCardId = null;
            renderStockList();
            document.getElementById("list-title").scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function filterSelectorChanged() {
            selectedDrugFilter = document.getElementById("drug-filter").value;
            currentPage = 1;
            renderStockList();
        }

        function handleSortChanged() {
            currentPage = 1;
            renderStockList();
        }

        function resetToAllDrugs() {
            selectedDrugFilter = "ALL";
            const filterElement = document.getElementById("drug-filter");
            if (filterElement) filterElement.value = "ALL";
            clearSearchInput();
            const form = document.getElementById("add-form-section");
            if (form && !form.classList.contains("hidden")) form.classList.add("hidden");
        }

        function normalizeString(str) {
            if (!str) return "";
            return str.toLowerCase().normalize("NFKC").replace(/[\u30a1-\u30f6]/g, function(match) {
                return String.fromCharCode(match.charCodeAt(0) - 0x60);
            });
        }

        function toggleDetails(id) {
            const panel = document.getElementById(`control-panel-${id}`);
            const arrow = document.getElementById(`arrow-${id}`);
            if (!panel) return;
            if (openedCardId === id) {
                panel.classList.add("hidden");
                if (arrow) arrow.innerText = "▼";
                openedCardId = null;
            } else {
                if (openedCardId !== null) {
                    const oldPanel = document.getElementById(`control-panel-${openedCardId}`);
                    const oldArrow = document.getElementById(`arrow-${openedCardId}`);
                    if (oldPanel) oldPanel.classList.add("hidden");
                    if (oldArrow) oldArrow.innerText = "▼";
                }
                panel.classList.remove("hidden");
                if (arrow) arrow.innerText = "▲";
                openedCardId = id;
            }
        }

        function toggleDrugInputMethod() {
            const selectElement = document.getElementById("input-drug-select");
            const textInputElement = document.getElementById("input-drug-text");
            if (selectElement.value === "__NEW__") {
                textInputElement.classList.remove("hidden");
                textInputElement.focus();
            } else {
                textInputElement.classList.add("hidden");
                textInputElement.value = "";
            }
        }

        function extractStoragePath(url) {
            if (!url || !url.includes('/storage/v1/object/public/shizai-images/')) return null;
            return url.split('/storage/v1/object/public/shizai-images/')[1];
        }

        function compressImage(file, maxWidth = 800, quality = 0.75) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        let width = img.width;
                        let height = img.height;
                        if (width > maxWidth) {
                            height = Math.round((height * maxWidth) / width);
                            width = maxWidth;
                        }
                        const canvas = document.createElement('canvas');
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        canvas.toBlob((blob) => {
                            if (blob) {
                                const compressedFile = new File([blob], file.name, {
                                    type: 'image/jpeg',
                                    lastModified: Date.now()
                                });
                                resolve(compressedFile);
                            } else reject(new Error("Canvas to Blob 変換に失敗しました"));
                        }, 'image/jpeg', quality);
                    };
                    img.onerror = (err) => reject(err);
                };
                reader.onerror = (err) => reject(err);
            });
        }

        async function uploadImageHandler(mode, id = null) {
            const fileInput = mode === 'add' ? document.getElementById('input-image-file') : document.getElementById(`edit-image-file-${id}`);
            const statusLabel = mode === 'add' ? document.getElementById('add-upload-status') : document.getElementById(`edit-upload-status-${id}`);
            const urlHiddenInput = mode === 'add' ? document.getElementById('input-image-url') : document.getElementById(`edit-image-url-${id}`);
            if (!fileInput || !fileInput.files || fileInput.files.length === 0) return;
            let file = fileInput.files[0];
            statusLabel.innerText = "⏳ 処理中...";
            statusLabel.className = "text-xxs text-blue-600 font-bold animate-pulse";
            try {
                file = await compressImage(file, 800, 0.75);
                statusLabel.innerText = "⏳ アップロード中...";
                if (mode === 'edit' && id) {
                    const targetItem = currentStocksData.find(item => item.id === id);
                    if (targetItem && targetItem.image_url) {
                        const oldStoragePath = extractStoragePath(targetItem.image_url);
                        if (oldStoragePath) await db.storage.from('shizai-images').remove([oldStoragePath]);
                    }
                }
                const fileName = `${Date.now()}_${Math.random().toString(36).substring(2, 7)}.jpg`;
                const filePath = `shizai_pics/${fileName}`;
                const { data, error } = await db.storage.from('shizai-images').upload(filePath, file);
                if (error) throw error;
                const { data: urlData } = db.storage.from('shizai-images').getPublicUrl(filePath);
                urlHiddenInput.value = urlData.publicUrl;
                statusLabel.innerText = "✅ 完了";
                statusLabel.className = "text-xxs text-green-600 font-bold";
                const deleteBtn = document.getElementById(`btn-delete-image-${id}`);
                if (deleteBtn) deleteBtn.classList.remove("hidden");
            } catch (err) {
                console.error(err);
                statusLabel.innerText = "❌ エラー";
                statusLabel.className = "text-xxs text-red-500 font-bold";
                alert("画像処理に失敗しました: " + err.message);
            }
        }

        async function deleteImageOnly(id) {
            const urlHiddenInput = document.getElementById(`edit-image-url-${id}`);
            const statusLabel = document.getElementById(`edit-upload-status-${id}`);
            const deleteBtn = document.getElementById(`btn-delete-image-${id}`);
            if (!urlHiddenInput || !urlHiddenInput.value) return;
            if (!confirm("写真データを削除しますか？")) return;
            const currentUrl = urlHiddenInput.value;
            statusLabel.innerText = "⏳ 消去中...";
            try {
                const storagePath = extractStoragePath(currentUrl);
                if (storagePath) await db.storage.from('shizai-images').remove([storagePath]);
                urlHiddenInput.value = "";
                statusLabel.innerText = "🗑️ 削除完了（未保存）";
                statusLabel.className = "text-xxs text-red-500 font-bold";
                if (deleteBtn) deleteBtn.classList.add("hidden");
            } catch (err) {
                console.error(err);
                alert("写真の消去に失敗しました: " + err.message);
            }
        }

        async function addNewShizai() {
            const selectElement = document.getElementById("input-drug-select");
            const textInputElement = document.getElementById("input-drug-text");
            let drug = (selectElement.value === "__NEW__") ? textInputElement.value.trim() : selectElement.value;
            const shizai = document.getElementById("input-shizai").value.trim();
            const current = parseInt(document.getElementById("input-current").value) || 0;
            const min = parseInt(document.getElementById("input-min").value) || 0;
            const contents = document.getElementById("input-contents").value.trim();
            const imageUrl = document.getElementById("input-image-url").value.trim();
            const orderUrl = document.getElementById("input-order-url").value.trim();
            const phoneName = document.getElementById("input-phone-name").value.trim();
            const phoneNumber = document.getElementById("input-phone-number").value.trim();
            if (!drug || !shizai) { alert("薬品名と資材名称を入力してください。"); return; }
            
            const { error } = await db.from('shizai_stocks').insert([{ 
                drug_name: drug, shizai_name: shizai, current_stock: current, min_stock: min, 
                is_ordering: false, order_type: 'hybrid', order_url: orderUrl, phone_name: phoneName, 
                phone_number: phoneNumber, contents: contents, image_url: imageUrl
            }]);
            
            if (error) {
                alert("登録エラー: " + error.message);
            } else { 
                alert("登録しました！"); 
                // ✨ フォームに入力された値をリセットし、フォーム起動前の全一覧画面に安全に遷移
                document.getElementById("input-shizai").value = "";
                document.getElementById("input-current").value = "0";
                document.getElementById("input-min").value = "2";
                document.getElementById("input-contents").value = "";
                document.getElementById("input-image-url").value = "";
                document.getElementById("input-order-url").value = "";
                document.getElementById("input-phone-name").value = "";
                document.getElementById("input-phone-number").value = "";
                document.getElementById("add-upload-status").innerText = "未選択";
                document.getElementById("add-upload-status").className = "text-xxs text-gray-400 truncate max-w-[180px]";
                
                resetToAllDrugs(); 
                fetchStocks(); 
                toggleAddForm();
            }
        }

        async function fetchStocks() {
            const errorArea = document.getElementById("error-message");
            const errorText = document.getElementById("error-text");
            const refreshBtn = document.getElementById("refresh-btn");
            
            errorArea.classList.add("hidden");
            
            if (refreshBtn) {
                refreshBtn.innerText = "⏳ 更新中...";
                refreshBtn.disabled = true;
                refreshBtn.classList.add("opacity-60");
            }

            try {
                const { data: stocks, error } = await db.from('shizai_stocks').select('*').order('id', { ascending: true });
                if (error) { errorText.innerText = error.message; errorArea.classList.remove("hidden"); return; }
                currentStocksData = stocks || [];
                updateDrugFilterOptions();
                updateAddFormDrugOptions();
                renderStockList();
            } catch (e) {
                errorText.innerText = "通信エラー: " + e.message;
                errorArea.classList.remove("hidden");
            } finally {
                if (refreshBtn) {
                    refreshBtn.innerText = "🔄 更新";
                    refreshBtn.disabled = false;
                    refreshBtn.classList.remove("opacity-60");
                }
            }
        }

        function updateDrugFilterOptions() {
            const filterElement = document.getElementById("drug-filter");
            const drugNames = [...new Set(currentStocksData.map(item => item.drug_name))].sort((a, b) => a.localeCompare(b, 'ja'));
            filterElement.innerHTML = `<option value="ALL">全ての薬品</option>`;
            drugNames.forEach(name => {
                const selectedAttr = (name === selectedDrugFilter) ? "selected" : "";
                filterElement.innerHTML += `<option value="${name}" ${selectedAttr}>${name}</option>`;
            });
        }

        function updateAddFormDrugOptions() {
            const selectElement = document.getElementById("input-drug-select");
            if (!selectElement) return;
            const drugNames = [...new Set(currentStocksData.map(item => item.drug_name))].sort((a, b) => a.localeCompare(b, 'ja'));
            let html = `<option value="">ーー 選択してください ーー</option>`;
            drugNames.forEach(name => { html += `<option value="${name}">${name}</option>`; });
            html += `<option value="__NEW__">➕ 新しい薬品を追加...</option>`;
            selectElement.innerHTML = html;
        }

        function renderStockList() {
            const stockListElement = document.getElementById("stock-list");
            const alertSection = document.getElementById("alert-section");
            const alertListElement = document.getElementById("alert-list");
            const listTitleElement = document.getElementById("list-title");
            const paginationPanel = document.getElementById("pagination-panel");
            stockListElement.innerHTML = "";
            alertListElement.innerHTML = "";
            let hasAlert = false;
            
            if (currentStocksData.length === 0) {
                stockListElement.innerHTML = `<p class="text-center text-gray-500 py-8">資材が登録されていません。</p>`;
                alertSection.classList.add("hidden"); paginationPanel.classList.add("hidden"); return;
            }
            if (selectedDrugFilter === "ALL") listTitleElement.innerText = searchQuery ? `検索結果一覧` : "全資材一覧";
            else listTitleElement.innerText = `「${selectedDrugFilter}」の資材一覧`;

            currentStocksData.forEach(item => {
                // アラートセクションも在庫0以下または最低在庫未満を判定
                if ((item.current_stock <= 0 || item.current_stock < item.min_stock) && !item.is_ordering) {
                    hasAlert = true;
                    const badgeText = item.current_stock <= 0 ? "在庫なし" : "要発注";
                    alertListElement.innerHTML += `<div class="bg-red-100 border-l-4 border-red-500 text-red-700 p-2 text-sm rounded shadow-sm"><strong>${item.drug_name}</strong>: ${item.shizai_name} (${badgeText})</div>`;
                }
            });

            let filteredItems = currentStocksData.filter(item => {
                if (selectedDrugFilter !== "ALL" && item.drug_name !== selectedDrugFilter) return false;
                if (searchQuery) {
                    const nq = normalizeString(searchQuery);
                    if (!normalizeString(item.shizai_name).includes(nq) && !normalizeString(item.drug_name).includes(nq)) return false;
                }
                return true;
            });

            const sortMethod = document.getElementById("sort-selector").value;
            filteredItems.sort((a, b) => {
                const aUrgent = (a.is_ordering || (a.current_stock < a.min_stock) || a.current_stock <= 0) ? 1 : 0;
                const bUrgent = (b.is_ordering || (b.current_stock < b.min_stock) || b.current_stock <= 0) ? 1 : 0;
                if (aUrgent !== bUrgent) return bUrgent - aUrgent;
                
                if (sortMethod === "shizai_asc") return (a.shizai_name || "").localeCompare((b.shizai_name || ""), 'ja');
                if (sortMethod === "stock_asc") return (a.current_stock || 0) - (b.current_stock || 0);
                if (sortMethod === "stock_desc") return (b.current_stock || 0) - (a.current_stock || 0);
                return new Date(b.updated_at || 0) - new Date(a.updated_at || 0);
            });

            const totalPages = Math.ceil(filteredItems.length / ITEMS_PER_PAGE) || 1;
            if (currentPage > totalPages) currentPage = totalPages;
            const startIndex = (currentPage - 1) * ITEMS_PER_PAGE;
            const pageItems = filteredItems.slice(startIndex, startIndex + ITEMS_PER_PAGE);

            if (filteredItems.length > 0) {
                document.getElementById("page-info").innerText = `${currentPage} / ${totalPages} ページ`;
                paginationPanel.classList.remove("hidden");
                document.getElementById("prev-page-btn").disabled = (currentPage === 1);
                document.getElementById("next-page-btn").disabled = (currentPage === totalPages);
            } else {
                stockListElement.innerHTML = `<p class="text-center text-gray-500 py-8">該当なし</p>`;
                paginationPanel.classList.add("hidden"); return;
            }

            pageItems.forEach(item => {
                if (editingId === item.id) {
                    const hasPhoto = item.image_url && item.image_url.trim() !== "";
                    stockListElement.innerHTML += `
                        <div class="bg-blue-50 p-4 rounded-xl shadow-sm border border-blue-400 text-sm space-y-2" onclick="event.stopPropagation();">
                            <div class="font-bold text-blue-800 text-xs mb-1">✏️ 登録情報を編集中</div>
                            
                            <div>
                                <label class="block text-xxs font-bold text-gray-400 mb-0.5">対象薬品名</label>
                                <input type="text" id="edit-drug-${item.id}" value="${item.drug_name}" class="w-full p-1.5 border rounded bg-white font-medium">
                            </div>
                            
                            <div>
                                <label class="block text-xxs font-bold text-gray-400 mb-0.5">資材名称</label>
                                <input type="text" id="edit-shizai-${item.id}" value="${item.shizai_name}" class="w-full p-1.5 border rounded bg-white font-medium">
                            </div>

                            <div class="grid grid-cols-2 gap-2">
                                <div>
                                    <label class="block text-xxs font-bold text-gray-400 mb-0.5">現在庫数</label>
                                    <input type="number" id="edit-current-${item.id}" value="${item.current_stock}" class="w-full p-1.5 border rounded bg-white font-medium">
                                </div>
                                <div>
                                    <label class="block text-xxs font-bold text-gray-400 mb-0.5">最低在庫数</label>
                                    <input type="number" id="edit-min-${item.id}" value="${item.min_stock}" class="w-full p-1.5 border rounded bg-white font-medium">
                                </div>
                            </div>

                            <div>
                                <label class="block text-xxs font-bold text-gray-400 mb-0.5">内訳・備考</label>
                                <textarea id="edit-contents-${item.id}" rows="3" class="w-full p-1.5 border rounded text-xs resize-none bg-white" placeholder="備考">${item.contents || ''}</textarea>
                            </div>

                            <div class="bg-white p-2.5 rounded-lg border border-gray-200 space-y-2 mt-1 shadow-inner">
                                <span class="block text-gray-700 font-bold text-xxs">📦 発注先の修正</span>
                                <div>
                                    <label class="block text-green-700 text-xxs font-bold mb-0.5">💻 オンライン発注URL</label>
                                    <input type="url" id="edit-order-url-${item.id}" value="${item.order_url || ''}" placeholder="https://..." class="w-full p-1.5 border rounded text-xs bg-gray-50 focus:bg-white outline-none">
                                </div>
                                <div class="grid grid-cols-2 gap-2">
                                    <div>
                                        <label class="block text-blue-700 text-xxs font-bold mb-0.5">📞 電話連絡先名</label>
                                        <input type="text" id="edit-phone-name-${item.id}" value="${item.phone_name || ''}" placeholder="卸名・担当など" class="w-full p-1.5 border rounded text-xs bg-gray-50 focus:bg-white outline-none">
                                    </div>
                                    <div>
                                        <label class="block text-blue-700 text-xxs font-bold mb-0.5">📞 電話番号</label>
                                        <input type="tel" id="edit-phone-number-${item.id}" value="${item.phone_number || ''}" placeholder="03-XXXX-XXXX" class="w-full p-1.5 border rounded text-xs bg-gray-50 focus:bg-white outline-none">
                                    </div>
                                </div>
                            </div>

                            <div class="bg-white p-2 rounded border border-gray-200">
                                <label class="block text-xxs font-bold text-gray-400 mb-1">📸 商品写真</label>
                                <input type="file" id="edit-image-file-${item.id}" accept="image/*" capture="environment" onchange="uploadImageHandler('edit', ${item.id})" class="hidden">
                                <button onclick="document.getElementById('edit-image-file-${item.id}').click()" class="bg-gray-100 p-1 rounded text-xxs border">📷 写真変更</button>
                                <button id="btn-delete-image-${item.id}" onclick="deleteImageOnly(${item.id})" class="bg-red-50 text-red-600 p-1 rounded text-xxs border border-red-200 ${hasPhoto ? '' : 'hidden'}">🗑️ 写真削除</button>
                                <span id="edit-upload-status-${item.id}" class="text-xxs text-gray-400">${hasPhoto ? '画像あり' : 'なし'}</span>
                                <input type="hidden" id="edit-image-url-${item.id}" value="${item.image_url || ''}">
                            </div>

                            <div class="grid grid-cols-2 gap-2 pt-2">
                                <button onclick="cancelEdit()" class="bg-gray-300 py-1.5 rounded-lg font-bold">キャンセル</button>
                                <button onclick="saveEdit(${item.id})" class="bg-blue-600 text-white py-1.5 rounded-lg font-bold">保存</button>
                            </div>
                        </div>`;
                    return;
                }

                // ✨ 【修正ポイント】「在庫なし」状態の厳密判定分岐
                let statusBadge = `<span class="bg-green-100 text-green-800 text-xs font-bold px-2 py-0.5 rounded text-center">在庫あり</span>`;
                let cardBorder = "border-gray-200 bg-white";
                
                if (item.is_ordering) {
                    statusBadge = `<span class="bg-yellow-100 text-yellow-800 text-xs font-bold px-2 py-0.5 rounded text-center">取り寄せ中</span>`;
                    cardBorder = "border-yellow-300 bg-yellow-50";
                } else if (item.current_stock <= 0) {
                    statusBadge = `<span class="bg-red-200 text-red-900 text-xs font-bold px-2 py-0.5 rounded text-center">在庫なし</span>`;
                    cardBorder = "border-red-400 bg-red-50";
                } else if (item.current_stock < item.min_stock) {
                    statusBadge = `<span class="bg-red-100 text-red-800 text-xs font-bold px-2 py-0.5 rounded text-center">要発注</span>`;
                    cardBorder = "border-red-200 bg-red-50";
                }

                const thumbnailHtml = item.image_url ? `<img src="${item.image_url}" onclick="openImagePopup(event, '${item.shizai_name}', '${item.drug_name}', '${item.image_url}')" class="w-10 h-10 object-cover rounded border flex-shrink-0 bg-white">` : `<div class="w-10 h-10 rounded border flex-shrink-0 bg-gray-100 flex items-center justify-center text-gray-400 text-lg">📷</div>`;
                const infoButtonHtml = item.contents ? `<span onclick="openInfoPopup(event, '${item.shizai_name}', '${item.drug_name}', \`${item.contents.replace(/`/g, '\\`')}\`)" class="ml-1.5 inline-flex items-center justify-center bg-blue-100 text-blue-600 text-xs font-bold rounded-full w-4 h-4 shadow-sm border border-blue-200 flex-shrink-0 mt-0.5 animate-pulse">ℹ️</span>` : "";
                
                stockListElement.innerHTML += `
                    <div onclick="toggleDetails(${item.id})" class="p-3 rounded-xl shadow-sm border ${cardBorder} transition cursor-pointer select-none">
                        <div class="flex justify-between items-stretch text-sm">
                            <div class="flex-1 pr-3 min-w-0 flex items-center space-x-2.5">
                                ${thumbnailHtml}
                                <div class="min-w-0 flex-1">
                                    <span class="text-xxs text-gray-400 block truncate font-medium mb-0.5">${item.drug_name}</span>
                                    <div class="flex items-start max-w-full">
                                        <h3 class="font-bold text-gray-800 text-sm break-words leading-tight">${item.shizai_name || ''}</h3>
                                        ${infoButtonHtml}
                                    </div>
                                </div>
                            </div>
                            <div class="flex flex-col justify-between items-end flex-shrink-0 min-w-[70px]">
                                ${statusBadge}
                                <div class="flex items-center space-x-1.5 mt-auto pt-1">
                                    <span class="text-gray-500 font-bold tracking-tight text-xxs">${item.current_stock}個</span>
                                    <span id="arrow-${item.id}" class="text-xs text-gray-400 font-bold w-3 text-center">▼</span>
                                </div>
                            </div>
                        </div>
                        <div id="control-panel-${item.id}" class="hidden mt-3 pt-2 border-t border-gray-100 space-y-3" onclick="event.stopPropagation();">
                            <div class="grid grid-cols-2 gap-2 text-xs text-gray-600 bg-gray-50 p-2 rounded">
                                <div>現在庫: <span class="font-bold text-base text-gray-900">${item.current_stock}</span> 個</div>
                                <div>最低在庫: ${item.min_stock} 個</div>
                            </div>
                            <div class="grid grid-cols-2 gap-2">
                                <button onclick="updateStock(${item.id}, ${item.current_stock - 1})" class="bg-gray-800 text-white text-xs font-bold py-2 rounded-lg" ${item.current_stock <= 0 ? 'disabled opacity-50' : ''}>払い出し (-1)</button>
                                <button onclick="toggleOrderStatus(${item.id}, ${item.is_ordering})" class="${item.is_ordering ? 'bg-gray-400' : 'bg-yellow-500'} text-white text-xs font-bold py-2 rounded-lg">${item.is_ordering ? '取り寄せ取消' : '取り寄せ中に変更'}</button>
                            </div>
                            ${item.is_ordering ? `<div class="flex items-center space-x-2 pt-1 border-t border-dashed border-gray-200"><select id="arrival-count-${item.id}" class="w-16 p-1 border rounded text-sm"><option value="1">1</option><option value="5" selected>5</option><option value="10">10</option></select><button onclick="executeArrival(${item.id}, ${item.current_stock})" class="flex-1 bg-green-600 text-white text-xs font-bold py-1.5 rounded-lg">入荷完了</button></div>` : ''}
                            
                            <div class="text-xxs text-gray-500 bg-gray-50 p-2 rounded space-y-0.5 border border-dashed">
                                <div>💻 URL: ${item.order_url ? `<a href="${item.order_url}" target="_blank" class="text-blue-600 underline break-all">${item.order_url}</a>` : '未登録'}</div>
                                <div>📞 連絡先: ${item.phone_name || '未登録'} (${item.phone_number || '番号なし'})</div>
                            </div>

                            <div class="flex justify-between items-center text-xs text-gray-400 pt-1.5 border-t border-dashed border-gray-100">
                                <span>⏱️ 更新: ${item.updated_at ? new Date(item.updated_at).toLocaleDateString('ja-JP', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'}) : '---'}</span>
                                <div class="flex space-x-3"><button onclick="enterEditMode(${item.id})" class="hover:text-blue-600">✏️ 編集</button><button onclick="deleteShizai(${item.id})" class="hover:text-red-500">🗑️ 削除</button></div>
                            </div>
                        </div>
                    </div>`;
            });
            if (hasAlert) alertSection.classList.remove("hidden"); else alertSection.classList.add("hidden");
        }

        async function updateStock(id, newStock) {
            if (newStock < 0) return;
            const { error } = await db.from('shizai_stocks').update({ current_stock: newStock }).eq('id', id);
            if (error) alert(error.message); else fetchStocks();
        }

        async function toggleOrderStatus(id, status) {
            const { error } = await db.from('shizai_stocks').update({ is_ordering: !status }).eq('id', id);
            if (error) alert(error.message); else fetchStocks();
        }

        async function executeArrival(id, current) {
            const count = parseInt(document.getElementById(`arrival-count-${id}`).value) || 0;
            const { error } = await db.from('shizai_stocks').update({ current_stock: current + count, is_ordering: false }).eq('id', id);
            if (error) alert(error.message); else fetchStocks();
        }

        async function deleteShizai(id) {
            if (!confirm("完全に削除しますか？")) return;
            const target = currentStocksData.find(i => i.id === id);
            if (target && target.image_url) {
                const path = extractStoragePath(target.image_url);
                if (path) await db.storage.from('shizai-images').remove([path]);
            }
            await db.from('shizai_stocks').delete().eq('id', id);
            fetchStocks();
        }

        function enterEditMode(id) { editingId = id; renderStockList(); }
        function cancelEdit() { editingId = null; renderStockList(); }

        async function saveEdit(id) {
            const drug = document.getElementById(`edit-drug-${id}`).value.trim();
            const shizai = document.getElementById(`edit-shizai-${id}`).value.trim();
            const current = parseInt(document.getElementById(`edit-current-${id}`).value);
            const min = parseInt(document.getElementById(`edit-min-${id}`).value);
            const contents = document.getElementById(`edit-contents-${id}`).value.trim();
            const url = document.getElementById(`edit-image-url-${id}`).value.trim();
            
            // ✨ 【修正ポイント】編集欄から新しく入力された発注先情報3つを取得して変数に格納
            const orderUrl = document.getElementById(`edit-order-url-${id}`).value.trim();
            const phoneName = document.getElementById(`edit-phone-name-${id}`).value.trim();
            const phoneNumber = document.getElementById(`edit-phone-number-${id}`).value.trim();
            
            if (!drug || !shizai) return;

            // ✨ 【修正ポイント】update対象オブジェクトに発注関連の3カラムを連携追加
            await db.from('shizai_stocks').update({ 
                drug_name: drug, 
                shizai_name: shizai, 
                current_stock: current, 
                min_stock: min, 
                contents: contents, 
                image_url: url,
                order_url: orderUrl,
                phone_name: phoneName,
                phone_number: phoneNumber
            }).eq('id', id);
            
            editingId = null; 
            fetchStocks();
        }

        function openInfoPopup(event, shizai, drug, contents) {
            event.stopPropagation();
            document.getElementById("popup-title").innerText = "⚠️ 備考・内訳";
            document.getElementById("popup-shizai-name").innerText = shizai;
            document.getElementById("popup-drug-name").innerText = drug;
            const c = document.getElementById("popup-contents");
            c.innerText = contents; c.classList.remove("hidden");
            document.getElementById("popup-image-container").classList.add("hidden");
            document.getElementById("info-popup").classList.remove("hidden");
        }

        function openImagePopup(event, shizai, drug, url) {
            event.stopPropagation();
            document.getElementById("popup-title").innerText = "📷 写真拡大";
            document.getElementById("popup-shizai-name").innerText = shizai;
            document.getElementById("popup-drug-name").innerText = drug;
            document.getElementById("popup-contents").classList.add("hidden");
            const i = document.getElementById("popup-image");
            i.src = url; document.getElementById("popup-image-container").classList.remove("hidden");
            document.getElementById("info-popup").classList.remove("hidden");
        }

        function closeInfoPopup() { document.getElementById("info-popup").classList.add("hidden"); }
    </script>
    
    <div id="info-popup" class="fixed inset-0 bg-black bg-opacity-60 z-50 flex items-center justify-center p-4 hidden" onclick="closeInfoPopup()">
        <div class="bg-white rounded-2xl max-w-sm w-full p-5 shadow-2xl space-y-2.5" onclick="event.stopPropagation();">
            <div class="flex justify-between items-center border-b pb-1.5">
                <span id="popup-title" class="text-xs font-bold text-gray-400 bg-gray-100 px-2 py-0.5 rounded"></span>
                <button onclick="closeInfoPopup()" class="text-gray-400 font-bold px-1">✕</button>
            </div>
            <div class="pt-1">
                <h4 id="popup-shizai-name" class="font-bold text-gray-800 text-base leading-tight"></h4>
                <p id="popup-drug-name" class="text-xxs text-gray-400 font-medium mt-0.5"></p>
            </div>
            <div id="popup-image-container" class="mt-2 text-center hidden">
                <img id="popup-image" src="" class="w-full h-auto max-h-64 object-contain rounded-xl border bg-gray-50">
            </div>
            <div id="popup-contents" class="bg-orange-50 border border-orange-100 rounded-xl p-3 text-sm text-gray-700 whitespace-pre-wrap hidden"></div>
            <button onclick="closeInfoPopup()" class="w-full bg-gray-800 hover:bg-gray-900 text-white font-bold py-2.5 rounded-xl text-sm shadow-sm transition mt-2">閉じる</button>
        </div>
    </div>
</body>
</html>
