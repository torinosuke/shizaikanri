        function normalizeString(str) {
            if (!str) return "";
            return str.toLowerCase()
                .normalize("NFKC")
                .replace(/[\u30a1-\u30f6]/g, function(match) {
                    return String.fromCharCode(match.charCodeAt(0) - 0x60);
                });
        }

                if (arrow) arrow.innerText = "▼";
                openedCardId = null;
            } else {
                if (openedCardId !== null) {

                    if (oldPanel) oldPanel.classList.add("hidden");

                }
                panel.classList.remove("hidden");
                if (arrow) arrow.innerText = "▲";
                openedCardId = id;
            }
        }

        function extractStoragePath(url) {
            if (!url || !url.includes('/storage/v1/object/public/shizai-images/')) return null;
            return url.split('/storage/v1/object/public/shizai-images/')[1];
        }

        function compressImage(file, maxWidth = 800, quality = 0.75) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        let width = img.width;
                        let height = img.height;
                        if (width > maxWidth) {
                            height = Math.round((height * maxWidth) / width);
                            width = maxWidth;
                        }

                        const canvas = document.createElement('canvas');
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        canvas.toBlob((blob) => {
                            if (blob) {
                                const compressedFile = new File([blob], file.name, {
                                    type: 'image/jpeg',
                                    lastModified: Date.now()
                                });
                                resolve(compressedFile);
                            } else {
                                reject(new Error("Canvas to Blob 変換に失敗しました"));
                            }
                        }, 'image/jpeg', quality);
                    };
                    img.onerror = (err) => reject(err);
                };
                reader.onerror = (err) => reject(err);
            });
        }

        async function uploadImageHandler(mode, id = null) {
            const fileInput = mode === 'add' ? document.getElementById('input-image-file') : document.getElementById(`edit-image-file-${id}`);
            const statusLabel = mode === 'add' ? document.getElementById('add-upload-status') : document.getElementById(`edit-upload-status-${id}`);
            const urlHiddenInput = mode === 'add' ? document.getElementById('input-image-url') : document.getElementById(`edit-image-url-${id}`);

            if (!fileInput || !fileInput.files || fileInput.files.length === 0) return;
            
            let file = fileInput.files[0];
            statusLabel.innerText = "⏳ 画像を圧縮・最適化中...";
            statusLabel.className = "text-xxs text-blue-600 font-bold animate-pulse";

            try {
                file = await compressImage(file, 800, 0.75);
                statusLabel.innerText = "⏳ アップロード中...";

                if (mode === 'edit' && id) {
                    const targetItem = currentStocksData.find(item => item.id === id);
                    if (targetItem && targetItem.image_url) {
                        const oldStoragePath = extractStoragePath(targetItem.image_url);
                        if (oldStoragePath) {
                            await db.storage.from('shizai-images').remove([oldStoragePath]);
                        }
                    }
                }

                const fileName = `${Date.now()}_${Math.random().toString(36).substring(2, 7)}.jpg`;
                const filePath = `shizai_pics/${fileName}`;

                const { data, error } = await db.storage
                    .from('shizai-images')
                    .upload(filePath, file);
                if (error) throw error;

                const { data: urlData } = db.storage
                    .from('shizai-images')
                    .getPublicUrl(filePath);
                urlHiddenInput.value = urlData.publicUrl;
                statusLabel.innerText = "✅ 最適化・アップロード完了";
                statusLabel.className = "text-xs text-green-600 font-bold";

                const deleteBtn = document.getElementById(`btn-delete-image-${id}`);
                if (deleteBtn) deleteBtn.classList.remove("hidden");
            } catch (err) {
                console.error(err);
                statusLabel.innerText = "❌ エラーが発生しました";
                statusLabel.className = "text-xs text-red-500 font-bold";
                alert("画像の処理に失敗しました: " + err.message);
            }
        }

        async function deleteImageOnly(id) {
            const urlHiddenInput = document.getElementById(`edit-image-url-${id}`);
            const statusLabel = document.getElementById(`edit-upload-status-${id}`);
            const deleteBtn = document.getElementById(`btn-delete-image-${id}`);
            
            if (!urlHiddenInput || !urlHiddenInput.value) return;

            if (!confirm("【確認】この資材の写真データを完全に消去し、「写真なし」の状態に戻しますか？")) return;

            const currentUrl = urlHiddenInput.value;
            statusLabel.innerText = "⏳ 写真を消去中...";
            statusLabel.className = "text-xs text-orange-600 font-bold";

            try {
                const storagePath = extractStoragePath(currentUrl);
                if (storagePath) {
                    const { error: storageError } = await db.storage
                        .from('shizai-images')
                        .remove([storagePath]);
                    if (storageError) console.warn("Storageからの削除に失敗しました:", storageError.message);
                }

                urlHiddenInput.value = "";
                statusLabel.innerText = "🗑️ 写真を削除しました（変更を保存で確定）";
                statusLabel.className = "text-xs text-red-500 font-bold";
                
                if (deleteBtn) deleteBtn.classList.add("hidden");
            } catch (err) {
                console.error(err);
                alert("写真の消去中にエラーが発生しました: " + err.message);
            }
        }

                    drug_name: drug, 
                    shizai_name: shizai, 
                    current_stock: current, 
                    min_stock: min, 
                    is_ordering: false,
                    order_type: 'hybrid',
                    order_url: orderUrl,
                    phone_name: phoneName,
                    phone_number: phoneNumber,
                    contents: contents,
                    image_url: imageUrl
                }]);

            if (error) {
                alert("登録エラー: " + error.message);
            } else {
                showToast("新しく資材を登録しました！");
                textInputElement.value = "";
                textInputElement.classList.add("hidden");
                document.getElementById("input-shizai").value = "";
                document.getElementById("input-current").value = "0";
                document.getElementById("input-contents").value = "";
                document.getElementById("input-image-url").value = "";
                document.getElementById("input-image-file").value = "";
                document.getElementById("add-upload-status").innerText = "未選択";
                document.getElementById("add-upload-status").className = "text-xs text-gray-400 truncate max-w-[180px]";
                document.getElementById("input-order-url").value = "";
                document.getElementById("input-phone-name").value = "";
                document.getElementById("input-phone-number").value = "";
                toggleAddForm();
                
                selectedDrugFilter = drug;
                const labelEl = document.getElementById("custom-filter-label");
                if (labelEl) labelEl.innerText = drug;

                currentPage = 1;
                fetchStocks();
            }
        }

        async function fetchStocks() {
            const errorArea = document.getElementById("error-message");
            const errorText = document.getElementById("error-text");
            errorArea.classList.add("hidden");

            try {
                const { data: stocks, error } = await db
                    .from('shizai_stocks')
                    .select('*')
                    .order('id', { ascending: true });
                if (error) {
                    errorText.innerText = error.message;
                    errorArea.classList.remove("hidden");
                    return;
                }

                currentStocksData = stocks || [];
                updateDrugFilterOptions();
                updateAddFormDrugOptions();
                renderStockList();

            } catch (e) {
                errorText.innerText = "通信エラー: " + e.message;
                errorArea.classList.remove("hidden");
            }
        }

        function updateDrugFilterOptions() {
            const dropdown = document.getElementById("custom-filter-dropdown");
            if (!dropdown) return;

            const drugNames = [...new Set(currentStocksData.map(item => item.drug_name))]
                .sort((a, b) => a.localeCompare(b, 'ja'));

            let html = `<button type="button" onclick="selectCustomFilter('ALL', 'すべての薬品')" class="w-full text-left px-3 py-2 text-xs text-gray-700 hover:bg-blue-50 font-bold border-b border-gray-100">すべての薬品</button>`;
            
            drugNames.forEach(name => {
                html += `<button type="button" onclick="selectCustomFilter('${name}', '${name}')" class="w-full text-left px-3 py-2 text-xs text-gray-700 hover:bg-blue-50 font-bold border-b border-gray-100 truncate">${name}</button>`;
            });
            
            dropdown.innerHTML = html;

            if (selectedDrugFilter !== "ALL" && !drugNames.includes(selectedDrugFilter)) {
                selectedDrugFilter = "ALL";
            }
            
            const labelEl = document.getElementById("custom-filter-label");
            if (labelEl) {
                labelEl.innerText = (selectedDrugFilter === "ALL") ? "すべての薬品" : selectedDrugFilter;
            }
        }

        function updateAddFormDrugOptions() {
            const selectElement = document.getElementById("input-drug-select");
            if (!selectElement) return;
            const drugNames = [...new Set(currentStocksData.map(item => item.drug_name))]
                .sort((a, b) => a.localeCompare(b, 'ja'));
            let html = `<option value="">ーー 選択してください ーー</option>`;
            drugNames.forEach(name => { html += `<option value="${name}">${name}</option>`; });
            html += `<option value="__NEW__">➕ 新しい薬品を追加（直接入力）...</option>`;
            selectElement.innerHTML = html;
        }

        function renderStockList() {
            const stockListElement = document.getElementById("stock-list");
            const alertSection = document.getElementById("alert-section");
            const alertListElement = document.getElementById("alert-list");
            const listTitleElement = document.getElementById("list-title");
            const paginationPanel = document.getElementById("pagination-panel");

            stockListElement.innerHTML = "";
            alertListElement.innerHTML = "";
            let hasAlert = false;

            if (currentStocksData.length === 0) {
                stockListElement.innerHTML = `<p class="text-center text-gray-500 py-8">資材が登録されていません。</p>`;
                alertSection.classList.add("hidden");
                paginationPanel.classList.add("hidden");
                return;
            }

            if (selectedDrugFilter === "ALL") {
                listTitleElement.innerText = searchQuery ? `検索結果一覧` : "全資材一覧";
            } else {
                listTitleElement.innerText = `「${selectedDrugFilter}」の資材一覧`;
            }
            
            currentStocksData.forEach(item => {
                const isShortage = item.current_stock < item.min_stock;
                if (isShortage && !item.is_ordering) {
                    hasAlert = true;
                    alertListElement.innerHTML += `
                        <div class="bg-red-100 border-l-4 border-red-500 text-red-700 p-2 text-sm rounded shadow-sm">
                            <strong>${item.drug_name}</strong>: ${item.shizai_name} (残り ${item.current_stock}個 / 最低 ${item.min_stock}個)
                        </div>
                    `;
                }
            });

            let filteredItems = currentStocksData.filter(item => {
                if (selectedDrugFilter !== "ALL" && item.drug_name !== selectedDrugFilter) {
                    return false;
                }
                if (searchQuery) {
                    const normalizedQuery = normalizeString(searchQuery);
                    const matchShizai = normalizeString(item.shizai_name).includes(normalizedQuery);
                    const matchDrug = normalizeString(item.drug_name).includes(normalizedQuery);
                    if (!matchShizai && !matchDrug) {
                        return false;
                    }
                }
                return true;
            });

            const sortMethod = document.getElementById("sort-selector").value;
            filteredItems.sort((a, b) => {
                const aIsUrgent = (a.is_ordering || (a.current_stock < a.min_stock)) ? 1 : 0;
                const bIsUrgent = (b.is_ordering || (b.current_stock < b.min_stock)) ? 1 : 0;
                if (aIsUrgent !== bIsUrgent) {
                    return bIsUrgent - aIsUrgent;
                }
                if (sortMethod === "shizai_asc") {
                    return (a.shizai_name || "").localeCompare((b.shizai_name || ""), 'ja');
                } else if (sortMethod === "stock_asc") {
                    return (a.current_stock || 0) - (b.current_stock || 0);
                } else if (sortMethod === "stock_desc") {
                    return (b.current_stock || 0) - (a.current_stock || 0);
                }
                const aTime = a.updated_at ? new Date(a.updated_at).getTime() : 0;
                const bTime = b.updated_at ? new Date(b.updated_at).getTime() : 0;
                return bTime - aTime;
            });

            const totalItems = filteredItems.length;
            const totalPages = Math.ceil(totalItems / ITEMS_PER_PAGE) || 1;

            if (currentPage > totalPages) currentPage = totalPages;
            if (currentPage < 1) currentPage = 1;

            const startIndex = (currentPage - 1) * ITEMS_PER_PAGE;
            const endIndex = startIndex + ITEMS_PER_PAGE;
            const pageItems = filteredItems.slice(startIndex, endIndex);

            if (totalItems > 0) {
                document.getElementById("page-info").innerText = `${currentPage} / ${totalPages} ページ (${totalItems}件中 ${startIndex + 1}〜${Math.min(endIndex, totalItems)}件)`;
                paginationPanel.classList.remove("hidden");
                document.getElementById("prev-page-btn").disabled = (currentPage === 1);
                document.getElementById("next-page-btn").disabled = (currentPage === totalPages);
            } else {
                stockListElement.innerHTML = `<p class="text-center text-gray-500 py-8">該当する資材が見つかりません。</p>`;
                paginationPanel.classList.add("hidden");

                }

            pageItems.forEach(item => {
                const isShortage = item.current_stock < item.min_stock;
                if (editingId === item.id) {
                    const hasPhoto = item.image_url && item.image_url.trim() !== "";
                    const editCardHtml = `
                        <div class="bg-blue-50 p-4 rounded-xl shadow-sm border border-blue-400 text-sm space-y-2">

                            </div>

                                <label class="block text-xs text-gray-500 mb-0.5">資材名</label>
                                <input type="text" id="edit-shizai-${item.id}" value="${item.shizai_name}" class="w-full p-1.5 border rounded">
                            </div>
                            <div class="grid grid-cols-2 gap-2">
                                <div>
                                    <label class="block text-xs text-gray-500 mb-0.5">現在在庫</label>

                                </div>

                            <div>
                                <label class="block text-xs text-gray-500 mb-0.5">内訳・備考</label>
                                <textarea id="edit-contents-${item.id}" rows="3" class="w-full p-1.5 border rounded text-xs resize-none">${item.contents || ''}</textarea>
                            </div>
                            <div class="bg-white p-2 rounded border border-gray-200">
                                <label class="block text-xs font-bold text-gray-500 mb-1">📸 資材の写真</label>
                                <div class="flex items-center space-x-2 flex-wrap gap-y-1.5">
                                    <input type="file" id="edit-image-file-${item.id}" accept="image/*" onchange="uploadImageHandler('edit', ${item.id})" class="hidden">
                                    <button type="button" onclick="document.getElementById('edit-image-file-${item.id}').click()" class="bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-1 px-2 rounded text-xs border transition">
                                        ${hasPhoto ? '📷 写真を変更' : '📷 写真を登録'}
                                    </button>
                                    <button type="button" id="btn-delete-image-${item.id}" onclick="deleteImageOnly(${item.id})" class="bg-red-50 hover:bg-red-100 text-red-600 font-bold py-1 px-2 rounded text-xs border border-red-200 transition ${hasPhoto ? '' : 'hidden'}">
                                        🗑️ 写真を削除
                                    </button>
                                    <span id="edit-upload-status-${item.id}" class="text-xs text-gray-400 truncate max-w-[150px]">
                                        ${hasPhoto ? '現在の画像あり' : '未登録'}
                                    </span>
                                </div>
                                <input type="hidden" id="edit-image-url-${item.id}" value="${item.image_url || ''}">
                            </div>
                            <div class="border-t pt-2 mt-1 space-y-2 bg-white p-2 rounded border border-blue-200">
                                <label class="block text-gray-700 font-bold text-xs">📦 発注情報</label>
                                <div>
                                    <label class="block text-gray-400 text-xs mb-0.5">オンライン発注URL</label>
                                    <input type="url" id="edit-order-url-${item.id}" value="${item.order_url || ''}" class="w-full p-1 border rounded text-xs">
                                </div>
                                <div class="grid grid-cols-2 gap-1">
                                    <div>
                                        <label class="block text-gray-400 text-xs mb-0.5">電話連絡先名</label>
                                        <input type="text" id="edit-phone-name-${item.id}" value="${item.phone_name || ''}" class="w-full p-1 border rounded text-xs">
                                    </div>
                                    <div>
                                        <label class="block text-gray-400 text-xs mb-0.5">電話番号</label>
                                        <input type="tel" id="edit-phone-number-${item.id}" value="${item.phone_number || ''}" class="w-full p-1 border rounded text-xs">
                                    </div>
                                </div>
                            </div>
                            <div class="grid grid-cols-2 gap-2 pt-2">
                                <button onclick="cancelEdit()" class="bg-gray-300 text-gray-700 font-bold py-1.5 rounded-lg">キャンセル</button>
                                <button onclick="saveEdit(${item.id})" class="bg-blue-600 text-white font-bold py-1.5 rounded-lg">変更を保存</button>
                            </div>
                        </div>
                    `;
                    stockListElement.innerHTML += editCardHtml;
                    return;
                }

                const isOrdering = item.is_ordering;
                let statusBadge = "";
                let cardBorderStyle = "border-gray-200 bg-white";

                if (isOrdering) {
                    statusBadge = `<span class="bg-orange-500 text-white font-bold px-2 py-0.5 rounded-full text-xxs shadow-sm">📦 発注済</span>`;
                    cardBorderStyle = "border-orange-300 bg-orange-50 bg-opacity-40";
                } else if (isShortage) {
                    statusBadge = `<span class="bg-red-500 text-white font-bold px-2 py-0.5 rounded-full text-xxs shadow-sm animate-pulse">⚠️ 要発注</span>`;
                    cardBorderStyle = "border-red-300 bg-red-50 bg-opacity-40";
                }

                let infoText = "";
                if (item.contents && item.contents.trim() !== "") {
                    infoText = `<p class="text-xs text-gray-500 font-medium leading-relaxed whitespace-pre-wrap mt-1 border-t border-gray-100 pt-1">${item.contents}</p>`;
                }

                let photoThumbnailHtml = "";
                if (item.image_url && item.image_url.trim() !== "") {
                    photoThumbnailHtml = `
                        <div class="flex-shrink-0 mr-3 cursor-pointer" onclick="openImageModal('${item.image_url}')">
                            <img src="${item.image_url}" alt="資材写真" class="w-11 h-11 object-cover rounded-lg border shadow-xs bg-gray-50">
                        </div>
                    `;
                } else {
                    photoThumbnailHtml = `
                        <div class="flex-shrink-0 mr-3 select-none">
                            <div class="w-11 h-11 bg-gray-100 rounded-lg border border-dashed flex items-center justify-center text-gray-300 text-lg">📄</div>
                        </div>
                    `;
                }

                let orderButtonsHtml = "";
                if (item.order_url && item.order_url.trim() !== "") {
                    orderButtonsHtml += `
                        <a href="${item.order_url}" target="_blank" onclick="event.stopPropagation();" class="flex-1 bg-green-500 hover:bg-green-600 text-white font-bold py-2 rounded-xl text-xs shadow-sm transition flex items-center justify-center space-x-1">

                if (item.phone_number && item.phone_number.trim() !== "") {
                    const label = item.phone_name ? `${item.phone_name}` : '電話';
                    orderButtonsHtml += `
                        <a href="tel:${item.phone_number}" onclick="event.stopPropagation();" class="flex-1 bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 rounded-xl text-xs shadow-sm transition flex items-center justify-center space-x-1" title="${label}: ${item.phone_number}">
                            <span>📞 ${label}</span>
                        </a>
                    `;
                }

                const itemHtml = `
                    <div class="border rounded-xl shadow-xs transition active:scale-[0.99] select-none overflow-hidden ${cardBorderStyle}">
                        <div onclick="toggleDetails(${item.id})" class="p-3.5 flex items-center justify-between cursor-pointer">
                            <div class="flex items-center min-w-0 flex-1">
                                ${photoThumbnailHtml}
                                <div class="min-w-0 flex-1 pr-1">

                                </button>

            if (hasAlert) {
                alertSection.classList.remove("hidden");
            } else {
                alertSection.classList.add("hidden");
            }
        }

        function startEdit(id) {
            const targetItem = currentStocksData.find(item => item.id === id);
            if (!targetItem) return;

            editingId = id;
            editInitialState = {
                drug_name: targetItem.drug_name || "",
                shizai_name: targetItem.shizai_name || "",
                current_stock: parseInt(targetItem.current_stock, 10) || 0,
                min_stock: parseInt(targetItem.min_stock, 10) || 0,
                contents: targetItem.contents || "",
                image_url: targetItem.image_url || "",
                order_url: targetItem.order_url || "",
                phone_name: targetItem.phone_name || "",
                phone_number: targetItem.phone_number || ""
            };

            renderStockList();
        }

        function cancelEdit() {
            editingId = null;
            editInitialState = null;
            renderStockList();
        }

        async function saveEdit(id) {
            const drug = document.getElementById(`edit-drug-${id}`).value.trim();
            const shizai = document.getElementById(`edit-shizai-${id}`).value.trim();
            const current = parseInt(document.getElementById(`edit-current-${id}`).value) || 0;
            const min = parseInt(document.getElementById(`edit-min-${id}`).value) || 0;
            const contents = document.getElementById(`edit-contents-${id}`).value.trim();
            const imageUrl = document.getElementById(`edit-image-url-${id}`).value.trim();
            const orderUrl = document.getElementById(`edit-order-url-${id}`).value.trim();
            const phoneName = document.getElementById(`edit-phone-name-${id}`).value.trim();
            const phoneNumber = document.getElementById(`edit-phone-number-${id}`).value.trim();

            if (!drug) { alert("薬品名は空欄にできません。"); return; }
            if (!shizai) { alert("資材名称は空欄にできません。"); return; }

            const { error } = await db
                .from('shizai_stocks')
                .update({
                    drug_name: drug,
                    shizai_name: shizai,
                    current_stock: current,
                    min_stock: min,
                    contents: contents,
                    image_url: imageUrl,
                    order_url: orderUrl,
                    phone_name: phoneName,
                    phone_number: phoneNumber
                })
                .eq('id', id);

            if (error) {
                alert("保存エラー: " + error.message);
            } else {
                showToast("変更をデータベースに保存しました！");
                editingId = null;
                editInitialState = null;
                fetchStocks();
            }
        }

        async function toggleOrderState(id, currentStatus) {
            const nextStatus = !currentStatus;
            const { error } = await db
                .from('shizai_stocks')
                .update({ is_ordering: nextStatus })
                .eq('id', id);

            if (error) {
                alert("ステータス変更エラー: " + error.message);
            } else {
                showToast(nextStatus ? "ステータスを【発注済み】に変更しました" : "発注分が届いたため【通常状態】に戻しました");
                fetchStocks();
            }
        }

        async function deleteShizai(id, name, imageUrl) {
            if (!confirm(`【本当に削除しますか？】\n資材「${name}」のデータを完全に削除します。この操作は取り消せません。`)) {
                return;
            }

            try {
                if (imageUrl && imageUrl.trim() !== "") {
                    const storagePath = extractStoragePath(imageUrl);
                    if (storagePath) {
                        const { error: storageError } = await db.storage
                            .from('shizai-images')
                            .remove([storagePath]);
                        if (storageError) {
                            console.warn("Storageの画像削除に失敗したか、既にありません:", storageError.message);
                        }
                    }
                }

                const { error } = await db
                    .from('shizai_stocks')
                    .delete()
                    .eq('id', id);

                if (error) {
                    alert("削除エラー: " + error.message);
                } else {
                    showToast(`「${name}」を削除しました`);
                    openedCardId = null;
                    fetchStocks();
                }
            } catch (err) {
                console.error(err);
                alert("削除処理中に想定外のエラーが発生しました。");
            }
        }

                        <option value="20">20 個</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-500 text-xs">▼</div>
                </div>
            `;

            const messageEl = document.getElementById("payout-modal-message");
            if (messageEl) {
                messageEl.innerHTML = `
                    <span class="font-bold text-gray-800 text-sm block mb-2 truncate max-w-[230px]">「${name}」</span>
                    <div class="flex items-center justify-center space-x-2 bg-gray-50 p-2.5 rounded-xl border border-gray-100 mt-2">
                        <span class="text-gray-500 font-bold text-xs">払い出し数:</span>
                        ${selectHtml}
                    </div>
                `;
            }

            const confirmBtn = document.getElementById("payout-modal-confirm-btn");
            if (confirmBtn) {
                confirmBtn.onclick = function() {
                    const selectEl = document.getElementById("payout-quantity-selector");
                    const count = selectEl ? parseInt(selectEl.value, 10) : 1;
                    executePayout(pendingPayoutId, count, name);
                };
            }

            const modal = document.getElementById("payout-confirm-modal");
            if (modal) modal.classList.remove("hidden");
        }

        function cancelPayoutModal() {
            const modal = document.getElementById("payout-confirm-modal");
            if (modal) modal.classList.add("hidden");
            pendingPayoutId = null;
        }

        async function executePayout(id, count, name) {
            cancelPayoutModal();
            const targetItem = currentStocksData.find(item => item.id === id);
            if (!targetItem) return;

            const currentStock = targetItem.current_stock || 0;
            const newStock = Math.max(0, currentStock - count);

            const { error } = await db
                .from('shizai_stocks')
                .update({ current_stock: newStock })
                .eq('id', id);

            if (error) {
                alert("払い出しエラー: " + error.message);
            } else {
                showToast(`「${name}」を ${count}個 払い出しました (残り: ${newStock}個)`);
                fetchStocks();
            }
        }

        function openImageModal(url) {
            const modal = document.getElementById("image-preview-modal");
            const img = document.getElementById("modal-preview-img");
            if (modal && img) {
                img.src = url;
                modal.classList.remove("hidden");
            }
        }

        function closeImageModal() {
            const modal = document.getElementById("image-preview-modal");
            if (modal) modal.classList.add("hidden");
        }

        function showToast(message) {
            const toast = document.getElementById("custom-toast");
            if (!toast) return;
            
            toast.innerText = message;
            toast.classList.remove("hidden");
            toast.classList.remove("opacity-0");
            toast.classList.add("opacity-100");

            setTimeout(() => {
                toast.classList.remove("opacity-100");
                toast.classList.add("opacity-0");
                setTimeout(() => {
                    toast.classList.add("hidden");
                }, 300);
            }, 2400);
        }
    </script>

    <div id="image-preview-modal" class="fixed inset-0 bg-black bg-opacity-80 z-50 flex items-center justify-center p-4 hidden" onclick="closeImageModal()">
        <div class="relative max-w-sm w-full bg-white rounded-2xl overflow-hidden shadow-2xl" onclick="event.stopPropagation();">
            <img id="modal-preview-img" src="" alt="拡大写真" class="w-full h-auto max-h-[70vh] object-contain bg-gray-900">
            <div class="p-3 text-center bg-white border-t">
                <button onclick="closeImageModal()" class="w-full bg-gray-800 hover:bg-gray-900 text-white font-bold py-2 rounded-xl text-xs transition">
                    閉じる
                </button>
            </div>
        </div>
    </div>

    <div id="payout-confirm-modal" class="fixed inset-0 bg-gray-900 bg-opacity-60 z-50 flex items-center justify-center p-4 hidden" onclick="cancelPayoutModal()">
        <div class="bg-white rounded-2xl p-4 shadow-2xl space-y-3.5 mx-auto" style="width: 270px;" onclick="event.stopPropagation();">
            <div class="text-center">
                <h4 class="font-bold text-gray-800 text-sm leading-tight">払い出しの確認</h4>
                <p id="payout-modal-message" class="text-xs text-gray-500 mt-2 font-medium leading-relaxed">
                    この資材を払い出してよろしいですか？
                </p>
            </div>
            <div class="grid grid-cols-2 gap-2.5 pt-2 border-t border-gray-100">
                <button onclick="cancelPayoutModal()" class="w-full bg-gray-100 hover:bg-gray-200 text-gray-600 font-bold py-2 rounded-xl text-xs transition">
                    キャンセル
                </button>
                <button id="payout-modal-confirm-btn" class="w-full bg-gray-800 hover:bg-gray-900 text-white font-bold py-2 rounded-xl text-xs shadow-sm transition">
                    OK
                </button>
            </div>
        </div>
    </div>

    <div id="custom-toast" class="fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-gray-900 bg-opacity-90 text-white text-xs font-bold py-3 px-5 rounded-xl shadow-2xl transition-all duration-300 z-50 hidden opacity-0 select-none pointer-events-none text-center min-w-[200px]"></div>

</body>
</html>
