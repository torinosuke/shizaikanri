<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>患者用資材管理ページ</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .cursor-pointer, .header-title-btn, .page-btn, .tab-btn { -webkit-tap-highlight-color: transparent; }

<body class="bg-gray-100 min-h-screen text-gray-800 font-sans pb-12">

    <header class="bg-blue-600 text-white p-4 sticky top-0 z-50 shadow-md">
        <div class="container mx-auto flex justify-between items-center max-w-md">
            <h1 onclick="resetToAllDrugs(); switchTab('list');" class="text-xl font-bold cursor-pointer active:opacity-80 transition header-title-btn select-none" title="全資材一覧を表示">
                患者用資材管理
            </h1>
            <div class="flex space-x-2">
                <button onclick="toggleAddForm(); switchTab('list');" class="bg-blue-500 hover:bg-blue-400 px-3 py-1 rounded text-sm font-bold transition">
                    ➕ 資材追加
                </button>
                <button id="refresh-btn" onclick="handleRefresh()" class="bg-blue-700 hover:bg-blue-800 px-3 py-1 rounded text-sm transition min-w-[60px]">
                    🔄 更新
                </button>
            </div>
        </div>
    </header>

    <nav class="bg-white border-b border-gray-200 sticky top-14 z-40 shadow-sm">
        <div class="container mx-auto max-w-md grid grid-cols-3 text-center text-sm font-bold text-gray-500">
            <button id="tab-list" onclick="switchTab('list')" class="py-3 border-b-2 border-blue-600 text-blue-600 transition tab-btn">📦 在庫一覧</button>
            <button id="tab-logs" onclick="switchTab('logs')" class="py-3 border-b-2 border-transparent hover:text-gray-700 transition tab-btn">📜 入出庫履歴</button>
            <button id="tab-chart" onclick="switchTab('chart')" class="py-3 border-b-2 border-transparent hover:text-gray-700 transition tab-btn">📊 消費グラフ</button>
        </div>
    </nav>

    <main class="container mx-auto p-4 max-w-md">
        
        <div id="error-message" class="mb-4 bg-orange-100 border-l-4 border-orange-500 text-orange-700 p-3 rounded text-sm hidden">
            <strong>⚠️ 接続エラー:</strong> <p id="error-text" class="mt-1"></p>
        </div>

        <section id="section-list" class="space-y-4">
            <div id="add-form-section" class="mb-6 bg-white p-4 rounded-xl shadow-md border border-blue-200 hidden">
                <h2 class="text-blue-700 font-bold text-base mb-3 flex justify-between items-center">
                    <span>新しく資材を登録する</span>
                    <button onclick="toggleAddForm()" class="text-gray-400 text-sm font-normal">閉じる</button>
                </h2>
                <div class="space-y-3 text-sm">
                    <div>
                        <label class="block text-gray-600 font-medium mb-1">対象薬品名</label>
                        <select id="input-drug-select" onchange="toggleDrugInputMethod()" class="w-full p-2 border rounded-lg bg-gray-50 font-bold text-gray-700 outline-none"></select>
                        <input type="text" id="input-drug-text" placeholder="例：〇〇皮下注（新しい薬品名を入力）" class="w-full p-2 border rounded-lg outline-none mt-2 hidden">
                    </div>
                    <div>
                        <label class="block text-gray-600 font-medium mb-1">資材名称</label>
                        <input type="text" id="input-shizai" placeholder="例：患者用説明資材、保冷バッグ" class="w-full p-2 border rounded-lg outline-none">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-gray-600 font-medium mb-1">初期在庫数</label>
                            <input type="number" id="input-current" value="0" min="0" class="w-full p-2 border rounded-lg outline-none">
                        </div>
                        <div>
                            <label class="block text-gray-600 font-medium mb-1">最低在庫数</label>
                            <input type="number" id="input-min" value="2" min="0" class="w-full p-2 border rounded-lg outline-none">
                        </div>
                    </div>
                    <div class="mt-3">
                        <label class="block text-gray-600 font-medium mb-1">内訳・備考（※改行して箇条書きOK）</label>
                        <textarea id="input-contents" rows="3" placeholder="例：&#13;・保冷バッグ・廃棄袋同梱" class="w-full p-3 border rounded-lg outline-none text-sm bg-white resize-none"></textarea>

                        <label class="block text-gray-600 font-bold text-xs mb-1">📸 資材の写真を追加（※任意）</label>
                        <div class="flex items-center space-x-2">
                            <input type="file" id="input-image-file" accept="image/*" capture="environment" onchange="uploadImageHandler('add')" class="hidden">

                                <input type="text" id="input-phone-name" placeholder="〇〇卸 担当など" class="w-full p-1.5 border rounded bg-white">

            </div>

            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 mb-4 space-y-3">

                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1.5">キーワード検索（資材名・薬品名）</label>
                    <div class="relative">

                        <button id="search-clear-btn" onclick="clearSearchInput()" class="absolute inset-y-0 right-0 px-3 flex items-center text-gray-400 hover:text-gray-600 hidden">✕</button>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1.5">対象薬品フィルター</label>
                        <div class="relative">
                            <select id="drug-filter" onchange="filterSelectorChanged()" class="w-full p-2.5 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-400 outline-none text-xs font-bold text-gray-700 appearance-none">

                            </select>
                            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2.5 text-gray-500 text-xs">▼</div>

                    </div>
                    <div>

                        <div class="relative">

                                <option value="default">標準（更新順）</option>
                                <option value="shizai_asc">名称（五十音順）</option>
                                <option value="stock_asc">在庫（少ない順）</option>
                                <option value="stock_desc">在庫（多い順）</option>
                            </select>
                            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2.5 text-gray-500 text-xs">▼</div>
                        </div>
                    </div>
                </div>
            </div>

            <hr class="border-gray-300 my-4">
            <h2 id="list-title" class="font-bold text-lg mb-3 text-gray-700">資材一覧</h2>
            <div id="stock-list" class="space-y-2">

            </div>

            <div id="pagination-panel" class="mt-5 flex justify-between items-center bg-white p-2.5 rounded-xl border shadow-sm text-sm hidden">

                <span id="page-info" class="font-bold text-gray-600 select-none">1 / 1 ページ</span>
                <button id="next-page-btn" onclick="changePage(1)" class="bg-gray-100 hover:bg-gray-200 active:bg-gray-300 text-gray-700 font-bold py-1.5 px-3 rounded-lg transition disabled:opacity-40 page-btn">次へ ▶</button>
            </div>
        </section>

        <section id="section-logs" class="space-y-4 hidden">
            <div class="flex justify-between items-center">
                <h2 class="font-bold text-lg text-gray-700">入出庫履歴（直近100件）</h2>
            </div>
            <div id="logs-list" class="space-y-2">
                <p class="text-center text-gray-500 py-8">履歴を読み込み中...</p>
            </div>
        </section>

        <section id="section-chart" class="space-y-4 hidden">
            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 space-y-3">
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider">集計期間の選択（払い出し数）</label>
                <div class="grid grid-cols-3 gap-2 text-center text-xs font-bold">
                    <button id="btn-period-7" onclick="changeChartPeriod(7)" class="py-2 rounded-lg bg-blue-600 text-white shadow-sm">7日間</button>
                    <button id="btn-period-30" onclick="changeChartPeriod(30)" class="py-2 rounded-lg bg-gray-100 text-gray-600 border">30日間</button>
                    <button id="btn-period-90" onclick="changeChartPeriod(90)" class="py-2 rounded-lg bg-gray-100 text-gray-600 border">90日間</button>
                </div>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200">
                <h3 class="font-bold text-sm text-gray-700 mb-3 text-center">📊 資材別 消費数（払い出し数）ランキング</h3>
                <div class="relative w-full h-72">
                    <canvas id="consumptionChart"></canvas>
                </div>
                <p id="chart-empty-message" class="text-center text-gray-400 text-sm py-12 hidden">指定期間内の払い出しデータがありません。</p>
            </div>
        </section>

    </main>

    <script>
        // Supabase設定 [cite: 30]
        const SUPABASE_URL = "https://kkxpqxaxthrcxdvrmbty.supabase.co"; // [cite: 30]
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtreHBxeGF4dGhyY3hkdnJtYnR5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3NzMzODgsImV4cCI6MjA5NjM0OTM4OH0.Ptcn2lYMqbn4L5g1sV7r6E372cxfIyhsxgAkH7a65aU"; // [cite: 30]
        
        let db; // [cite: 30]
        try { db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY); } catch (e) { console.error(e); } // [cite: 31]

        let currentStocksData = []; // [cite: 32]
        let currentLogsData = [];
        let editingId = null; // [cite: 32]
        let selectedDrugFilter = "ALL"; // [cite: 32]
        let openedCardId = null; // [cite: 33]
        let currentTab = "list";

        let searchQuery = ""; // [cite: 34]
        let currentPage = 1; // [cite: 34]
        const ITEMS_PER_PAGE = 10; // [cite: 34]

        // グラフオブジェクト管理用
        let myChart = null;
        let chartPeriodDays = 7;

        document.addEventListener("DOMContentLoaded", () => {
            fetchStocks(); // [cite: 34]
        });

        // タブ切り替え制御
        function switchTab(tabName) {
            currentTab = tabName;
            const sections = { list: 'section-list', logs: 'section-logs', chart: 'section-chart' };
            const tabs = { list: 'tab-list', logs: 'tab-logs', chart: 'tab-chart' };

            Object.keys(sections).forEach(key => {
                const secEl = document.getElementById(sections[key]);
                const tabEl = document.getElementById(tabs[key]);
                if (key === tabName) {
                    secEl.classList.remove("hidden");
                    tabEl.className = "py-3 border-b-2 border-blue-600 text-blue-600 transition tab-btn";
                } else {
                    secEl.classList.add("hidden");
                    tabEl.className = "py-3 border-b-2 border-transparent text-gray-500 hover:text-gray-700 transition tab-btn";
                }
            });

            if (tabName === 'logs') fetchLogs();
            if (tabName === 'chart') fetchChartData();
        }

        // 共通更新ハンドラ
        function handleRefresh() {
            if (currentTab === 'list') fetchStocks();
            if (currentTab === 'logs') fetchLogs();
            if (currentTab === 'chart') fetchChartData();
        }

        function toggleAddForm() { // [cite: 34]
            const form = document.getElementById("add-form-section"); // [cite: 34]
            form.classList.toggle("hidden"); // [cite: 34]
        } // [cite: 35]

        function handleSearchInput() { // [cite: 35]
            const input = document.getElementById("search-input"); // [cite: 35]
            searchQuery = input.value.trim(); // [cite: 36]
            const clearBtn = document.getElementById("search-clear-btn"); // [cite: 36]
            if (searchQuery.length > 0) clearBtn.classList.remove("hidden"); // [cite: 36]
            else clearBtn.classList.add("hidden"); // [cite: 36]
            currentPage = 1; // [cite: 36]
            renderStockList(); // [cite: 36]
        } // [cite: 37]

        function clearSearchInput() { // [cite: 37]
            document.getElementById("search-input").value = ""; // [cite: 37]
            searchQuery = ""; // [cite: 38]
            document.getElementById("search-clear-btn").classList.add("hidden"); // [cite: 38]
            currentPage = 1; // [cite: 38]
            renderStockList(); // [cite: 38]
        } // [cite: 39]

        function changePage(direction) { // [cite: 39]
            currentPage += direction; // [cite: 39]
            openedCardId = null; // [cite: 39]
            renderStockList(); // [cite: 39]
            document.getElementById("list-title").scrollIntoView({ behavior: 'smooth', block: 'start' }); // [cite: 39]
        } // [cite: 40]

        function filterSelectorChanged() { // [cite: 40]
            selectedDrugFilter = document.getElementById("drug-filter").value; // [cite: 40]
            currentPage = 1; // [cite: 41]
            renderStockList(); // [cite: 41]
        } // [cite: 42]

        function handleSortChanged() { // [cite: 42]
            currentPage = 1; // [cite: 41]
            renderStockList(); // [cite: 42]
        } // [cite: 43]

        function resetToAllDrugs() { // [cite: 43]
            selectedDrugFilter = "ALL"; // [cite: 43]
            const filterElement = document.getElementById("drug-filter"); // [cite: 43]
            if (filterElement) filterElement.value = "ALL"; // [cite: 43]
            clearSearchInput(); // [cite: 43]
            const form = document.getElementById("add-form-section"); // [cite: 43]
            if (form && !form.classList.contains("hidden")) form.classList.add("hidden"); // [cite: 43]
        } // [cite: 44]

        function normalizeString(str) { // [cite: 44]
            if (!str) return ""; // [cite: 45]
            return str.toLowerCase().normalize("NFKC").replace(/[\u30a1-\u30f6]/g, function(match) { // [cite: 45]
                return String.fromCharCode(match.charCodeAt(0) - 0x60); // [cite: 45]
            }); // [cite: 46]
        } // [cite: 46]

        function toggleDetails(id) { // [cite: 46]
            const panel = document.getElementById(`control-panel-${id}`); // [cite: 46]
            const arrow = document.getElementById(`arrow-${id}`); // [cite: 47]
            if (!panel) return; // [cite: 47]
            if (openedCardId === id) { // [cite: 47]
                panel.classList.add("hidden"); // [cite: 47]
                if (arrow) arrow.innerText = "▼"; // [cite: 48]
                openedCardId = null; // [cite: 48]
            } else { // [cite: 48]
                if (openedCardId !== null) { // [cite: 48]
                    const oldPanel = document.getElementById(`control-panel-${openedCardId}`); // [cite: 48]
                    const oldArrow = document.getElementById(`arrow-${openedCardId}`); // [cite: 49]
                    if (oldPanel) oldPanel.classList.add("hidden"); // [cite: 49]
                    if (oldArrow) oldArrow.innerText = "▼"; // [cite: 49]
                } // [cite: 50]
                panel.classList.remove("hidden"); // [cite: 50]
                if (arrow) arrow.innerText = "▲"; // [cite: 51]
                openedCardId = id; // [cite: 51]
            }
        }

        function toggleDrugInputMethod() { // [cite: 51]
            const selectElement = document.getElementById("input-drug-select"); // [cite: 51]
            const textInputElement = document.getElementById("input-drug-text"); // [cite: 52]
            if (selectElement.value === "__NEW__") { // [cite: 52]
                textInputElement.classList.remove("hidden"); // [cite: 52]
                textInputElement.focus(); // [cite: 53]
            } else { // [cite: 53]
                textInputElement.classList.add("hidden"); // [cite: 53]
                textInputElement.value = ""; // [cite: 54]
            }
        }

        function extractStoragePath(url) { // [cite: 54]
            if (!url || !url.includes('/storage/v1/object/public/shizai-images/')) return null; // [cite: 54]
            return url.split('/storage/v1/object/public/shizai-images/')[1]; // [cite: 55]
        }

        function compressImage(file, maxWidth = 800, quality = 0.75) { // [cite: 55]
            return new Promise((resolve, reject) => { // [cite: 55]
                const reader = new FileReader(); // [cite: 55]
                reader.readAsDataURL(file); // [cite: 55]
                reader.onload = (event) => { // [cite: 55]
                    const img = new Image(); // [cite: 56]
                    img.src = event.target.result; // [cite: 56]
                    img.onload = () => { // [cite: 56]
                        let width = img.width; // [cite: 56]
                        let height = img.height; // [cite: 57]
                        if (width > maxWidth) { // [cite: 57]
                            height = Math.round((height * maxWidth) / width); // [cite: 57]
                            width = maxWidth; // [cite: 58]
                        }
                        const canvas = document.createElement('canvas'); // [cite: 58]
                        canvas.width = width; // [cite: 58]
                        canvas.height = height; // [cite: 59]
                        const ctx = canvas.getContext('2d'); // [cite: 59]
                        ctx.drawImage(img, 0, 0, width, height); // [cite: 59]
                        canvas.toBlob((blob) => { // [cite: 60]
                            if (blob) { // [cite: 60]
                                const compressedFile = new File([blob], file.name, { // [cite: 60]
                                    type: 'image/jpeg', // [cite: 61]
                                    lastModified: Date.now() // [cite: 61]
                                }); // [cite: 61]
                                resolve(compressedFile); // [cite: 62]
                            } else reject(new Error("Canvas to Blob 変換に失敗しました")); // [cite: 62]
                        }, 'image/jpeg', quality); // [cite: 62]
                    }; // [cite: 63]
                    img.onerror = (err) => reject(err); // [cite: 63]
                }; // [cite: 63]
                reader.onerror = (err) => reject(err); // [cite: 63]
            }); // [cite: 64]
        }

        async function uploadImageHandler(mode, id = null) { // [cite: 64]
            const fileInput = mode === 'add' ? // [cite: 64]
                document.getElementById('input-image-file') : document.getElementById(`edit-image-file-${id}`); // [cite: 65]
            const statusLabel = mode === 'add' ? document.getElementById('add-upload-status') : document.getElementById(`edit-upload-status-${id}`); // [cite: 65]
            const urlHiddenInput = mode === 'add' ? // [cite: 65]
                document.getElementById('input-image-url') : document.getElementById(`edit-image-url-${id}`); // [cite: 66]
            if (!fileInput || !fileInput.files || fileInput.files.length === 0) return; // [cite: 66]
            let file = fileInput.files[0]; // [cite: 66]
            statusLabel.innerText = "⏳ 処理中..."; // [cite: 66]
            statusLabel.className = "text-xxs text-blue-600 font-bold animate-pulse"; // [cite: 67]
            try {
                file = await compressImage(file, 800, 0.75); // [cite: 67]
                statusLabel.innerText = "⏳ アップロード中..."; // [cite: 68]
                if (mode === 'edit' && id) { // [cite: 68]
                    const targetItem = currentStocksData.find(item => item.id === id); // [cite: 68]
                    if (targetItem && targetItem.image_url) { // [cite: 69]
                        const oldStoragePath = extractStoragePath(targetItem.image_url); // [cite: 69]
                        if (oldStoragePath) await db.storage.from('shizai-images').remove([oldStoragePath]); // [cite: 70]
                    }
                }
                const fileName = `${Date.now()}_${Math.random().toString(36).substring(2, 7)}.jpg`; // [cite: 70]
                const filePath = `shizai_pics/${fileName}`; // [cite: 71]
                const { data, error } = await db.storage.from('shizai-images').upload(filePath, file); // [cite: 71]
                if (error) throw error; // [cite: 71]
                const { data: urlData } = db.storage.from('shizai-images').getPublicUrl(filePath); // [cite: 72]
                urlHiddenInput.value = urlData.publicUrl; // [cite: 72]
                statusLabel.innerText = "✅ 完了"; // [cite: 72]
                statusLabel.className = "text-xxs text-green-600 font-bold"; // [cite: 72]
                const deleteBtn = document.getElementById(`btn-delete-image-${id}`); // [cite: 73]
                if (deleteBtn) deleteBtn.classList.remove("hidden"); // [cite: 73]
            } catch (err) {
                console.error(err); // [cite: 73]
                statusLabel.innerText = "❌ エラー"; // [cite: 74]
                statusLabel.className = "text-xxs text-red-500 font-bold"; // [cite: 74]
                alert("画像処理に失敗しました: " + err.message); // [cite: 74]
            }
        }

        async function deleteImageOnly(id) { // [cite: 75]
            const urlHiddenInput = document.getElementById(`edit-image-url-${id}`); // [cite: 75]
            const statusLabel = document.getElementById(`edit-upload-status-${id}`); // [cite: 76]
            const deleteBtn = document.getElementById(`btn-delete-image-${id}`); // [cite: 76]
            if (!urlHiddenInput || !urlHiddenInput.value) return; // [cite: 76]
            if (!confirm("写真データを削除しますか？")) return; // [cite: 76]
            const currentUrl = urlHiddenInput.value; // [cite: 76]
            statusLabel.innerText = "⏳ 消去中..."; // [cite: 77]
            try {
                const storagePath = extractStoragePath(currentUrl); // [cite: 77]
                if (storagePath) await db.storage.from('shizai-images').remove([storagePath]); // [cite: 78]
                urlHiddenInput.value = ""; // [cite: 78]
                statusLabel.innerText = "🗑️ 削除完了（未保存）"; // [cite: 78]
                statusLabel.className = "text-xxs text-red-500 font-bold"; // [cite: 78]
                if (deleteBtn) deleteBtn.classList.add("hidden"); // [cite: 78]
            } catch (err) {
                console.error(err); // [cite: 79]
                alert("写真の消去に失敗しました: " + err.message); // [cite: 80]
            }
        }

        async function addNewShizai() { // [cite: 80]
            const selectElement = document.getElementById("input-drug-select"); // [cite: 80]
            const textInputElement = document.getElementById("input-drug-text"); // [cite: 81]
            let drug = (selectElement.value === "__NEW__") ? textInputElement.value.trim() : selectElement.value; // [cite: 81]
            const shizai = document.getElementById("input-shizai").value.trim(); // [cite: 81]
            const current = parseInt(document.getElementById("input-current").value) || 0; // [cite: 82]
            const min = parseInt(document.getElementById("input-min").value) || 0; // [cite: 82]
            const contents = document.getElementById("input-contents").value.trim(); // [cite: 82]
            const imageUrl = document.getElementById("input-image-url").value.trim(); // [cite: 82]
            const orderUrl = document.getElementById("input-order-url").value.trim(); // [cite: 83]
            const phoneName = document.getElementById("input-phone-name").value.trim(); // [cite: 83]
            const phoneNumber = document.getElementById("input-phone-number").value.trim(); // [cite: 83]
            if (!drug || !shizai) { alert("薬品名と資材名称を入力してください。"); return; } // [cite: 83]
            const { error } = await db.from('shizai_stocks').insert([{ // [cite: 84]
                drug_name: drug, shizai_name: shizai, current_stock: current, min_stock: min, // [cite: 84]
                is_ordering: false, order_type: 'hybrid', order_url: orderUrl, phone_name: phoneName, // [cite: 84]
                phone_number: phoneNumber, contents: contents, image_url: imageUrl // [cite: 84]
            }]); // [cite: 85]
            if (error) alert("登録エラー: " + error.message); // [cite: 85]
            else { alert("登録しました！"); resetToAllDrugs(); fetchStocks(); toggleAddForm(); } // [cite: 85]
        }

        async function fetchStocks() { // [cite: 86]
            const errorArea = document.getElementById("error-message"); // [cite: 86]
            const errorText = document.getElementById("error-text"); // [cite: 87]
            const refreshBtn = document.getElementById("refresh-btn"); // [cite: 87]
            
            errorArea.classList.add("hidden"); // [cite: 87]
            if (refreshBtn) {
                refreshBtn.innerText = "⏳ 更新中..."; // [cite: 87]
                refreshBtn.disabled = true; // [cite: 88]
                refreshBtn.classList.add("opacity-60"); // [cite: 88]
            }

            try {
                const { data: stocks, error } = await db.from('shizai_stocks').select('*').order('id', { ascending: true }); // [cite: 88]
                if (error) { errorText.innerText = error.message; errorArea.classList.remove("hidden"); return; } // [cite: 89]
                currentStocksData = stocks || []; // [cite: 89]
                updateDrugFilterOptions(); // [cite: 90]
                updateAddFormDrugOptions(); // [cite: 90]
                renderStockList(); // [cite: 90]
            } catch (e) {
                errorText.innerText = "通信エラー: " + e.message; // [cite: 90]
                errorArea.classList.remove("hidden"); // [cite: 91]
            } finally {
                if (refreshBtn) {
                    refreshBtn.innerText = "🔄 更新"; // [cite: 91]
                    refreshBtn.disabled = false; // [cite: 92]
                    refreshBtn.classList.remove("opacity-60"); // [cite: 92]
                }
            }
        }

        function updateDrugFilterOptions() { // [cite: 92]
            const filterElement = document.getElementById("drug-filter"); // [cite: 92]
            const drugNames = [...new Set(currentStocksData.map(item => item.drug_name))].sort((a, b) => a.localeCompare(b, 'ja')); // [cite: 93]
            filterElement.innerHTML = `<option value="ALL">全ての薬品</option>`; // [cite: 93]
            drugNames.forEach(name => { // [cite: 94]
                const selectedAttr = (name === selectedDrugFilter) ? "selected" : ""; // [cite: 94]
                filterElement.innerHTML += `<option value="${name}" ${selectedAttr}>${name}</option>`; // [cite: 94]
            }); // [cite: 95]
        }

        function updateAddFormDrugOptions() { // [cite: 95]
            const selectElement = document.getElementById("input-drug-select"); // [cite: 95]
            if (!selectElement) return; // [cite: 96]
            const drugNames = [...new Set(currentStocksData.map(item => item.drug_name))].sort((a, b) => a.localeCompare(b, 'ja')); // [cite: 96]
            let html = `<option value="">ーー 選択してください ーー</option>`; // [cite: 97]
            drugNames.forEach(name => { html += `<option value="${name}">${name}</option>`; }); // [cite: 97]
            html += `<option value="__NEW__">➕ 新しい薬品を追加...</option>`; // [cite: 97]

        function renderStockList() { // [cite: 98]

            const alertSection = document.getElementById("alert-section"); // [cite: 99]
            const alertListElement = document.getElementById("alert-list"); // [cite: 99]

            const paginationPanel = document.getElementById("pagination-panel"); // [cite: 99]
            stockListElement.innerHTML = ""; // [cite: 99]

                stockListElement.innerHTML = `<p class="text-center text-gray-500 py-8">資材が登録されていません。</p>`; // [cite: 100]

            if (selectedDrugFilter === "ALL") listTitleElement.innerText = searchQuery ? `検索結果一覧` : "全資材一覧"; // [cite: 101]

            currentStocksData.forEach(item => { // [cite: 102]

                } // [cite: 103]
            }); // [cite: 104]
            
            let filteredItems = currentStocksData.filter(item => { // [cite: 104]
                if (selectedDrugFilter !== "ALL" && item.drug_name !== selectedDrugFilter) return false; // [cite: 104]
                if (searchQuery) { // [cite: 104]
                    const nq = normalizeString(searchQuery); // [cite: 104]
                    if (!normalizeString(item.shizai_name).includes(nq) && !normalizeString(item.drug_name).includes(nq)) return false; // [cite: 104]
                } // [cite: 105]
                return true; // [cite: 105]
            }); // [cite: 106]
            
            const sortMethod = document.getElementById("sort-selector").value; // [cite: 106]
            filteredItems.sort((a, b) => { // [cite: 106]
                const aUrgent = (a.is_ordering || (a.current_stock < a.min_stock)) ? 1 : 0; // [cite: 106]
                const bUrgent = (b.is_ordering || (b.current_stock < b.min_stock)) ? 1 : 0; // [cite: 106]
                if (aUrgent !== bUrgent) return bUrgent - aUrgent; // [cite: 106]
                if (sortMethod === "shizai_asc") return (a.shizai_name || "").localeCompare((b.shizai_name || ""), 'ja'); // [cite: 107]
                if (sortMethod === "stock_asc") return (a.current_stock || 0) - (b.current_stock || 0); // [cite: 107]
                if (sortMethod === "stock_desc") return (b.current_stock || 0) - (a.current_stock || 0); // [cite: 107]
                return new Date(b.updated_at || 0) - new Date(a.updated_at || 0); // [cite: 107]
            }); // [cite: 108]

            const totalPages = Math.ceil(filteredItems.length / ITEMS_PER_PAGE) || 1; // [cite: 108]
            if (currentPage > totalPages) currentPage = totalPages; // [cite: 108]
            const startIndex = (currentPage - 1) * ITEMS_PER_PAGE; // [cite: 109]
            const pageItems = filteredItems.slice(startIndex, startIndex + ITEMS_PER_PAGE); // [cite: 110]
            
            if (filteredItems.length > 0) { // [cite: 110]

                paginationPanel.classList.remove("hidden"); // [cite: 111]
                document.getElementById("prev-page-btn").disabled = (currentPage === 1); // [cite: 111]
                document.getElementById("next-page-btn").disabled = (currentPage === totalPages); // [cite: 111]
            } else { // [cite: 112]
                stockListElement.innerHTML = `<p class="text-center text-gray-500 py-8">該当なし</p>`; // [cite: 112]
                paginationPanel.classList.add("hidden"); return; // [cite: 113]
            }

            pageItems.forEach(item => { // [cite: 113]
                if (editingId === item.id) { // [cite: 113]
                    const hasPhoto = item.image_url && item.image_url.trim() !== ""; // [cite: 113]
                    stockListElement.innerHTML += `
                        <div class="bg-blue-50 p-4 rounded-xl shadow-sm border border-blue-400 text-sm space-y-2">
                            <div class="font-bold text-blue-800 text-xs mb-1">✏️ 登録情報を編集中</div>
                            <input type="text" id="edit-drug-${item.id}" value="${item.drug_name}" class="w-full p-1.5 border rounded mb-2" placeholder="薬品名">
                            <input type="text" id="edit-shizai-${item.id}" value="${item.shizai_name}" class="w-full p-1.5 border rounded mb-2" placeholder="資材名">
                            <div class="grid grid-cols-2 gap-2">
                                <input type="number" id="edit-current-${item.id}" value="${item.current_stock}" class="w-full p-1.5 border rounded" placeholder="在庫">
                                <input type="number" id="edit-min-${item.id}" value="${item.min_stock}" class="w-full p-1.5 border rounded" placeholder="最低在庫">
                            </div>
                            <textarea id="edit-contents-${item.id}" rows="3" class="w-full p-1.5 border rounded text-xs resize-none" placeholder="備考">${item.contents || ''}</textarea>
                            <div class="bg-white p-2 rounded border border-gray-200">
                                <input type="file" id="edit-image-file-${item.id}" accept="image/*" capture="environment" onchange="uploadImageHandler('edit', ${item.id})" class="hidden">
                                <button onclick="document.getElementById('edit-image-file-${item.id}').click()" class="bg-gray-100 p-1 rounded text-xxs border">📷 写真変更</button>
                                <button id="btn-delete-image-${item.id}" onclick="deleteImageOnly(${item.id})" class="bg-red-50 text-red-600 p-1 rounded text-xxs border border-red-200 ${hasPhoto ? '' : 'hidden'}">🗑️ 写真削除</button>
                                <span id="edit-upload-status-${item.id}" class="text-xxs text-gray-400">${hasPhoto ? '画像あり' : 'なし'}</span>
                                <input type="hidden" id="edit-image-url-${item.id}" value="${item.image_url || ''}">
                            </div>
                            <div class="grid grid-cols-2 gap-2 pt-2">
                                <button onclick="cancelEdit()" class="bg-gray-300 py-1.5 rounded-lg font-bold">キャンセル</button>
                                <button onclick="saveEdit(${item.id})" class="bg-blue-600 text-white py-1.5 rounded-lg font-bold">保存</button>
                            </div>
                        </div>`; // [cite: 121]
                    return; // [cite: 122]
                }

                const isShortage = item.current_stock < item.min_stock; // [cite: 122]
                let statusBadge = `<span class="bg-green-100 text-green-800 text-xs font-bold px-2 py-0.5 rounded text-center">在庫あり</span>`; // [cite: 123]
                let cardBorder = "border-gray-200 bg-white"; // [cite: 123]
                if (item.is_ordering) { // [cite: 124]
                    statusBadge = `<span class="bg-yellow-100 text-yellow-800 text-xs font-bold px-2 py-0.5 rounded text-center">取り寄せ中</span>`; // [cite: 124]
                    cardBorder = "border-yellow-300 bg-yellow-50"; // [cite: 125]
                } else if (isShortage) { // [cite: 125]
                    statusBadge = `<span class="bg-red-100 text-red-800 text-xs font-bold px-2 py-0.5 rounded text-center">要発注</span>`; // [cite: 125]
                    cardBorder = "border-red-200 bg-red-50"; // [cite: 126]
                }

                const thumbnailHtml = item.image_url ? `<img src="${item.image_url}" onclick="openImagePopup(event, '${item.shizai_name}', '${item.drug_name}', '${item.image_url}')" class="w-10 h-10 object-cover rounded border flex-shrink-0 bg-white">` : `<div class="w-10 h-10 rounded border flex-shrink-0 bg-gray-100 flex items-center justify-center text-gray-400 text-lg">📷</div>`; // [cite: 127]
                const infoButtonHtml = item.contents ? `<span onclick="openInfoPopup(event, '${item.shizai_name}', '${item.drug_name}', \`${item.contents.replace(/`/g, '\\`')}\`)" class="ml-1.5 inline-flex items-center justify-center bg-blue-100 text-blue-600 text-xs font-bold rounded-full w-4 h-4 shadow-sm border border-blue-200 flex-shrink-0 mt-0.5 animate-pulse">ℹ️</span>` : ""; // [cite: 128]
                
                stockListElement.innerHTML += `
                    <div onclick="toggleDetails(${item.id})" class="p-3 rounded-xl shadow-sm border ${cardBorder} transition cursor-pointer select-none">
                        <div class="flex justify-between items-stretch text-sm">
                            <div class="flex-1 pr-3 min-w-0 flex items-center space-x-2.5">
                                ${thumbnailHtml}
                                <div class="min-w-0 flex-1">
                                    <span class="text-xxs text-gray-400 block truncate font-medium mb-0.5">${item.drug_name}</span>
                                    <div class="flex items-start max-w-full">
                                        <h3 class="font-bold text-gray-800 text-sm break-words leading-tight">${item.shizai_name || ''}</h3>
                                        ${infoButtonHtml}
                                    </div>
                                </div>
                            </div>
                            <div class="flex flex-col justify-between items-end flex-shrink-0 min-w-[70px]">
                                ${statusBadge}
                                <div class="flex items-center space-x-1.5 mt-auto pt-1">

                            <div class="grid grid-cols-2 gap-2 text-xs text-gray-600 bg-gray-50 p-2 rounded">

                            <div class="flex justify-between items-center text-xs text-gray-400 pt-1.5 border-t border-dashed border-gray-100">
                                <span>⏱️ 更新: ${item.updated_at ? new Date(item.updated_at).toLocaleDateString('ja-JP', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'}) : '---'}</span>
                                <div class="flex space-x-3"><button onclick="enterEditMode(${item.id})" class="hover:text-blue-600">✏️ 編集</button><button onclick="deleteShizai(${item.id})" class="hover:text-red-500">🗑️ 削除</button></div>

        }

        // 払い出しアクション (履歴追加対象)
        async function updateStock(id, newStock) { // [cite: 144]
            if (newStock < 0) return; // [cite: 144]
            const target = currentStocksData.find(item => item.id === id);
            if (!target) return;

            // 1. 在庫の更新 [cite: 145]
            const { error: stockError } = await db.from('shizai_stocks').update({ current_stock: newStock }).eq('id', id); // [cite: 145]
            if (stockError) { alert(stockError.message); return; } // [cite: 145]

            // 2. 履歴（ログ）の挿入
            await db.from('shizai_logs').insert([{
                shizai_id: id,
                shizai_name: target.shizai_name,
                drug_name: target.drug_name,
                type: 'dispense',
                quantity: -1
            }]);

            fetchStocks(); // [cite: 145]
        }

        async function toggleOrderStatus(id, status) { // [cite: 146]
            const { error } = await db.from('shizai_stocks').update({ is_ordering: !status }).eq('id', id); // [cite: 146]
            if (error) alert(error.message); else fetchStocks(); // [cite: 147]
        }

        // 入荷完了アクション (履歴追加対象)
        async function executeArrival(id, current) { // [cite: 147]
            const count = parseInt(document.getElementById(`arrival-count-${id}`).value) || 0; // [cite: 147]
            const target = currentStocksData.find(item => item.id === id);
            if (!target || count <= 0) return;

            // 1. 在庫の更新 [cite: 148]
            const { error: stockError } = await db.from('shizai_stocks').update({ current_stock: current + count, is_ordering: false }).eq('id', id); // [cite: 148]
            if (stockError) { alert(stockError.message); return; } // [cite: 148]

            // 2. 履歴（ログ）の挿入
            await db.from('shizai_logs').insert([{
                shizai_id: id,
                shizai_name: target.shizai_name,
                drug_name: target.drug_name,
                type: 'arrival',
                quantity: count
            }]);

            fetchStocks(); // [cite: 149]
        }

        async function deleteShizai(id) { // [cite: 149]
            if (!confirm("完全に削除しますか？")) return; // [cite: 149]
            const target = currentStocksData.find(i => i.id === id); // [cite: 150]
            if (target && target.image_url) { // [cite: 150]
                const path = extractStoragePath(target.image_url); // [cite: 150]
                if (path) await db.storage.from('shizai-images').remove([path]); // [cite: 151]
            }
            await db.from('shizai_stocks').delete().eq('id', id); // [cite: 151]
            fetchStocks(); // [cite: 151]
        }

        function enterEditMode(id) { editingId = id; renderStockList(); } // [cite: 152]
        function cancelEdit() { editingId = null; renderStockList(); } // [cite: 153]

        // 編集画面からの保存 (※ご要望に基づき、棚卸調整となるためログには含めません)
        async function saveEdit(id) { // [cite: 154]
            const drug = document.getElementById(`edit-drug-${id}`).value; // [cite: 154]
            const shizai = document.getElementById(`edit-shizai-${id}`).value; // [cite: 155]
            const current = parseInt(document.getElementById(`edit-current-${id}`).value); // [cite: 155]
            const min = parseInt(document.getElementById(`edit-min-${id}`).value); // [cite: 155]
            const contents = document.getElementById(`edit-contents-${id}`).value; // [cite: 155]
            const url = document.getElementById(`edit-image-url-${id}`).value; // [cite: 155]
            if (!drug || !shizai) return; // [cite: 156]
            
            await db.from('shizai_stocks').update({ drug_name: drug, shizai_name: shizai, current_stock: current, min_stock: min, contents: contents, image_url: url }).eq('id', id); // [cite: 156]
            editingId = null; fetchStocks(); // [cite: 157]
        }

        // ================= 履歴管理のロジック =================
        async function fetchLogs() {
            const listEl = document.getElementById("logs-list");
            try {
                const { data: logs, error } = await db.from('shizai_logs').select('*').order('created_at', { ascending: false }).limit(100);
                if (error) throw error;
                currentLogsData = logs || [];
                renderLogsList();
            } catch (e) {
                listEl.innerHTML = `<p class="text-center text-red-500 py-8">履歴の読み込みに失敗しました: ${e.message}</p>`;
            }
        }

        function renderLogsList() {
            const listEl = document.getElementById("logs-list");
            listEl.innerHTML = "";
            if (currentLogsData.length === 0) {
                listEl.innerHTML = `<p class="text-center text-gray-500 py-8">入出庫履歴はまだありません。</p>`;
                return;
            }

            currentLogsData.forEach(log => {
                const isDispense = log.type === 'dispense';
                const typeBadge = isDispense 
                    ? `<span class="bg-gray-800 text-white text-xxs font-bold px-1.5 py-0.5 rounded">払い出し</span>`
                    : `<span class="bg-green-600 text-white text-xxs font-bold px-1.5 py-0.5 rounded">入荷完了</span>`;
                const qtyText = isDispense ? `${log.quantity} 個` : `+${log.quantity} 個`;
                const qtyColor = isDispense ? 'text-gray-800' : 'text-green-600';
                const logTime = new Date(log.created_at).toLocaleString('ja-JP', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});

                listEl.innerHTML += `
                    <div class="bg-white p-3 rounded-xl shadow-sm border border-gray-200 text-sm flex justify-between items-center">
                        <div class="min-w-0 flex-1 pr-2">
                            <div class="flex items-center space-x-1.5 mb-1">
                                ${typeBadge}
                                <span class="text-xxs text-gray-400 font-medium">${logTime}</span>
                            </div>
                            <span class="text-xxs text-gray-400 block truncate">${log.drug_name}</span>
                            <h4 class="font-bold text-gray-800 text-xs truncate">${log.shizai_name}</h4>
                        </div>
                        <div class="text-right flex-shrink-0 flex items-center space-x-3">
                            <span class="font-bold text-sm ${qtyColor} tracking-tight">${qtyText}</span>
                            <button onclick="cancelLog(${log.id}, ${log.shizai_id}, ${log.quantity})" class="text-xxs bg-red-50 text-red-500 border border-red-100 hover:bg-red-100 px-1.5 py-1 rounded font-bold transition">取消</button>
                        </div>
                    </div>`;
            });
        }

        // 履歴の取消（在庫を逆算して元に戻し、ログを削除）
        async function cancelLog(logId, shizaiId, logQty) {
            if (!confirm("この入出庫操作を取り消しますか？\n（対象資材の在庫数も自動的に逆計算されて元に戻ります）")) return;

            try {
                // 1. 現在のマスター在庫を取得
                const { data: currentStockObj, error: fetchError } = await db.from('shizai_stocks').select('current_stock').eq('id', shizaiId).single();
                
                if (fetchError && fetchError.code !== 'PGRST116') { // 資材自体が既に削除されているケース以外
                    throw fetchError;
                }

                // 資材がまだ存在していれば、在庫を逆算してアップデート
                if (currentStockObj) {
                    // ログが払い出し(-1)なら、取り消すと在庫は +1。入荷(+5)なら在庫は -5。
                    const rolledBackStock = currentStockObj.current_stock - logQty;
                    if (rolledBackStock < 0) {
                        if (!confirm("この履歴を取り消すと在庫数がマイナスになってしまいますが、よろれしいですか？")) return;
                    }
                    await db.from('shizai_stocks').update({ current_stock: Math.max(0, rolledBackStock) }).eq('id', shizaiId);
                }

                // 2. ログレコードを削除
                await db.from('shizai_logs').delete().eq('id', logId);
                
                alert("操作を取り消しました。");
                fetchLogs();
                fetchStocks(); // 一覧側のデータも最新にする
            } catch (e) {
                alert("取消処理に失敗しました: " + e.message);
            }
        }

        // ================= 消費グラフのロジック =================
        async function changeChartPeriod(days) {
            chartPeriodDays = days;
            const periods = [7, 30, 90];
            periods.forEach(d => {
                const btn = document.getElementById(`btn-period-${d}`);
                if (d === days) {
                    btn.className = "py-2 rounded-lg bg-blue-600 text-white shadow-sm";
                } else {
                    btn.className = "py-2 rounded-lg bg-gray-100 text-gray-600 border";
                }
            });
            fetchChartData();
        }

        async function fetchChartData() {
            const canvas = document.getElementById("consumptionChart");
            const emptyMsg = document.getElementById("chart-empty-message");
            
            try {
                // 指定期間の閾値を計算
                const sinceDate = new Date();
                sinceDate.setDate(sinceDate.getDate() - chartPeriodDays);
                const sinceIso = sinceDate.toISOString();

                // 払い出し('dispense')データのみを期間指定で取得
                const { data: logs, error } = await db.from('shizai_logs')
                    .select('shizai_name, drug_name, quantity')
                    .eq('type', 'dispense')
                    .gte('created_at', sinceIso);

                if (error) throw error;

                // データを「薬品名 + 資材名」単位で集計
                const summaryMap = {};
                (logs || []).forEach(log => {
                    const label = `${log.drug_name}\n(${log.shizai_name})`;
                    // quantity は -1 なので、絶対値で消費数を加算
                    const count = Math.abs(log.quantity);
                    summaryMap[label] = (summaryMap[label] || 0) + count;
                });

                // 配列に変換して消費数が多い順にソート
                const sortedData = Object.keys(summaryMap).map(key => ({
                    label: key,
                    value: summaryMap[key]
                })).sort((a, b) => b.value - a.value);

                if (sortedData.length === 0) {
                    if (myChart) myChart.destroy();
                    canvas.classList.add("hidden");
                    emptyMsg.classList.remove("hidden");
                    return;
                }

                canvas.classList.remove("hidden");
                emptyMsg.classList.add("hidden");

                // 上位最大10件をグラフに表示
                const topItems = sortedData.slice(0, 10);
                const chartLabels = topItems.map(i => i.label);
                const chartValues = topItems.map(i => i.value);

                // グラフの描画・更新
                if (myChart) myChart.destroy();
                
                const ctx = canvas.getContext('2d');
                myChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: chartLabels,
                        datasets: [{
                            label: '払い出し数（個）',
                            data: chartValues,
                            backgroundColor: 'rgba(37, 99, 235, 0.2)',
                            borderColor: 'rgba(37, 99, 235, 1)',
                            borderWidth: 1.5,
                            borderRadius: 6
                        }]
                    },
                    options: {
                        indexAxis: 'y', // 横棒グラフ
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false }
                        },
                        scales: {
                            x: {
                                beginAtZero: true,
                                ticks: { stepSize: 1, precision: 0 }
                            },
                            y: {
                                ticks: {
                                    font: { size: 10, weight: 'bold' },
                                    color: '#374151'
                                }
                            }
                        }
                    }
                });

            } catch (e) {
                console.error("グラフデータ取得エラー:", e);
            }
        }

        // ================= ポップアップ等既存の共通処理 =================
        function openInfoPopup(event, shizai, drug, contents) { // [cite: 157]
            event.stopPropagation(); // [cite: 157]
            document.getElementById("popup-title").innerText = "⚠️ 備考・内訳"; // [cite: 158]
            document.getElementById("popup-shizai-name").innerText = shizai; // [cite: 158]
            document.getElementById("popup-drug-name").innerText = drug; // [cite: 158]
            const c = document.getElementById("popup-contents"); // [cite: 158]
            c.innerText = contents; c.classList.remove("hidden"); // [cite: 158]
            document.getElementById("popup-image-container").classList.add("hidden"); // [cite: 158]
            document.getElementById("info-popup").classList.remove("hidden"); // [cite: 158]
        } // [cite: 159]

        function openImagePopup(event, shizai, drug, url) { // [cite: 159]
            event.stopPropagation(); // [cite: 159]
            document.getElementById("popup-title").innerText = "📷 写真拡大"; // [cite: 160]
            document.getElementById("popup-shizai-name").innerText = shizai; // [cite: 160]
            document.getElementById("popup-drug-name").innerText = drug; // [cite: 160]
            document.getElementById("popup-contents").classList.add("hidden"); // [cite: 160]
            const i = document.getElementById("popup-image"); // [cite: 160]
            i.src = url; document.getElementById("popup-image-container").classList.remove("hidden"); // [cite: 161]
            document.getElementById("info-popup").classList.remove("hidden"); // [cite: 161]
        } // [cite: 162]

        function closeInfoPopup() { document.getElementById("info-popup").classList.add("hidden"); } // [cite: 161]
    </script>
    
    <div id="info-popup" class="fixed inset-0 bg-black bg-opacity-60 z-50 flex items-center justify-center p-4 hidden" onclick="closeInfoPopup()">
        <div class="bg-white rounded-2xl max-w-sm w-full p-5 shadow-2xl space-y-2.5" onclick="event.stopPropagation();">
            <div class="flex justify-between items-center border-b pb-1.5">
                <span id="popup-title" class="text-xs font-bold text-gray-400 bg-gray-100 px-2 py-0.5 rounded"></span>
                <button onclick="closeInfoPopup()" class="text-gray-400 font-bold px-1">✕</button>
            </div>
            <div class="pt-1">
                <h4 id="popup-shizai-name" class="font-bold text-gray-800 text-base leading-tight"></h4>
                <p id="popup-drug-name" class="text-xxs text-gray-400 font-medium mt-0.5"></p>
            </div>
            <div id="popup-image-container" class="mt-2 text-center hidden">
                <img id="popup-image" src="" class="w-full h-auto max-h-64 object-contain rounded-xl border bg-gray-50">
            </div>
            <div id="popup-contents" class="bg-orange-50 border border-orange-100 rounded-xl p-3 text-sm text-gray-700 whitespace-pre-wrap hidden"></div>
            <button onclick="closeInfoPopup()" class="w-full bg-gray-800 hover:bg-gray-900 text-white font-bold py-2.5 rounded-xl text-sm shadow-sm transition mt-2">閉じる</button>
        </div>
    </div>
</body>
