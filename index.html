<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>抗リウマチ薬 資材在庫管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800 font-sans pb-12">

    <header class="bg-blue-600 text-white p-4 sticky top-0 z-50 shadow-md">
        <div class="container mx-auto flex justify-between items-center max-w-md">
            <h1 class="text-xl font-bold">リウマチ資材管理</h1>
            <div class="flex space-x-2">
                <button onclick="toggleAddForm()" class="bg-blue-500 hover:bg-blue-400 px-3 py-1 rounded text-sm font-bold transition">
                    ➕ 資材追加
                </button>
                <button onclick="fetchStocks()" class="bg-blue-700 hover:bg-blue-800 px-3 py-1 rounded text-sm transition">
                    🔄 更新
                </button>
            </div>
        </div>
    </header>

    <main class="container mx-auto p-4 max-w-md">
        
        <div id="error-message" class="mb-4 bg-orange-100 border-l-4 border-orange-500 text-orange-700 p-3 rounded text-sm hidden">
            <strong>⚠️ 接続エラー:</strong> <p id="error-text" class="mt-1"></p>
        </div>

        <div id="add-form-section" class="mb-6 bg-white p-4 rounded-xl shadow-md border border-blue-200 hidden">
            <h2 class="text-blue-700 font-bold text-base mb-3 flex justify-between items-center">
                <span>新しく資材を登録する</span>
                <button onclick="toggleAddForm()" class="text-gray-400 text-sm font-normal">閉じる</button>
            </h2>
            <div class="space-y-3 text-sm">
                <div>
                    <label class="block text-gray-600 font-medium mb-1">対象薬品名</label>
                    <input type="text" id="input-drug" placeholder="例：〇〇皮下注" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none">
                </div>
                <div>
                    <label class="block text-gray-600 font-medium mb-1">資材名称</label>
                    <input type="text" id="input-shizai" placeholder="例：患者用説明資材、保冷バッグ" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none">
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-gray-600 font-medium mb-1">初期在庫数</label>
                        <input type="number" id="input-current" value="0" min="0" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none">
                    </div>
                    <div>
                        <label class="block text-gray-600 font-medium mb-1">最低在庫数</label>
                        <input type="number" id="input-min" value="2" min="0" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none">
                    </div>
                </div>
                <button onclick="addNewShizai()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-lg transition mt-2">
                    データベースに登録
                </button>
            </div>
        </div>

        <div id="alert-section" class="mb-4 hidden">
            <h2 class="text-red-600 font-bold text-sm mb-2">⚠️ 発注が必要な資材</h2>
            <div id="alert-list" class="space-y-2"></div>
        </div>

        <hr class="border-gray-300 my-4">

        <h2 class="font-bold text-lg mb-3 text-gray-700">資材一覧</h2>
        <div id="stock-list" class="space-y-3">
            <p class="text-center text-gray-500 py-8">データを読み込み中...</p>
        </div>
    </main>

    <script>
        // ==========================================
        // 🛠️ Supabaseの設定（ご自身のものに書き換えてください）
        // ==========================================
        const SUPABASE_URL = "https://kkxpqxaxthrcxdvrmbty.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtreHBxeGF4dGhyY3hkdnJtYnR5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3NzMzODgsImV4cCI6MjA5NjM0OTM4OH0.Ptcn2lYMqbn4L5g1sV7r6E372cxfIyhsxgAkH7a65aU";
        
        let db;
        try { db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY); } catch (e) { console.error(e); }

        document.addEventListener("DOMContentLoaded", fetchStocks);

        // 資材登録フォームの開閉
        function toggleAddForm() {
            const form = document.getElementById("add-form-section");
            form.classList.toggle("hidden");
        }

        // 提案1：新しい資材をSupabaseに挿入する関数
        async function addNewShizai() {
            const drug = document.getElementById("input-drug").value.trim();
            const shizai = document.getElementById("input-shizai").value.trim();
            const current = parseInt(document.getElementById("input-current").value) || 0;
            const min = parseInt(document.getElementById("input-min").value) || 0;

            if (!drug || !shizai) {
                alert("薬品名と資材名称は必ず入力してください。");
                return;
            }

            const { error } = await db
                .from('shizai_stocks')
                .insert([{ drug_name: drug, shizai_name: shizai, current_stock: current, min_stock: min, is_ordering: false }]);

            if (error) {
                alert("登録エラー: " + error.message);
            } else {
                alert("新しく資材を登録しました！");
                // 入力欄をリセット
                document.getElementById("input-drug").value = "";
                document.getElementById("input-shizai").value = "";
                document.getElementById("input-current").value = "0";
                toggleAddForm();
                fetchStocks(); // 一覧を再読み込み
            }
        }

        // データ取得・一覧描画関数
        async function fetchStocks() {
            const stockListElement = document.getElementById("stock-list");
            const alertSection = document.getElementById("alert-section");
            const alertListElement = document.getElementById("alert-list");
            const errorArea = document.getElementById("error-message");
            const errorText = document.getElementById("error-text");

            errorArea.classList.add("hidden");

            try {
                const { data: stocks, error } = await db
                    .from('shizai_stocks')
                    .select('*')
                    .order('id', { ascending: true });

                if (error) {
                    stockListElement.innerHTML = "";
                    errorText.innerText = error.message;
                    errorArea.classList.remove("hidden");
                    return;
                }

                if (!stocks || stocks.length === 0) {
                    stockListElement.innerHTML = `<p class="text-center text-gray-500 py-8">資材が登録されていません。右上の「➕資材追加」から登録してください。</p>`;
                    return;
                }

                stockListElement.innerHTML = "";
                alertListElement.innerHTML = "";
                let hasAlert = false;

                stocks.forEach(item => {
                    const isShortage = item.current_stock <= item.min_stock;
                    const isNeedOrder = isShortage && !item.is_ordering;

                    let statusBadge = `<span class="bg-green-100 text-green-800 text-xs font-bold px-2.5 py-0.5 rounded">在庫あり</span>`;
                    let cardBorder = "border-gray-200";

                    if (item.is_ordering) {
                        statusBadge = `<span class="bg-yellow-100 text-yellow-800 text-xs font-bold px-2.5 py-0.5 rounded">🟡 取り寄せ中</span>`;
                        cardBorder = "border-yellow-300 bg-yellow-50/30";
                    } else if (isShortage) {
                        statusBadge = `<span class="bg-red-100 text-red-800 text-xs font-bold px-2.5 py-0.5 rounded">🔴 要発注</span>`;
                        cardBorder = "border-red-300 bg-red-50/50";
                    }

                    if (isNeedOrder) {
                        hasAlert = true;
                        alertListElement.innerHTML += `
                            <div class="bg-red-100 border-l-4 border-red-500 text-red-700 p-2 text-sm rounded shadow-sm">
                                <strong>${item.drug_name}</strong>: ${item.shizai_name} (残り ${item.current_stock}個 / 最低 ${item.min_stock}個)
                            </div>
                        `;
                    }

                    const cardHtml = `
                        <div class="bg-white p-4 rounded-xl shadow-sm border ${cardBorder} transition-all">
                            <div class="flex justify-between items-start mb-2">
                                <div>
                                    <span class="text-xs text-gray-500 block">${item.drug_name}</span>
                                    <h3 class="font-bold text-gray-800 text-base">${item.shizai_name}</h3>
                                </div>
                                ${statusBadge}
                            </div>
                            
                            <div class="grid grid-cols-2 gap-2 text-sm text-gray-600 mb-3 bg-gray-50 p-2 rounded">
                                <div>現在在庫: <span class="font-bold text-lg text-gray-900">${item.current_stock}</span> 個</div>
                                <div>最低在庫: <span class="font-medium">${item.min_stock}</span> 個</div>
                            </div>

                            <div class="space-y-2">
                                <div class="grid grid-cols-2 gap-2">
                                    <button onclick="updateStock(${item.id}, ${item.current_stock - 1})" 
                                        class="bg-gray-800 hover:bg-gray-900 text-white text-xs font-bold py-2 px-3 rounded-lg active:scale-95 transition"
                                        ${item.current_stock <= 0 ? 'disabled class="opacity-50"' : ''}>
                                        払出 (-1)
                                    </button>
                                    
                                    ${item.is_ordering ? `
                                        <button onclick="toggleOrderStatus(${item.id}, true)" 
                                            class="bg-gray-400 text-white text-xs font-bold py-2 px-3 rounded-lg transition">
                                            取り寄せを取消
                                        </button>
                                    ` : `
                                        <button onclick="toggleOrderStatus(${item.id}, false)" 
                                            class="bg-yellow-500 hover:bg-yellow-600 text-white text-xs font-bold py-2 px-3 rounded-lg active:scale-95 transition">
                                            取り寄せ中に変更
                                        </button>
                                    `}
                                </div>

                                ${item.is_ordering ? `
                                    <div class="flex items-center space-x-2 pt-1 border-t border-dashed border-gray-200">
                                        <input type="number" id="arrival-count-${item.id}" value="5" min="1" 
                                            class="w-16 p-1 text-center text-sm border rounded focus:ring-2 focus:ring-green-400 outline-none font-bold">
                                        <span class="text-xs text-gray-500">個が</span>
                                        <button onclick="executeArrival(${item.id}, ${item.current_stock})" 
                                            class="flex-1 bg-green-600 hover:bg-green-700 text-white text-xs font-bold py-1.5 px-2 rounded-lg transition shadow-sm">
                                            入荷完了
                                        </button>
                                    </div>
                                ` : ''}
                            </div>
                        </div>
                    `;
                    stockListElement.innerHTML += cardHtml;
                });

                if (hasAlert) { alertSection.classList.remove("hidden"); } else { alertSection.classList.add("hidden"); }

            } catch (e) {
                stockListElement.innerHTML = "";
                errorText.innerText = "通信エラー: " + e.message;
                errorArea.classList.remove("hidden");
            }
        }

        // 払出ボタン用の在庫数更新
        async function updateStock(id, newStock) {
            if (newStock < 0) return;
            const { error } = await db
                .from('shizai_stocks')
                .update({ current_stock: newStock })
                .eq('id', id);

            if (error) alert("更新エラー: " + error.message);
            else fetchStocks();
        }

        // 取り寄せ中ステータスの切り替え（純粋にフラグだけを反転）
        async function toggleOrderStatus(id, currentOrderingStatus) {
            const { error } = await db
                .from('shizai_stocks')
                .update({ is_ordering: !currentOrderingStatus })
                .eq('id', id);

            if (error) alert("更新エラー: " + error.message);
            else fetchStocks();
        }

        // 提案2：自由な入力値に基づいて入荷処理を実行する関数
        async function executeArrival(id, currentStock) {
            const inputElement = document.getElementById(`arrival-count-${id}`);
            const arrivalCount = parseInt(inputElement.value) || 0;

            if (arrivalCount <= 0) {
                alert("1以上の数字を入力してください。");
                return;
            }

            const newStock = currentStock + arrivalCount;

            // 在庫数を増やし、同時に取り寄せ中フラグ(is_ordering)を解除する
            const { error } = await db
                .from('shizai_stocks')
                .update({ current_stock: newStock, is_ordering: false })
                .eq('id', id);

            if (error) alert("入荷処理エラー: " + error.message);
            else fetchStocks();
        }
    </script>
</body>
</html>
