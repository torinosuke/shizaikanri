            <div class="space-y-3 text-sm">

                    <div id="add-field-phone" class="grid grid-cols-2 gap-2">

        <div id="stocks-list-section" class="space-y-3">

                <button id="next-page-btn" onclick="changePage(1)" class="bg-gray-100 hover:bg-gray-200 active:bg-gray-300 text-gray-700 font-bold py-1.5 px-3 rounded-lg transition disabled:opacity-40 page-btn">

        </div> <div id="history-section" class="max-w-md mx-auto mt-2 hidden">

                <h2 class="text-sm font-bold text-gray-700 mb-3">期間指定・集計</h2>
                
                <div class="grid grid-cols-2 gap-2 mb-4">

                        <label class="block text-[10px] text-gray-500 mb-1">開始日</label>
                        <input type="date" id="history-start-date" class="w-full bg-gray-50 border border-gray-200 text-xs rounded-xl p-2 focus:outline-none focus:ring-1 focus:ring-blue-500">

                </button>
        
                <div class="bg-white p-4 rounded-2xl border border-gray-200 shadow-sm mb-4">

            <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-200">
                <h2 class="text-sm font-bold text-gray-700 mb-3">履歴一覧（新着順）</h2>
                <div id="logs-timeline" class="space-y-2 max-h-[400px] overflow-y-auto">
                    </div>
            </div>

    <script>
        const SUPABASE_URL = "https://kkxpqxaxthrcxdvrmbty.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtreHBxeGF4dGhyY3hkdnJtYnR5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3NzMzODgsImV4cCI6MjA5NjM0OTM4OH0.Ptcn2lYMqbn4L5g1sV7r6E372cxfIyhsxgAkH7a65aU";
        
        let db;
        try { db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY); } catch (e) { console.error(e); }

        let currentStocksData = [];
        let allTimeHistoryLogs = []; // 🌟 追加：過去全件の履歴ログを保持する配列
        let editingId = null;
        let selectedDrugFilter = "ALL";
        let openedCardId = null;

        let searchQuery = "";
        let currentPage = 1;
        let cachedHistoryLogs = [];       // 🌟 追加：取得した履歴データを保持する変数
        let currentHistoryPage = 1;       // 🌟 追加：履歴・集計画面用
        let currentRankingPage = 1;       // 🌟 追加：払い出しランキング用の現在ページ
        let cachedSortedPayouts = [];     // 🌟 追加：集計済みの払い出しランキングデータを保持する配列
        const ITEMS_PER_PAGE = 10;

        let editInitialState = null;

        // 払い出し・入庫の履歴を shizai_logs に書き込む共通関数
        async function insertShizaiLog(item, type, quantity) {
            const { error } = await db
                .from('shizai_logs')
                .insert([{
                    shizai_id: item.id,
                    drug_name: item.drug_name,
                    shizai_name: item.shizai_name,
                    type: type,         // '払い出し' または '入庫'
                    quantity: quantity   // 数量
                }]);
        
            if (error) {
                console.error("履歴の保存に失敗しました:", error.message);
            }
        }
        
        // ページ読み込み時に初期データを取得し、同時にリアルタイム監視を開始
        document.addEventListener("DOMContentLoaded", () => {
            fetchStocks(); // 初期読み込み
            
            // 🔄 同時編集コンフリクト防止：リアルタイム同期リスナーの登録
            db.channel('public:shizai_stocks')
                .on(
                    'postgres_changes', 
                    { 
                        event: '*', // INSERT, UPDATE, DELETE すべての変更を監視
                        schema: 'public', 
                        table: 'shizai_stocks' 
                    }, 
                    (payload) => {
                        console.log('データベースに変更を検知しました:', payload);
                        fetchStocks(); // 誰かが更新したら画面を自動で再描画
                    }
                )
                .subscribe();
        });
        
        function toggleAddForm() {
            const form = document.getElementById("add-form-section");
            form.classList.toggle("hidden");
        }

        function handleSearchInput() {
            const input = document.getElementById("search-input");
            searchQuery = input.value.trim();
            
            const clearBtn = document.getElementById("search-clear-btn");
            if (searchQuery.length > 0) {
                clearBtn.classList.remove("hidden");
            } else {
                clearBtn.classList.add("hidden");
            }
            
            currentPage = 1;
            renderStockList();
        }

        function clearSearchInput() {
            document.getElementById("search-input").value = "";
            searchQuery = "";
            document.getElementById("search-clear-btn").classList.add("hidden");
            currentPage = 1;
            renderStockList();
        }

        function changePage(direction) {
            currentPage += direction;
            openedCardId = null;
            renderStockList();
            document.getElementById("list-title").scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // 💡 変更：アラートに「薬剤名：資材名」をセットで表示するように改良
        function resetToAllDrugs() {
            const addForm = document.getElementById("add-form-section");
            
            // パターンA: 【新規登録フォーム】が開いている場合
            if (addForm && !addForm.classList.contains("hidden")) {
                const drugInput = document.getElementById("input-drug-text")?.value || "";
                const nameInput = document.getElementById("input-shizai")?.value || "";
                const memoInput = document.getElementById("input-contents")?.value || "";
                
                // 何かしら入力されている場合のみアラートを出す
                if (drugInput.trim() !== "" || nameInput.trim() !== "" || memoInput.trim() !== "") {
                    let displayName = "新規資材";
                    // 薬品名か資材名が入力されていれば、セットの形式を作成
                    if (drugInput.trim() || nameInput.trim()) {
                        const d = drugInput.trim() || "（未入力）";
                        const s = nameInput.trim() || "（未入力）";
                        displayName = `「${d} ： ${s}」`;
                    }
                    
                    if (!confirm(`${displayName}の入力中の内容が破棄されます。新規登録を中止してよろしいですか？`)) {
                        return;
                    }
                }
                addForm.classList.add("hidden");
            }
            
            // パターンB: 【資材の編集窓】が開いている場合（実際のID群と比較）
            if (typeof editingId !== 'undefined' && editingId !== null && editInitialState) {
                const currentDrug = document.getElementById(`edit-drug-${editingId}`)?.value.trim() || "";
                const currentShizai = document.getElementById(`edit-shizai-${editingId}`)?.value.trim() || "";
                const currentCurrent = parseInt(document.getElementById(`edit-current-${editingId}`)?.value, 10) || 0;
                const currentMin = parseInt(document.getElementById(`edit-min-${editingId}`)?.value, 10) || 0;
                const currentContents = document.getElementById(`edit-contents-${editingId}`)?.value.trim() || "";
                const currentImageUrl = document.getElementById(`edit-image-url-${editingId}`)?.value.trim() || "";
                const currentOrderUrl = document.getElementById(`edit-order-url-${editingId}`)?.value.trim() || "";
                const currentPhoneName = document.getElementById(`edit-phone-name-${editingId}`)?.value.trim() || "";
                const currentPhoneNumber = document.getElementById(`edit-phone-number-${editingId}`)?.value.trim() || "";

                // 初期データと現在の入力値を比較
                const isChanged = 
                    currentDrug !== editInitialState.drug_name ||
                    currentShizai !== editInitialState.shizai_name ||
                    currentCurrent !== editInitialState.current_stock ||
                    currentMin !== editInitialState.min_stock ||
                    currentContents !== editInitialState.contents ||
                    currentImageUrl !== editInitialState.image_url ||
                    currentOrderUrl !== editInitialState.order_url ||
                    currentPhoneName !== editInitialState.phone_name ||
                    currentPhoneNumber !== editInitialState.phone_number;

                // 💡 変更があった場合のみ確認ダイアログ（アラート）を出す
                if (isChanged) {
                    // 記憶している初期状態から「薬剤名」と「資材名」をセットにして取得
                    const drugName = editInitialState.drug_name || "不明な薬剤";
                    const shizaiName = editInitialState.shizai_name || "この資材";
                    
                    if (!confirm(`「${drugName} ： ${shizaiName}」の編集中の内容が変更されています。破棄して中止してよろしいですか？`)) {
                        return; // キャンセルされたらトップに戻らない
                    }
                }

                // 編集状態をクリア
                editingId = null;
                editInitialState = null;
            }

            // 開いているアコーディオン詳細エリア（コントロールパネル）をすべて閉じる
            const panels = document.querySelectorAll('[id^="control-panel-"]');
            panels.forEach(panel => {
                panel.classList.add("hidden");
            });

            // すべてのカードの矢印（▼）を元の向きに戻す
            const arrows = document.querySelectorAll('[id^="arrow-"]');
            arrows.forEach(arrow => {
                arrow.innerText = "▼";
            });

            openedCardId = null;

            selectedDrugFilter = "ALL";
            if (typeof updateDrugFilterOptions === "function") {
                updateDrugFilterOptions(); // 💡 50音アコーディオンの選択状態をリセット
            }
            
            clearSearchInput();
            
            if (typeof renderStockList === "function") {
                renderStockList();
            }
        }
        
        function normalizeString(str) {
            if (!str) return "";
            return str.toLowerCase()
                .normalize("NFKC")
                .replace(/[\u30a1-\u30f6]/g, function(match) {
                    return String.fromCharCode(match.charCodeAt(0) - 0x60);
                });
        }

        function toggleDetails(id) {
            const panel = document.getElementById(`control-panel-${id}`);
            const arrow = document.getElementById(`arrow-${id}`);
            if (!panel) return;

            if (openedCardId === id) {
                panel.classList.add("hidden");
                if (arrow) arrow.innerText = "▼";
                openedCardId = null;
            } else {
                if (openedCardId !== null) {
                    const oldPanel = document.getElementById(`control-panel-${openedCardId}`);
                    const oldArrow = document.getElementById(`arrow-${openedCardId}`);
                    if (oldPanel) oldPanel.classList.add("hidden");
                    if (oldArrow) oldArrow.innerText = "▼";
                }
                panel.classList.remove("hidden");
                if (arrow) arrow.innerText = "▲";
                openedCardId = id;
            }
        }

        function toggleDrugInputMethod() {
            const selectElement = document.getElementById("input-drug-select");
            const textInputElement = document.getElementById("input-drug-text");
            if (selectElement.value === "__NEW__") {
                textInputElement.classList.remove("hidden");
                textInputElement.focus();
            } else {
                textInputElement.classList.add("hidden");
                textInputElement.value = "";
            }
        }

        function extractStoragePath(url) {
            if (!url || !url.includes('/storage/v1/object/public/shizai-images/')) return null;
            return url.split('/storage/v1/object/public/shizai-images/')[1];
        }

        // 🌟 【新規追加】画像をブラウザ側で軽量化（縮小・リサイズ・圧縮）する関数
        function compressImage(file, maxWidth = 800, quality = 0.75) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        // 縮小後のサイズ計算（アスペクト比維持）
                        let width = img.width;
                        let height = img.height;
                        if (width > maxWidth) {
                            height = Math.round((height * maxWidth) / width);
                            width = maxWidth;
                        }

                        // Canvasを使って再描画
                        const canvas = document.createElement('canvas');
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        // 指定した画質(quality)のJPEG形式のBlob（バイナリ）に変換
                        canvas.toBlob((blob) => {
                            if (blob) {
                                // Supabaseがファイルとして認識できるよう、Fileオブジェクトを再生成して返す
                                const compressedFile = new File([blob], file.name, {
                                    type: 'image/jpeg',
                                    lastModified: Date.now()
                                });
                                resolve(compressedFile);
                            } else {
                                reject(new Error("Canvas to Blob 変換に失敗しました"));
                            }
                        }, 'image/jpeg', quality);
                    };
                    img.onerror = (err) => reject(err);
                };
                reader.onerror = (err) => reject(err);
            });
        }

        async function uploadImageHandler(mode, id = null) {
            const fileInput = mode === 'add' ? document.getElementById('input-image-file') : document.getElementById(`edit-image-file-${id}`);
            const statusLabel = mode === 'add' ? document.getElementById('add-upload-status') : document.getElementById(`edit-upload-status-${id}`);
            const urlHiddenInput = mode === 'add' ? document.getElementById('input-image-url') : document.getElementById(`edit-image-url-${id}`);

            if (!fileInput || !fileInput.files || fileInput.files.length === 0) return;
            
            let file = fileInput.files[0];
            statusLabel.innerText = "⏳ 画像を圧縮・最適化中...";
            statusLabel.className = "text-xxs text-blue-600 font-bold animate-pulse";

            try {
                // 🌟 【変更点】アップロード前に compressImage 関数を呼び出して軽量化
                // 横幅最大800px、画質75%のコンパクトなJPEG形式に変換します。
                file = await compressImage(file, 800, 0.75);

                statusLabel.innerText = "⏳ アップロード中...";

                if (mode === 'edit' && id) {
                    const targetItem = currentStocksData.find(item => item.id === id);
                    if (targetItem && targetItem.image_url) {
                        const oldStoragePath = extractStoragePath(targetItem.image_url);
                        if (oldStoragePath) {
                            await db.storage.from('shizai-images').remove([oldStoragePath]);
                        }
                    }
                }

                // 拡張子を強制的に .jpg に合わせてファイル名を生成
                const fileName = `${Date.now()}_${Math.random().toString(36).substring(2, 7)}.jpg`;
                const filePath = `shizai_pics/${fileName}`;

                const { data, error } = await db.storage
                    .from('shizai-images')
                    .upload(filePath, file);

                if (error) throw error;

                const { data: urlData } = db.storage
                    .from('shizai-images')
                    .getPublicUrl(filePath);

                urlHiddenInput.value = urlData.publicUrl;
                statusLabel.innerText = "✅ 最適化・アップロード完了";
                statusLabel.className = "text-xs text-green-600 font-bold";

                const deleteBtn = document.getElementById(`btn-delete-image-${id}`);
                if (deleteBtn) deleteBtn.classList.remove("hidden");

            } catch (err) {
                console.error(err);
                statusLabel.innerText = "❌ エラーが発生しました";
                statusLabel.className = "text-xs text-red-500 font-bold";
                alert("画像の処理に失敗しました: " + err.message);
            }
        }

                } catch (e) {

                    loadCachedData(e.message);

        function renderStockList() {

            const paginationPanel = document.getElementById("pagination-panel");

            stockListElement.innerHTML = "";

            if (currentStocksData.length === 0) {
                stockListElement.innerHTML = `<p class="text-center text-gray-500 py-8">資材が登録されていません。</p>`;

                return;
            }

            if (selectedDrugFilter === "ALL") {
                listTitleElement.innerText = searchQuery ? `検索結果一覧` : "全資材一覧";
            } else {
                listTitleElement.innerText = `「${selectedDrugFilter}」の資材一覧`;
            }

            currentStocksData.forEach(item => {
                const isShortage = item.current_stock < item.min_stock;
                if (isShortage && !item.is_ordering) {
                    hasAlert = true;
                    alertListElement.innerHTML += `
                        <div class="bg-red-100 border-l-4 border-red-500 text-red-700 p-2 text-sm rounded shadow-sm">
                            <strong>${item.drug_name}</strong>: ${item.shizai_name} (残り ${item.current_stock}個 / 最低 ${item.min_stock}個)
                        </div>
                    `;
                }
            });

            let filteredItems = currentStocksData.filter(item => {
                // 💡 変更：入力途中の文字（部分一致）でもヒットするように修正
                if (selectedDrugFilter !== "ALL") {
                    const normalizedFilter = normalizeString(selectedDrugFilter);
                    const normalizedDrugName = normalizeString(item.drug_name);
                    if (!normalizedDrugName.includes(normalizedFilter)) {
                        return false;
                    }
                }
                if (searchQuery) {
                    const normalizedQuery = normalizeString(searchQuery);
                    const matchShizai = normalizeString(item.shizai_name).includes(normalizedQuery);
                    const matchDrug = normalizeString(item.drug_name).includes(normalizedQuery);
                    if (!matchShizai && !matchDrug) {
                        return false;
                    }
                }
                return true;
            });

            // 💡 ソート処理の適用部分を以下のように修正・拡張します
            const sortMethod = document.getElementById("sort-selector")?.value || "default";
            
            if (sortMethod === "shizai_asc") {
                filteredItems.sort((a, b) => a.shizai_name.localeCompare(b.shizai_name, 'ja'));
            } else if (sortMethod === "stock_asc") {
                filteredItems.sort((a, b) => a.current_stock - b.current_stock);
            } else if (sortMethod === "stock_desc") {
                filteredItems.sort((a, b) => b.current_stock - a.current_stock);
            } else if (sortMethod === "payout_count_desc") {
                // 🌟 新規追加：過去全件の「払い出し数」を集計してソート
                const payoutCounts = {};
                
                // グローバルに読み込んである過去全件ログをループ処理
                allTimeHistoryLogs.forEach(log => {
                    if (log.type === "払い出し") {
                        const shizaiId = log.shizai_id;
                        const qty = parseInt(log.quantity || 0, 10);
                        payoutCounts[shizaiId] = (payoutCounts[shizaiId] || 0) + qty;
                    }
                });
            
                filteredItems.sort((a, b) => {
                    const countA = payoutCounts[a.id] || 0;
                    const countB = payoutCounts[b.id] || 0;
                    
                    // 払い出し数が多い順（降順）
                    if (countB !== countA) {
                        return countB - countA;
                    }
                    // 払い出し数が同じ場合は名称50音順
                    return a.shizai_name.localeCompare(b.shizai_name, 'ja');

            } else {
                // デフォルト（ID順・更新順）
                filteredItems.sort((a, b) => a.id - b.id);

            const totalItems = filteredItems.length;
            const totalPages = Math.ceil(totalItems / ITEMS_PER_PAGE) || 1;
            
            if (currentPage > totalPages) currentPage = totalPages;
            if (currentPage < 1) currentPage = 1;

            const startIndex = (currentPage - 1) * ITEMS_PER_PAGE;

            if (totalItems > 0) {

        async function updateStock(id, newStock) {
            if (newStock < 0) return;
            const { error } = await db.from('shizai_stocks').update({ current_stock: newStock }).eq('id', id);
            if (error) alert("更新エラー: " + error.message);
            else fetchStocks();
        }

        async function toggleOrderStatus(id, currentOrderingStatus) {
            const { error } = await db.from('shizai_stocks').update({ is_ordering: !currentOrderingStatus }).eq('id', id);
            if (error) alert("更新エラー: " + error.message);
            else fetchStocks();
        }

        // 💡 変更：ボタンを押した時に直接モーダルを開き、個数を選択させる
        function executePayout(id, currentStock) {
            const modal = document.getElementById('payout-confirm-modal');
            const messageEl = document.getElementById('payout-modal-message');
            const confirmBtn = document.getElementById('payout-modal-confirm-btn');
            const selectEl = document.getElementById('payout-count-select');
            
            if (!modal || !selectEl) return;
            
            // モーダルを開いたときは、必ずデフォルトの「1」を選択状態にする
            selectEl.value = "1";
            
            // currentStocksData（または元のデータ配列）から対象の資材名を取得
            const item = currentStocksData ? currentStocksData.find(i => i.id === id) : null;
            const nameStr = item ? item.shizai_name : "この資材";
            
            // モーダルの案内文を設定
            messageEl.innerHTML = `<span class="font-bold text-gray-700">${nameStr}</span>を<br>払い出します。個数を選択してください。`;
            
            // ─── ★ここを修正（drugName と shizaiName を追加して引き継ぐ） ───
            currentPayoutInfo = { 
                id, 
                currentStock,
                drugName: item ? item.drug_name : '不明',
                shizaiName: item ? item.shizai_name : '不明'
            };
            // ──────────────────────────────────────────────────────
            
            // OKボタンに実際のDB更新処理を結びつける
            confirmBtn.onclick = confirmPayoutModal;
            
            // モーダルを表示
            modal.classList.remove('hidden');
        }
        
        // 払い出し一時保持用の変数
        let currentPayoutInfo = null;

        // 💡 変更：モーダルで「OK」が押されたときに、選択された数を元にSupabaseを更新する
        async function confirmPayoutModal() {
            if (!currentPayoutInfo) return;
            
            const { id, currentStock, drugName, shizaiName } = currentPayoutInfo;
            const selectEl = document.getElementById('payout-count-select');
            const payoutCount = parseInt(selectEl.value, 10) || 1;
            
            // 在庫数チェック
            if (payoutCount > currentStock) {
                alert(`在庫数（${currentStock}個）を超える払い出しはできません。`);
                cancelPayoutModal();
                return;
            }
            
            const newStock = currentStock - payoutCount;
            
            try {
                const { error } = await db
                    .from('shizai_stocks')
                    .update({ current_stock: newStock })
                    .eq('id', id);
                    
                if (error) throw error;
                
                // 正常に在庫が減らせたら、履歴に「払い出し」を記録する
                await insertShizaiLog({
                    id: id,
                    drug_name: drugName || '不明',
                    shizai_name: shizaiName || '不明'
                }, '払い出し', payoutCount);
                // ─────────────────────
                
                // トースト通知を表示（関数が存在する場合）
                if (typeof showToast === "function") {
                    showToast(`${payoutCount} 個 払い出しました`);
                }
            } catch (err) {
                console.error(err);
                alert("払い出し処理に失敗しました: " + err.message);
            } finally {
                cancelPayoutModal();
            }
        }

        // 💡 変更：ドラムロール（select要素）から値を取得するように修正

            if (arrivalCount <= 0) { 
                alert("1以上の数字を入力してください。"); 
                return; 
            }
            
            // 既存のエラーハンドリングをそのまま維持してSupabaseを更新
            const { error } = await db.from('shizai_stocks')
                .update({ 
                    current_stock: currentStock + arrivalCount, 
                    is_ordering: false 
                })
                .eq('id', id);
                
            if (error) {

        // 履歴の取得と特定期間のランキング集計
        async function fetchAndAnalyzeLogs() {
            const startDate = document.getElementById('history-start-date').value;
            const endDate = document.getElementById('history-end-date').value;
            
            if (!startDate || !endDate) return;
        
            // 終了日はその日の 23:59:59 まで含めるように調整
            const startISO = `${startDate}T00:00:00.000Z`;
            const endISO = `${endDate}T23:59:59.999Z`;
        
            // 1. Supabaseから期間内のログを全件取得（降順）
            const { data: logs, error } = await db
                .from('shizai_logs')
                .select('*')
                .gte('created_at', startISO)
                .lte('created_at', endISO)
                .order('created_at', { ascending: false });
        
            if (error) {
                console.error("履歴の取得に失敗しました:", error.message);
                return;
            }
        
            // 取得したデータをグローバル変数に保存し、ページをリセット
            cachedHistoryLogs = logs || [];
            currentHistoryPage = 1;
            currentRankingPage = 1; // 🌟 ランキングページもリセット
        
            // 履歴タイムラインを描画（10件区切り）
            renderHistoryTimeline();
        
            // 3. 払い出しランキング集計ロジック (入庫は破棄し、払い出しのみ集計)
            const payoutMap = {};
        
            cachedHistoryLogs.forEach(log => {
                const key = `${log.drug_name} - ${log.shizai_name}`;
                if (log.type === '払い出し') {
                    payoutMap[key] = (payoutMap[key] || 0) + log.quantity;
                }
            });
        
            // オブジェクトを配列に変換して数量順にソート（全件保持させて後で切り出す）
            cachedSortedPayouts = Object.entries(payoutMap).sort((a, b) => b[1] - a[1]);
        
            // 4. 🌟 新設したランキング描画関数を呼び出す
            renderPayoutRanking();
        }

        // 10件ずつのページネーション付きで履歴タイムラインを描画する関数（削除ボタン・高さ固定付き）
        function renderHistoryTimeline() {
            const timelineEl = document.getElementById('logs-timeline');
            if (!timelineEl) return;
        
            if (cachedHistoryLogs.length === 0) {
                timelineEl.innerHTML = `<p class="text-xs text-gray-400 text-center py-4">指定期間内に履歴はありません</p>`;
                return;
            }
        
            // 10件ごとのページ計算
            const itemsPerPageHistory = 10;
            const totalItems = cachedHistoryLogs.length;
            const totalPages = Math.ceil(totalItems / itemsPerPageHistory) || 1;
        
            if (currentHistoryPage > totalPages) currentHistoryPage = totalPages;
            if (currentHistoryPage < 1) currentHistoryPage = 1;
        
            const startIndex = (currentHistoryPage - 1) * itemsPerPageHistory;
            const endIndex = startIndex + itemsPerPageHistory;
            const pageLogs = cachedHistoryLogs.slice(startIndex, endIndex);
        
            // 1. 実データのHTML配列を生成
            let htmlArray = pageLogs.map(log => {
                const date = new Date(log.created_at).toLocaleString('ja-JP', {month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit'});
                const isPayout = log.type === '払い出し';
                const badgeColor = isPayout ? 'bg-red-50 text-red-600' : 'bg-green-50 text-green-600';
                return `
                    <div class="flex items-center justify-between py-1 px-2.5 border-b border-gray-50 text-xs leading-tight gap-1">
                        <div class="flex-1 min-w-0 pr-1">
                            <div class="text-[9px] text-gray-400 mb-0">${date} [${log.drug_name || 'なし'}]</div>
                            <div class="font-medium text-gray-700 truncate">${log.shizai_name}</div>
                        </div>
                        <div class="flex items-center gap-2 flex-shrink-0">
                            <span class="px-1.5 py-0.5 rounded-full text-[9px] font-bold ${badgeColor}">${log.type}</span>
                            <span class="font-bold text-gray-800 w-8 text-right">${log.quantity}個</span>
                            <button onclick="deleteHistoryLog(${log.id}, '${log.shizai_name}', '${log.type}', ${log.quantity})" class="w-6 h-6 flex items-center justify-center text-gray-400 hover:text-red-500 active:scale-90 transition-transform p-0 bg-transparent border-0 outline-none text-[11px]" title="この履歴を削除">
                                🗑️
                            </button>
                        </div>
                    </div>
                `;
            });
        
            // 2. 【高さ固定ロジック】空行で埋める（削除ボタン分のスペースも確保）
            if (totalPages > 1 && htmlArray.length < itemsPerPageHistory) {
                const neededEmptyRows = itemsPerPageHistory - htmlArray.length;
                for (let i = 0; i < neededEmptyRows; i++) {
                    htmlArray.push(`
                        <div class="flex items-center justify-between py-1 px-2.5 border-b border-transparent text-xs leading-tight invisible select-none gap-1" aria-hidden="true">
                            <div class="flex-1 min-w-0 pr-1">
                                <div class="text-[9px] mb-0">&nbsp;</div>
                                <div class="font-medium">&nbsp;</div>
                            </div>
                            <div class="flex items-center gap-2 flex-shrink-0">
                                <span class="px-1.5 py-0.5 text-[9px]">&nbsp;</span>
                                <span class="w-8 text-right">&nbsp;</span>
                                <span class="w-6 h-6">&nbsp;</span>
                            </div>
                        </div>
                    `);
                }
            }
        
            // 結合して画面に反映
            let html = htmlArray.join('');
        
            // ページネーション用のナビゲーションボタンを生成
            if (totalPages > 1) {
                let paginationHtml = `<div class="flex justify-center items-center gap-1 mt-3 pt-1 pb-1 select-none">`;
                
                // ＜ ボタン
                paginationHtml += `
                    <button onclick="changeHistoryPage(${currentHistoryPage - 1})" ${currentHistoryPage === 1 ? 'disabled' : ''} class="w-7 h-7 flex items-center justify-center rounded-lg border bg-white text-gray-600 font-bold active:bg-gray-100 disabled:opacity-30 disabled:pointer-events-none text-[10px] shadow-sm">
                        ＜
                    </button>
                `;
        
                // ページ番号
                for (let i = 1; i <= totalPages; i++) {
                    if (i === currentHistoryPage) {
                        paginationHtml += `
                            <span class="w-7 h-7 flex items-center justify-center rounded-lg bg-blue-600 text-white font-extrabold text-[10px] shadow-sm">
                                ${i}
                            </span>
                        `;
                    } else {
                        paginationHtml += `
                            <button onclick="changeHistoryPage(${i})" class="w-7 h-7 flex items-center justify-center rounded-lg border bg-white text-gray-600 font-bold active:bg-gray-100 text-[10px] shadow-sm">
                                ${i}
                            </button>
                        `;
                    }
                }
        
                // ＞ ボタン
                paginationHtml += `
                    <button onclick="changeHistoryPage(${currentHistoryPage + 1})" ${currentHistoryPage === totalPages ? 'disabled' : ''} class="w-7 h-7 flex items-center justify-center rounded-lg border bg-white text-gray-600 font-bold active:bg-gray-100 disabled:opacity-30 disabled:pointer-events-none text-[10px] shadow-sm">
                        ＞
                    </button>
                `;
                
                paginationHtml += `</div>`;
                html += paginationHtml;
            }
        
            timelineEl.innerHTML = html;
        }
        
        // 🌟 新しく追加：履歴のページを切り替える関数
        function changeHistoryPage(newPage) {
            currentHistoryPage = newPage;
            renderHistoryTimeline();
            
            // スクロール位置を履歴エリアの少し上にスムーズに戻す
            document.getElementById('logs-timeline')?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

        // 🌟 新しく追加：指定された履歴ログを削除する関数
        async function deleteHistoryLog(logId, shizaiName, logType, quantity) {
            // 誤操作防止の確認アラート
            const confirmMessage = `⚠️ 以下の履歴を完全に削除しますか？\n\n資材名: ${shizaiName}\n種別: ${logType}\n数量: ${quantity}個\n\n※この操作は取り消せません。また、現在の資材在庫数は自動で戻りませんので、必要に応じて手動で在庫修正を行ってください。`;
            if (!confirm(confirmMessage)) return;
        
            if (!navigator.onLine) {
                alert("⚠️ オフラインのため、履歴の削除ができません。");
                return;
            }
        
            try {
                if (typeof showToast === "function") showToast("📋 履歴を削除中...");
        
                // 1. Supabase から該当IDのログを削除
                const { error } = await db
                    .from('shizai_logs')
                    .delete()
                    .eq('id', logId);
        
                if (error) throw error;
        
                // 2. ローカルで保持している履歴キャッシュ配列から削除したアイテムを除外
                cachedHistoryLogs = cachedHistoryLogs.filter(log => log.id !== logId);
        
                // 3. タイムラインの再描画
                renderHistoryTimeline();
        
                // 4. 払い出しランキングデータの再計算と再描画
                const payoutMap = {};
                cachedHistoryLogs.forEach(log => {
                    const key = `${log.drug_name} - ${log.shizai_name}`;
                    if (log.type === '払い出し') {
                        payoutMap[key] = (payoutMap[key] || 0) + log.quantity;
                    }
                });
                cachedSortedPayouts = Object.entries(payoutMap).sort((a, b) => b[1] - a[1]);
                renderPayoutRanking();
        
                if (typeof showToast === "function") showToast("✅ 履歴を削除しました");
                
            } catch (e) {
                console.error("履歴の削除に失敗しました:", e.message);
                alert("履歴の削除に失敗しました。もう一度お試しください。");
            }
        }
        
        // 10件ずつのページネーション付きで払い出しランキングを描画する関数（バーを資材名の背景に限定版）
        function renderPayoutRanking() {
            const el = document.getElementById('payout-ranking');
            const paginationEl = document.getElementById('ranking-pagination');
            if (!el) return;
        
            if (cachedSortedPayouts.length === 0) {
                el.innerHTML = `<li class="text-gray-400 list-none text-xs py-2">データなし</li>`;
                if (paginationEl) paginationEl.innerHTML = '';
                return;
            }
        
            // 10件ごとのページ計算
            const itemsPerPageRanking = 10;
            const totalItems = cachedSortedPayouts.length;
            const totalPages = Math.ceil(totalItems / itemsPerPageRanking) || 1;
        
            if (currentRankingPage > totalPages) currentRankingPage = totalPages;
            if (currentRankingPage < 1) currentRankingPage = 1;
        
            const startIndex = (currentRankingPage - 1) * itemsPerPageRanking;
            const endIndex = startIndex + itemsPerPageRanking;
            const pageItems = cachedSortedPayouts.slice(startIndex, endIndex);
        
            // グラフの基準となる全体の1位の最大払い出し数を取得
            const maxQty = cachedSortedPayouts[0] ? cachedSortedPayouts[0][1] : 1;
        
            // 1. 実データのHTMLを生成
            let htmlArray = pageItems.map(([name, qty], index) => {
                const parts = name.split(' - ');
                const drugPart = parts[0] ? parts[0] : '';
                const shizaiPart = parts[1] ? parts[1] : name;
                
                const rank = startIndex + index + 1;
                let rankBadge = `<span class="inline-block w-4 h-4 text-center rounded bg-gray-200 text-gray-600 font-bold text-[10px] mr-1.5 flex-shrink-0">${rank}</span>`;
                if (rank === 1) rankBadge = `<span class="inline-block w-4 h-4 text-center rounded bg-amber-400 text-white font-bold text-[10px] mr-1.5 flex-shrink-0">🥇</span>`;
                if (rank === 2) rankBadge = `<span class="inline-block w-4 h-4 text-center rounded bg-slate-300 text-white font-bold text-[10px] mr-1.5 flex-shrink-0">🥈</span>`;
                if (rank === 3) rankBadge = `<span class="inline-block w-4 h-4 text-center rounded bg-amber-600 text-white font-bold text-[10px] mr-1.5 flex-shrink-0">🥉</span>`;
        
                // 1位に対する数量割合（%）を計算
                const barWidth = Math.min(100, Math.round((qty / maxQty) * 100));
        
                return `
                    <li class="text-xs text-gray-700 flex items-center py-1 border-b border-gray-50/60 leading-tight justify-between gap-2 min-h-[32px]">
                        
                        <div class="flex-1 min-w-0 flex flex-col justify-center py-0.5">
                            <div class="text-[9px] text-gray-400 font-normal mb-0.5 ml-5">${drugPart}</div>
                            
                            <div class="font-medium flex items-center">
                                ${rankBadge}
                                
                                <span class="relative inline-block truncate flex-1 min-w-0 pr-2 py-0.5">
                                    <span class="absolute left-0 top-0 bottom-0 rounded-r transition-all duration-500 ease-out" 
                                          style="width: ${barWidth}%; background-color: rgba(219, 234, 254, 0.7); z-index: 0;"></span>
                                    
                                    <span class="relative z-10 truncate block">${shizaiPart}</span>
                                </span>
                            </div>
                        </div>
        
                        <div class="font-bold text-blue-600 whitespace-nowrap flex-shrink-0 w-14 text-right">
                            ${qty}個
                        </div>
                    </li>
                `;
            });
        
            // 2. 【高さ固定ロジック】空行で埋める
            if (totalPages > 1 && htmlArray.length < itemsPerPageRanking) {
                const neededEmptyRows = itemsPerPageRanking - htmlArray.length;
                for (let i = 0; i < neededEmptyRows; i++) {
                    htmlArray.push(`
                        <li class="text-xs flex items-center py-1 border-b border-transparent leading-tight justify-between gap-2 invisible select-none min-h-[32px]" aria-hidden="true">
                            <div class="flex-1 min-w-0">
                                <div class="text-[9px] mb-0">&nbsp;</div>
                                <div class="flex items-center">
                                    <span class="inline-block w-4 h-4 mr-1.5 flex-shrink-0">&nbsp;</span>
                                    <span>&nbsp;</span>
                                </div>
                            </div>
                            <div class="w-14 text-right flex-shrink-0">&nbsp;</div>
                        </li>
                    `);
                }
            }
        
            // 結合して画面に反映
            el.innerHTML = htmlArray.join('');
        
            // ランキング用ページネーションUI（ボタン）の生成
            if (paginationEl) {
                if (totalPages > 1) {
                    let paginationHtml = `<div class="flex justify-center items-center gap-1 mt-2 select-none">`;
                    
                    // ＜ ボタン
                    paginationHtml += `
                        <button onclick="changeRankingPage(${currentRankingPage - 1})" ${currentRankingPage === 1 ? 'disabled' : ''} class="w-6 h-6 flex items-center justify-center rounded border bg-white text-gray-600 font-bold active:bg-gray-100 disabled:opacity-30 disabled:pointer-events-none text-[10px] shadow-sm">
                            ＜
                        </button>
                    `;
        
                    // ページ番号
                    for (let i = 1; i <= totalPages; i++) {
                        if (i === currentRankingPage) {
                            paginationHtml += `
                                <span class="w-6 h-6 flex items-center justify-center rounded bg-blue-600 text-white font-extrabold text-[10px] shadow-sm">
                                    ${i}
                                </span>
                            `;
                        } else {
                            paginationHtml += `
                                <button onclick="changeRankingPage(${i})" class="w-6 h-6 flex items-center justify-center rounded border bg-white text-gray-600 font-bold active:bg-gray-100 text-[10px] shadow-sm">
                                    ${i}
                                </button>
                            `;
                        }
                    }
        
                    // ＞ ボタン
                    paginationHtml += `
                        <button onclick="changeRankingPage(${currentRankingPage + 1})" ${currentRankingPage === totalPages ? 'disabled' : ''} class="w-6 h-6 flex items-center justify-center rounded border bg-white text-gray-600 font-bold active:bg-gray-100 disabled:opacity-30 disabled:pointer-events-none text-[10px] shadow-sm">
                            ＞
                        </button>
                    `;
                    
                    paginationHtml += `</div>`;
                    paginationEl.innerHTML = paginationHtml;
                } else {
                    paginationEl.innerHTML = '';
                }
            }
        }
        
        // 🌟 新しく追加：ランキングのページを切り替える関数
        function changeRankingPage(newPage) {
            currentRankingPage = newPage;
            renderPayoutRanking();
        }
    </script>
