<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>抗リウマチ薬 バイオ資材在庫管理</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800 font-sans pb-12">

    <header class="bg-blue-600 text-white p-4 sticky top-0 z-50 shadow-md">
        <div class="container mx-auto flex justify-between items-center max-w-md">
            <h1 class="text-xl font-bold">バイオ資材管理</h1>
            <div class="flex space-x-2">
                <button onclick="toggleAddForm()" class="bg-blue-500 hover:bg-blue-400 px-3 py-1 rounded text-sm font-bold transition">
                    ➕ 資材追加
                </button>
                <button onclick="fetchStocks()" class="bg-blue-700 hover:bg-blue-800 px-3 py-1 rounded text-sm transition">
                    🔄 更新
                </button>
            </div>
        </div>
    </header>

    <main class="container mx-auto p-4 max-w-md">
        
        <div id="error-message" class="mb-4 bg-orange-100 border-l-4 border-orange-500 text-orange-700 p-3 rounded text-sm hidden">
            <strong>⚠️ 接続エラー:</strong> <p id="error-text" class="mt-1"></p>
        </div>

        <div id="add-form-section" class="mb-6 bg-white p-4 rounded-xl shadow-md border border-blue-200 hidden">
            <h2 class="text-blue-700 font-bold text-base mb-3 flex justify-between items-center">
                <span>新しく資材を登録する</span>
                <button onclick="toggleAddForm()" class="text-gray-400 text-sm font-normal">閉じる</button>
            </h2>
            <div class="space-y-3 text-sm">
                <div>
                    <label class="block text-gray-600 font-medium mb-1">対象薬品名</label>
                    <select id="input-drug-select" onchange="toggleDrugInputMethod()" class="w-full p-2 border rounded-lg bg-gray-50 font-bold text-gray-700 outline-none">
                    </select>
                    <input type="text" id="input-drug-text" placeholder="例：〇〇皮下注（新しい薬品名を入力）" class="w-full p-2 border rounded-lg outline-none mt-2 hidden">
                </div>
                <div>
                    <label class="block text-gray-600 font-medium mb-1">資材名称</label>
                    <input type="text" id="input-shizai" placeholder="例：患者用説明資材、保冷バッグ" class="w-full p-2 border rounded-lg outline-none">
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-gray-600 font-medium mb-1">初期在庫数</label>
                        <input type="number" id="input-current" value="0" min="0" class="w-full p-2 border rounded-lg outline-none">
                    </div>
                    <div>
                        <label class="block text-gray-600 font-medium mb-1">最低在庫数</label>
                        <input type="number" id="input-min" value="2" min="0" class="w-full p-2 border rounded-lg outline-none">
                    </div>
                </div>

                <div class="border-t pt-2 mt-2 space-y-2 bg-gray-50 p-2 rounded-lg">
                    <label class="block text-gray-700 font-bold text-xs">📦 発注先の設定（ある方だけ入力、両方も可）</label>
                    
                    <div id="add-field-online" class="border-b pb-2 mb-2">
                        <label class="block text-green-700 text-xs font-bold mb-0.5">💻 オンライン発注URL</label>
                        <input type="url" id="input-order-url" placeholder="https://..." class="w-full p-1.5 border rounded bg-white">
                    </div>
                    
                    <div id="add-field-phone" class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-blue-700 text-xs font-bold mb-0.5">📞 電話連絡先名</label>
                            <input type="text" id="input-phone-name" placeholder="〇〇卸 担当など" class="w-full p-1.5 border rounded bg-white">
                        </div>
                        <div>
                            <label class="block text-blue-700 text-xs font-bold mb-0.5">📞 電話番号</label>
                            <input type="tel" id="input-phone-number" placeholder="03-XXXX-XXXX" class="w-full p-1.5 border rounded bg-white">
                        </div>
                    </div>
                </div>

                <button onclick="addNewShizai()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-lg transition mt-2">
                    データベースに登録
                </button>
            </div>
        </div>

        <div id="alert-section" class="mb-4 hidden">
            <h2 class="text-red-600 font-bold text-sm mb-2">⚠️ 発注が必要な資材（院内全体）</h2>
            <div id="alert-list" class="space-y-2"></div>
        </div>

        <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 mb-4">
            <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1.5">表示する対象薬品を選択</label>
            <div class="relative">
                <select id="drug-filter" onchange="filterSelectorChanged()" class="w-full p-3 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-400 outline-none font-bold text-gray-700 appearance-none">
                    <option value="ALL">ーー 全ての薬品を表示 ーー</option>
                </select>
                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-gray-500">
                    ▼
                </div>
            </div>
        </div>

        <hr class="border-gray-300 my-4">

        <h2 id="list-title" class="font-bold text-lg mb-3 text-gray-700">資材一覧</h2>
        <div id="stock-list" class="space-y-3">
            <p class="text-center text-gray-500 py-8">データを読み込み中...</p>
        </div>
    </main>

    <script>
        const SUPABASE_URL = "https://kkxpqxaxthrcxdvrmbty.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtreHBxeGF4dGhyY3hkdnJtYnR5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3NzMzODgsImV4cCI6MjA5NjM0OTM4OH0.Ptcn2lYMqbn4L5g1sV7r6E372cxfIyhsxgAkH7a65aU";
        
        let db;
        try { db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY); } catch (e) { console.error(e); }

        let currentStocksData = [];
        let editingId = null;
        let selectedDrugFilter = "ALL";

        document.addEventListener("DOMContentLoaded", fetchStocks);

        function toggleAddForm() {
            const form = document.getElementById("add-form-section");
            form.classList.toggle("hidden");
        }

        function toggleDetails(id) {
            const detailArea = document.getElementById(`detail-area-${id}`);
            if (detailArea) {
                detailArea.classList.toggle("hidden");
            }
        }

        function toggleDrugInputMethod() {
            const selectElement = document.getElementById("input-drug-select");
            const textInputElement = document.getElementById("input-drug-text");
            if (selectElement.value === "__NEW__") {
                textInputElement.classList.remove("hidden");
                textInputElement.focus();
            } else {
                textInputElement.classList.add("hidden");
                textInputElement.value = "";
            }
        }

        // 新しい資材をSupabaseに挿入
        async function addNewShizai() {
            const selectElement = document.getElementById("input-drug-select");
            const textInputElement = document.getElementById("input-drug-text");
            
            let drug = (selectElement.value === "__NEW__") ? textInputElement.value.trim() : selectElement.value;
            const shizai = document.getElementById("input-shizai").value.trim();
            const current = parseInt(document.getElementById("input-current").value) || 0;
            const min = parseInt(document.getElementById("input-min").value) || 0;

            const orderUrl = document.getElementById("input-order-url").value.trim();
            const phoneName = document.getElementById("input-phone-name").value.trim();
            const phoneNumber = document.getElementById("input-phone-number").value.trim();

            if (!drug || drug === "ーー 選択してください ーー") {
                alert("対象の薬品名を選択、または新しく入力してください。");
                return;
            }
            if (!shizai) {
                alert("資材名称は必ず入力してください。");
                return;
            }

            const { error } = await db
                .from('shizai_stocks')
                .insert([{ 
                    drug_name: drug, 
                    shizai_name: shizai, 
                    current_stock: current, 
                    min_stock: min, 
                    is_ordering: false,
                    order_type: 'hybrid', // ラジオボタン廃止に伴い、内部はハイブリッド扱いに
                    order_url: orderUrl,
                    phone_name: phoneName,
                    phone_number: phoneNumber
                }]);

            if (error) {
                alert("登録エラー: " + error.message);
            } else {
                alert("新しく資材を登録しました！");
                textInputElement.value = "";
                textInputElement.classList.add("hidden");
                document.getElementById("input-shizai").value = "";
                document.getElementById("input-current").value = "0";
                document.getElementById("input-order-url").value = "";
                document.getElementById("input-phone-name").value = "";
                document.getElementById("input-phone-number").value = "";
                toggleAddForm();
                
                selectedDrugFilter = drug; 
                fetchStocks();
            }
        }

        function filterSelectorChanged() {
            selectedDrugFilter = document.getElementById("drug-filter").value;
            renderStockList();
        }

        async function fetchStocks() {
            const errorArea = document.getElementById("error-message");
            const errorText = document.getElementById("error-text");
            errorArea.classList.add("hidden");

            try {
                const { data: stocks, error } = await db
                    .from('shizai_stocks')
                    .select('*')
                    .order('id', { ascending: true });

                if (error) {
                    errorText.innerText = error.message;
                    errorArea.classList.remove("hidden");
                    return;
                }

                currentStocksData = stocks || [];
                updateDrugFilterOptions();
                updateAddFormDrugOptions();
                renderStockList();

            } catch (e) {
                errorText.innerText = "通信エラー: " + e.message;
                errorArea.classList.remove("hidden");
            }
        }

        function updateDrugFilterOptions() {
            const filterElement = document.getElementById("drug-filter");
            const drugNames = [...new Set(currentStocksData.map(item => item.drug_name))];
            filterElement.innerHTML = `<option value="ALL">ーー 全ての薬品を表示 ーー</option>`;
            drugNames.forEach(name => {
                const selectedAttr = (name === selectedDrugFilter) ? "selected" : "";
                filterElement.innerHTML += `<option value="${name}" ${selectedAttr}>${name}</option>`;
            });
            if (selectedDrugFilter !== "ALL" && !drugNames.includes(selectedDrugFilter)) {
                selectedDrugFilter = "ALL";
                filterElement.value = "ALL";
            }
        }

        function updateAddFormDrugOptions() {
            const selectElement = document.getElementById("input-drug-select");
            if (!selectElement) return;
            const drugNames = [...new Set(currentStocksData.map(item => item.drug_name))];
            let html = `<option value="">ーー 選択してください ーー</option>`;
            drugNames.forEach(name => { html += `<option value="${name}">${name}</option>`; });
            html += `<option value="__NEW__">➕ 新しい薬品を追加（直接入力）...</option>`;
            selectElement.innerHTML = html;
        }

        function renderStockList() {
            const stockListElement = document.getElementById("stock-list");
            const alertSection = document.getElementById("alert-section");
            const alertListElement = document.getElementById("alert-list");
            const listTitleElement = document.getElementById("list-title");

            stockListElement.innerHTML = "";
            alertListElement.innerHTML = "";
            let hasAlert = false;

            if (currentStocksData.length === 0) {
                stockListElement.innerHTML = `<p class="text-center text-gray-500 py-8">資材が登録されていません。右上の「➕資材追加」から登録してください。</p>`;
                alertSection.classList.add("hidden");
                return;
            }

            if (selectedDrugFilter === "ALL") {
                listTitleElement.innerText = "全資材一覧";
            } else {
                listTitleElement.innerText = `「${selectedDrugFilter}」の資材一覧`;
            }

            currentStocksData.forEach(item => {
                const isShortage = item.current_stock < item.min_stock;
                const isNeedOrder = isShortage && !item.is_ordering;

                if (isNeedOrder) {
                    hasAlert = true;
                    alertListElement.innerHTML += `
                        <div class="bg-red-100 border-l-4 border-red-500 text-red-700 p-2 text-sm rounded shadow-sm">
                            <strong>${item.drug_name}</strong>: ${item.shizai_name} (残り ${item.current_stock}個 / 最低 ${item.min_stock}個)
                        </div>
                    `;
                }

                if (selectedDrugFilter !== "ALL" && item.drug_name !== selectedDrugFilter) {
                    return; 
                }

                // 編集中のカード表示
                if (editingId === item.id) {
                    const editCardHtml = `
                        <div class="bg-blue-50 p-4 rounded-xl shadow-sm border border-blue-400 text-sm space-y-2">
                            <div class="font-bold text-blue-800 text-xs mb-1">✏️ 登録情報を編集中</div>
                            <div>
                                <label class="block text-xs text-gray-500 mb-0.5">薬品名</label>
                                <input type="text" id="edit-drug-${item.id}" value="${item.drug_name}" class="w-full p-1.5 border rounded">
                            </div>
                            <div>
                                <label class="block text-xs text-gray-500 mb-0.5">資材名</label>
                                <input type="text" id="edit-shizai-${item.id}" value="${item.shizai_name}" class="w-full p-1.5 border rounded">
                            </div>
                            <div class="grid grid-cols-2 gap-2">
                                <div>
                                    <label class="block text-xs text-gray-500 mb-0.5">現在在庫</label>
                                    <input type="number" id="edit-current-${item.id}" value="${item.current_stock}" min="0" class="w-full p-1.5 border rounded">
                                </div>
                                <div>
                                    <label class="block text-xs text-gray-500 mb-0.5">最低在庫</label>
                                    <input type="number" id="edit-min-${item.id}" value="${item.min_stock}" min="0" class="w-full p-1.5 border rounded">
                                </div>
                            </div>
                            
                            <div class="border-t pt-2 mt-1 space-y-2 bg-white p-2 rounded border border-blue-200">
                                <label class="block text-gray-700 font-bold text-xs">📦 発注情報の修正（両方入力可）</label>
                                <div>
                                    <label class="block text-gray-400 text-xs mb-0.5">オンライン発注URL</label>
                                    <input type="url" id="edit-order-url-${item.id}" value="${item.order_url || ''}" placeholder="https://..." class="w-full p-1 border rounded text-xs">
                                </div>
                                <div class="grid grid-cols-2 gap-1">
                                    <div>
                                        <label class="block text-gray-400 text-xs mb-0.5">電話連絡先名</label>
                                        <input type="text" id="edit-phone-name-${item.id}" value="${item.phone_name || ''}" placeholder="〇〇卸など" class="w-full p-1 border rounded text-xs">
                                    </div>
                                    <div>
                                        <label class="block text-gray-400 text-xs mb-0.5">電話番号</label>
                                        <input type="tel" id="edit-phone-number-${item.id}" value="${item.phone_number || ''}" placeholder="03-XXXX" class="w-full p-1 border rounded text-xs">
                                    </div>
                                </div>
                            </div>

                            <div class="grid grid-cols-2 gap-2 pt-2">
                                <button onclick="cancelEdit()" class="bg-gray-300 text-gray-700 font-bold py-1.5 rounded-lg">
                                    キャンセル
                                </button>
                                <button onclick="saveEdit(${item.id})" class="bg-blue-600 text-white font-bold py-1.5 rounded-lg">
                                    変更を保存
                                </button>
                            </div>
                        </div>
                    `;
                    stockListElement.innerHTML += editCardHtml;
                    return;
                }

                // 【修正版】現在在庫と最低在庫がどちらも0の場合の判定を追加
                let statusBadge = `<span class="bg-green-100 text-green-800 text-xs font-bold px-2.5 py-0.5 rounded">在庫あり</span>`;
                let cardBorder = "border-gray-200";

                if (item.is_ordering) {
                    statusBadge = `<span class="bg-yellow-100 text-yellow-800 text-xs font-bold px-2.5 py-0.5 rounded">🟡 取り寄せ中</span>`;
                    cardBorder = "border-yellow-300 bg-yellow-100";
                } else if (isShortage) {
                    statusBadge = `<span class="bg-red-100 text-red-800 text-xs font-bold px-2.5 py-0.5 rounded">🔴 要発注</span>`;
                    cardBorder = "border-red-300 bg-red-100";
                } else if (item.current_stock === 0 && item.min_stock === 0) {
                    // 現在在庫も最低在庫も0のときは、発注は不要だけど「在庫なし（グレー）」にする
                    statusBadge = `<span class="bg-gray-200 text-gray-600 text-xs font-bold px-2.5 py-0.5 rounded">在庫なし</span>`;
                    cardBorder = "border-gray-300 bg-gray-50"; // カード全体も少し落ち着いたグレー寄りに
                }
                
                // 変更点④：オンライン、電話、両方の有無を判定してHTMLを動的に生成
                let orderDetailHtml = "";
                const hasUrl = item.order_url && item.order_url.trim().startsWith('http');
                const hasPhone = item.phone_number && item.phone_number.trim() !== "";

                if (!hasUrl && !hasPhone) {
                    // どちらも登録がない場合
                    orderDetailHtml = `
                        <div class="mt-2 p-2 bg-gray-100 text-xs rounded-lg border border-gray-300 text-gray-500 italic text-center">
                            ⚠️ 発注先登録なし
                        </div>
                    `;
                } else {
                    orderDetailHtml = `<div class="mt-2 p-2 bg-blue-50 text-xs rounded-lg border border-blue-200 space-y-2">`;
                    
                    if (hasUrl) {
                        orderDetailHtml += `
                            <div class="pb-1 ${hasPhone ? 'border-b border-dashed border-blue-200' : ''}">
                                <p class="font-bold text-green-800">💻 オンライン発注</p>
                                <p class="mt-0.5"><a href="${item.order_url.trim()}" target="_blank" rel="noopener noreferrer" class="text-green-700 font-bold underline flex items-center">🔗 発注ページを開く ↗️</a></p>
                            </div>
                        `;
                    }
                    if (hasPhone) {
                        orderDetailHtml += `
                            <div>
                                <p class="font-bold text-blue-800">📞 電話発注</p>
                                <p class="mt-0.5 text-gray-700"><strong>連絡先:</strong> ${item.phone_name || '未設定'}</p>
                                <p class="text-gray-700"><strong>TEL:</strong> <a href="tel:${item.phone_number.trim()}" class="text-blue-600 underline font-bold">${item.phone_number.trim()}</a></p>
                            </div>
                        `;
                    }
                    orderDetailHtml += `</div>`;
                }

                const cardHtml = `
                    <div class="bg-white p-4 rounded-xl shadow-sm border ${cardBorder}">
                        <div class="flex justify-between items-start mb-2">
                            <div onclick="toggleDetails(${item.id})" class="cursor-pointer flex-1 pr-2 hover:bg-gray-50 rounded transition p-1">
                                <span class="text-xs text-gray-400 block">${item.drug_name}</span>
                                <h3 class="font-bold text-gray-800 text-base underline decoration-dotted decoration-blue-400">${item.shizai_name}</h3>
                                
                                <span class="text-xs text-blue-500 block mt-0.5 font-medium">🔍 タップで発注先表示</span>
                                
                                <div id="detail-area-${item.id}" class="hidden mt-1" onclick="event.stopPropagation();">
                                    ${orderDetailHtml}
                                </div>
                            </div>
                            <div class="flex flex-col items-end space-y-1.5">
                                ${statusBadge}
                                <div class="flex space-x-2 text-xs text-gray-400">
                                    <button onclick="enterEditMode(${item.id})" class="hover:text-blue-600 p-0.5">✏️ 編集</button>
                                    <button onclick="deleteShizai(${item.id})" class="hover:text-red-500 p-0.5">🗑️ 削除</button>
                                </div>
                            </div>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-2 text-sm text-gray-600 mb-3 bg-gray-50 p-2 rounded">
                            <div class="flex items-center">現在在庫: <span class="font-bold text-lg text-gray-900 ml-1 mr-0.5">${item.current_stock}</span> 個</div>
                            <div class="flex items-center">最低在庫: <span class="font-medium text-gray-900 ml-1 mr-0.5">${item.min_stock}</span> 個</div>
                        </div>

                        <div class="space-y-2">
                            <div class="grid grid-cols-2 gap-2">
                                <button onclick="updateStock(${item.id}, ${item.current_stock - 1})" 
                                    class="bg-gray-800 hover:bg-gray-900 text-white text-xs font-bold py-2 px-3 rounded-lg"
                                    ${item.current_stock <= 0 ? 'disabled class="opacity-50"' : ''}>
                                    払い出し (-1)
                                </button>
                                
                                ${item.is_ordering ? `
                                    <button onclick="toggleOrderStatus(${item.id}, true)" 
                                        class="bg-gray-400 text-white text-xs font-bold py-2 px-3 rounded-lg">
                                        取り寄せを取消
                                    </button>
                                ` : `
                                    <button onclick="toggleOrderStatus(${item.id}, false)" 
                                        class="bg-yellow-500 hover:bg-yellow-600 text-white text-xs font-bold py-2 px-3 rounded-lg">
                                        取り寄せ中に変更
                                    </button>
                                `}
                            </div>

                            ${item.is_ordering ? `
                                <div class="flex items-center space-x-2 pt-1 border-t border-dashed border-gray-200">
                                <select id="arrival-count-${item.id}" class="w-18 p-1 text-center text-sm border rounded font-bold bg-gray-50 text-gray-700 outline-none">
                                    <option value="1">1</option>
                                    <option value="2">2</option>
                                    <option value="3">3</option>
                                    <option value="4">4</option>
                                    <option value="5" selected>5</option> <option value="6">6</option>
                                    <option value="7">7</option>
                                    <option value="8">8</option>
                                    <option value="9">9</option>
                                    <option value="10">10</option>
                                </select>
                                <span class="text-xs text-gray-500 font-medium">個が</span>
    
                                <button onclick="executeArrival(${item.id}, ${item.current_stock})" 
                                    class="flex-1 bg-green-600 hover:bg-green-700 text-white text-xs font-bold py-1.5 px-2 rounded-lg shadow-sm">
                                    入荷完了
                                </button>
                            </div>
                            ` : ''}
                        </div>
                    </div>
                `;
                stockListElement.innerHTML += cardHtml;
            });

            if (hasAlert) { alertSection.classList.remove("hidden"); } else { alertSection.classList.add("hidden"); }
        }

        async function updateStock(id, newStock) {
            if (newStock < 0) return;
            const { error } = await db.from('shizai_stocks').update({ current_stock: newStock }).eq('id', id);
            if (error) alert("更新エラー: " + error.message);
            else fetchStocks();
        }

        async function toggleOrderStatus(id, currentOrderingStatus) {
            const { error } = await db.from('shizai_stocks').update({ is_ordering: !currentOrderingStatus }).eq('id', id);
            if (error) alert("更新エラー: " + error.message);
            else fetchStocks();
        }

        async function executeArrival(id, currentStock) {
            const inputElement = document.getElementById(`arrival-count-${id}`);
            const arrivalCount = parseInt(inputElement.value) || 0;
            if (arrivalCount <= 0) { alert("1以上の数字を入力してください。"); return; }
            const { error } = await db.from('shizai_stocks').update({ current_stock: currentStock + arrivalCount, is_ordering: false }).eq('id', id);
            if (error) alert("入荷処理エラー: " + error.message);
            else fetchStocks();
        }

        async function deleteShizai(id) {
            const targetItem = currentStocksData.find(item => item.id === id);
            const nameForConfirm = targetItem ? `${targetItem.drug_name}の${targetItem.shizai_name}` : "この資材";
            if (!confirm(`【確認】\n「${nameForConfirm}」の登録を完全に削除しますか？\n（この操作は取り消せません）`)) return;

            const { error } = await db.from('shizai_stocks').delete().eq('id', id);
            if (error) alert("削除エラー: " + error.message);
            else fetchStocks();
        }

        function enterEditMode(id) { editingId = id; renderStockList(); }
        function cancelEdit() { editingId = null; renderStockList(); }

        async function saveEdit(id) {
            const nextDrug = document.getElementById(`edit-drug-${id}`).value.trim();
            const nextShizai = document.getElementById(`edit-shizai-${id}`).value.trim();
            const nextCurrent = parseInt(document.getElementById(`edit-current-${id}`).value) || 0;
            const nextMin = parseInt(document.getElementById(`edit-min-${id}`).value) || 0;

            const nextOrderUrl = document.getElementById(`edit-order-url-${id}`).value.trim();
            const nextPhoneName = document.getElementById(`edit-phone-name-${id}`).value.trim();
            const nextPhoneNumber = document.getElementById(`edit-phone-number-${id}`).value.trim();

            if (!nextDrug || !nextShizai) { alert("薬品名と資材名称は空欄にできません。"); return; }

            const { error } = await db.from('shizai_stocks')
                .update({ 
                    drug_name: nextDrug, 
                    shizai_name: nextShizai, 
                    current_stock: nextCurrent, 
                    min_stock: nextMin,
                    order_type: 'hybrid',
                    order_url: nextOrderUrl,
                    phone_name: nextPhoneName,
                    phone_number: nextPhoneNumber
                })
                .eq('id', id);
                
            if (error) alert("修正保存エラー: " + error.message);
            else { editingId = null; selectedDrugFilter = nextDrug; fetchStocks(); }
        }
    </script>
</body>
</html>
